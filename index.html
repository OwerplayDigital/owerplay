<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owerplay Gestor</title>
    <!-- Importando Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f2f2f7; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app-container { background: white; width: 100%; max-width: 400px; height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        #loginScreen { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        #mainApp { display: none; height: 100%; }
        input { width: 90%; padding: 12px; margin: 10px auto; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; outline: none; }
        button { width: 95%; padding: 15px; margin: 20px auto; border-radius: 12px; border: none; background-color: #007AFF; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { opacity: 0.8; }
        header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: none; color: #FF3B30; width: auto; margin: 0; padding: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- TELA DE LOGIN -->
        <div id="loginScreen">
            <h1 style="color: #1c1c1e;">Owerplay</h1>
            <p style="color: #8e8e93;">Gestão de Acessos</p>
            <input type="email" id="loginEmail" placeholder="Seu e-mail">
            <input type="password" id="loginPassword" placeholder="Sua senha">
            <button onclick="handleLogin()">Entrar</button>
        </div>

        <!-- TELA PRINCIPAL (O SEU APP) -->
        <div id="mainApp">
            <header>
                <h2 style="margin:0; font-size: 18px;">Bem-vindo, <span id="userDisplay">Usuário</span></h2>
                <button class="logout-btn" onclick="handleLogout()">Sair</button>
            </header>
            
            <div style="padding: 20px; text-align: center;">
                <h3>Painel de Controle Ativo</h3>
                <p>O seu conteúdo do Owerplay original deve ser colado aqui.</p>
                <!-- O RESTANTE DO SEU CÓDIGO ORIGINAL ENTRA AQUI -->
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES SUPABASE (LINHA ÚNICA PARA EVITAR ERROS)
        const SUPABASE_URL = 'https://auepntbwueklrnqazkhs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1ZXBudGJ3dWVrbHJucWF6a2hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjgzNjcsImV4cCI6MjA5MzI0NDM2N30.3Ux5eLRu2i6_tVDMxREUtcag4coGP6l29RHPippto3Q';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FUNÇÃO DE LOGIN
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if(!email || !password) {
                alert("Preencha todos os campos!");
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert('Erro: ' + error.message);
            } else {
                document.getElementById('userDisplay').innerText = data.user.email;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            }
        }

        // FUNÇÃO DE SAIR
        async function handleLogout() {
            await supabase.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
