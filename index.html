<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OwerPlay Gestor v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0f1a; --card: #161b2c; --primary: #6366f1; --text: #f8fafc;
            --text-dim: #94a3b8; --border: #2d3348; 
            --saida: #fb7185; --alerta: #f59e0b; --entrada: #38bdf8;
            --lucro: #10b981; --vencido: #fb7185; 
            --premium-color: #8B5CF6;
            --premium-glow: 0 0 15px rgba(139, 92, 246, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; touch-action: pan-y; }

        nav { 
            width: 100%; height: 75px; background: #070a13; border-radius: 20px 20px 0 0; 
            border-top: 1px solid var(--border); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; z-index: 9999; padding-bottom: 5px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }
        .menu-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim); cursor: pointer; font-size: 0.65rem; font-weight: 600; transition: 0.3s; position: relative; height: 100%; justify-content: center; }
        .menu-item i, .menu-item svg { width: 22px !important; height: 22px !important; opacity: 0.6; transition: 0.3s ease; stroke-width: 1.5px !important; }
        .menu-item.active { color: var(--text); }
        .menu-item.active i, .menu-item.active svg { opacity: 1 !important; color: var(--primary) !important; transform: translateY(-2px); filter: drop-shadow(0 0 5px rgba(99, 102, 241, 0.8)) !important; }
        .menu-item.active::after { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 22px; height: 3px; background: var(--primary); border-radius: 0 0 4px 4px; }

        main { flex: 1; padding: 18px; overflow-y: auto; padding-bottom: 150px; position: relative; z-index: 10; }
        .tab-content { display: none; }
        .active-tab { display: block; animation: slideFade 0.3s ease-out; }
        @keyframes slideFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .app-brand { font-size: 1.1rem; font-weight: 800; color: var(--primary); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px; }
        
        /* Indicador de versão */
        .version-tag {
            font-size: 0.5rem;
            color: var(--text-dim);
            opacity: 0.5;
            margin-left: 6px;
            font-weight: 400;
            letter-spacing: 0;
        }
        
        .btn-icon:active, .btn-save:active, .upgrade-btn:active, .chip:active, .fab:active {
            transform: scale(0.96) !important;
            transition: transform 0.1s ease !important;
        }
        
        .item-card {
            transition: all 0.2s ease;
            touch-action: pan-y;
        }
        .item-card:active {
            background: rgba(22, 27, 44, 0.8);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        
        .client-avatar {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: white;
            text-transform: uppercase;
            margin-right: 10px;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }
        
        .client-info-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .client-details {
            flex: 1;
        }
        
        .item-card {
            position: relative;
            overflow: hidden;
        }
        
        .delete-swipe-area {
            position: absolute;
            right: -100px;
            top: 0;
            bottom: 0;
            width: 70px;
            background: var(--saida);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 20px 20px 0;
            transition: right 0.3s ease;
            cursor: pointer;
        }
        
        .delete-swipe-area.show {
            right: 0;
        }
        
        .delete-swipe-area i, .delete-swipe-area svg {
            color: white;
            width: 24px;
            height: 24px;
        }

        .premium-badge {
            background: linear-gradient(135deg, var(--premium-color), #A78BFA);
            color: white;
            font-size: 0.55rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: var(--premium-glow);
        }

        .upgrade-btn {
            background: linear-gradient(135deg, var(--premium-color), #A78BFA);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            box-shadow: var(--premium-glow);
            transition: 0.3s;
            text-align: center;
            letter-spacing: 0.5px;
        }
        
        .upgrade-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        .plan-card {
            background: linear-gradient(135deg, #1e2438, #161b2c);
            border: 2px solid var(--premium-color);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(139, 92, 246, 0.1);
        }

        .plan-price-container {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            gap: 2px;
        }
        
        .plan-price-small {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--premium-color);
        }
        
        .plan-price-big {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--premium-color), #C4B5FD);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        
        .plan-price-cents {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--premium-color);
            align-self: flex-start;
            margin-top: 3px;
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .current-plan-badge {
            background: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }
        
        .current-plan-badge.premium {
            background: linear-gradient(135deg, var(--premium-color), #A78BFA);
            color: white;
            box-shadow: var(--premium-glow);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .current-plan-badge.premium::before {
            content: "💎";
            font-size: 11px;
        }
        
        .free-slots-tip {
            background: rgba(99, 102, 241, 0.10);
            border-radius: 14px;
            padding: 12px 15px;
            margin-bottom: 12px;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.2);
            line-height: 1.6;
            letter-spacing: 0.3px;
        }
        
        .free-slots-tip strong {
            color: white;
            font-weight: 700;
        }
        
        .free-slots-tip .premium-link {
            color: var(--premium-color);
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .config-btn-slim { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 8px 15px; border-radius: 12px; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; cursor: pointer; width: fit-content; margin-left: auto; margin-right: auto; }
        .config-btn-slim b { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

        .mini-stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .mini-card { flex: 1; background: var(--card); padding: 15px; border-radius: 18px; border: 1.5px solid var(--border); position: relative; }
        .mini-card b { font-size: 0.9rem; color: var(--text); }
        .mini-card small { font-size: 0.5rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 4px; }

        .search-container { margin-bottom: 12px; }
        .search-input { width: 100%; background: var(--card); border: 1.5px solid var(--border); padding: 11px 20px; border-radius: 100px; color: white; outline: none; font-size: 0.8rem; }
        
        .filter-chips { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .chip { padding: 11px 5px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text-dim); font-size: 0.6rem; font-weight: 700; text-align: center; cursor: pointer; text-transform: uppercase; position: relative; overflow: visible; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .chip-badge { position: absolute; top: -6px; right: -4px; min-width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 0.5rem; color: white; font-weight: 800; box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: none; z-index: 5; }

        .welcome-state { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 50px 25px; 
            background: rgba(22, 27, 44, 0.3); 
            border: 2px dashed var(--border); 
            border-radius: 30px; 
            text-align: center; 
            margin-top: 10px; 
        }
        .welcome-icon { 
            width: 70px; height: 70px; 
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1)); 
            color: var(--primary); 
            border-radius: 22px; 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 20px; 
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        .welcome-state h3 { 
            font-size: 1.2rem; font-weight: 700; color: white; margin-bottom: 8px; 
            background: linear-gradient(135deg, white, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .welcome-state p { 
            font-size: 0.8rem; color: var(--text-dim); max-width: 280px; line-height: 1.6; margin-bottom: 25px; 
        }
        .welcome-state .btn-save {
            width: auto;
            padding: 14px 35px;
            font-size: 0.85rem;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .item-card { background: var(--card); padding: 14px; border-radius: 18px; border: 1.5px solid transparent; position: relative; }
        .card-border-ativo { border-color: var(--lucro); }
        .card-border-alerta { border-color: var(--alerta); }
        .card-border-vencido { border-color: var(--saida); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }
        
        .card-status-badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.5rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }
        
        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 10px;
        }
        
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
        }
        .btn-edit { color: var(--alerta); }
        .btn-del { color: var(--saida); }

        .fin-card-top { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 18px; position: relative; }
        .fin-smooth-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .fin-item { display: flex; flex-direction: column; gap: 2px; }
        .fin-label { font-size: 0.5rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .fin-val { font-size: 0.75rem; font-weight: 600; }
        .btn-more-fin { position: absolute; top: 15px; right: 15px; color: var(--text-dim); background: none; border: none; cursor: pointer; padding: 5px; opacity: 0.6; }

        .fab { position: fixed; bottom: 95px; right: 25px; width: 54px; height: 54px; background: var(--primary); border-radius: 18px; display: none; align-items: center; justify-content: center; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 5000; border: none; cursor: pointer; transition: 0.2s; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: var(--card); width: 100%; max-width: 360px; padding: 25px; border-radius: 28px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 15px; font-weight: 800; }
        .modal label { display: block; font-size: 0.7rem; color: var(--text-dim); margin: 12px 0 6px; text-transform: uppercase; font-weight: 800; }
        .modal input, .modal select, .modal textarea { width: 100%; background: var(--bg); border: 1.5px solid var(--border); padding: 14px; border-radius: 12px; color: white; outline: none; margin-bottom: 5px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 700; margin-top: 15px; cursor: pointer; }

        .confirm-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-confirm { background: var(--saida); flex: 1; padding: 14px; border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; }
        .btn-cancel { background: var(--border); flex: 1; padding: 14px; border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; }

        #toast { visibility: hidden; min-width: 280px; background-color: var(--lucro); color: #fff; text-align: center; border-radius: 18px; padding: 18px; position: fixed; z-index: 11000; left: 50%; top: 35px; transform: translateX(-50%); font-weight: 700; box-shadow: 0 12px 30px rgba(0,0,0,0.6); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        #toast.alert { background-color: var(--saida); }
        
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 35px; opacity: 1;} }
        @keyframes fadeout { from {top: 35px; opacity: 1;} to {top: 0; opacity: 0;} }
        
        .premium-locked-overlay {
            position: absolute;
            inset: 0;
            background: rgba(22, 27, 44, 0.95);
            backdrop-filter: blur(3px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
            cursor: pointer;
        }
        
        .diamond-icon {
            filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.8));
        }
    </style>
</head>
<body onclick="if(event.target.classList.contains('overlay')) fecharModais()">

<div id="toast"></div>

<nav id="bottom-nav">
    <div class="menu-item active" data-tab="tab-dash" onclick="showTab('tab-dash', this)"><i data-lucide="home"></i><span>Início</span></div>
    <div class="menu-item" data-tab="tab-cli" onclick="showTab('tab-cli', this)"><i data-lucide="users"></i><span>Clientes</span></div>
    <div class="menu-item" data-tab="tab-pla" onclick="showTab('tab-pla', this)"><i data-lucide="package"></i><span>Planos</span></div>
    <div class="menu-item" data-tab="tab-srv" onclick="showTab('tab-srv', this)"><i data-lucide="database"></i><span>Servidores</span></div>
    <div class="menu-item" data-tab="tab-fin" onclick="showTab('tab-fin', this)"><i data-lucide="trending-up"></i><span>Finanças</span></div>
</nav>

<main id="swipe-area">
    <button class="fab" id="main-fab" onclick="abrirNovoManual()"><i data-lucide="plus" size="24"></i></button>

    <div id="tab-dash" class="tab-content active-tab">
        <div class="plan-header">
            <h2 class="app-brand" style="margin-bottom: 0;">OWERPLAY GESTOR <span class="version-tag">v2.0</span></h2>
            <div class="current-plan-badge" onclick="mostrarModalUpgrade()">
                <span id="plan-text-dash">FREE</span>
            </div>
        </div>
        <div id="free-slots-dash" class="free-slots-tip" style="display: none;"></div>
        <div class="mini-stats">
            <div class="mini-card" style="border-color: var(--lucro);"><small>Lucro do Mês</small><b id="ds-lucro">R$ 0</b>
                <div style="position:absolute; right:12px; top:12px; cursor:pointer" onclick="togglePriv()"><i data-lucide="eye" id="eye-icon" size="14"></i></div>
            </div>
            <div class="mini-card"><small>Ativos</small><b id="ds-ativos">0</b></div>
        </div>
        <div class="search-container"><input type="text" id="search-main" class="search-input" placeholder="Buscar por nome..." onkeyup="atualizar()"></div>
        <div class="filter-chips">
            <div class="chip" id="chip-ativo" onclick="filtrarStatus('ativo')">Ativos</div>
            <div class="chip" id="chip-alerta" onclick="filtrarStatus('alerta')">A Vencer <div id="badge-alerta" class="chip-badge" style="background:var(--alerta)">0</div></div>
            <div class="chip" id="chip-vencido" onclick="filtrarStatus('vencido')">Vencidos <div id="
