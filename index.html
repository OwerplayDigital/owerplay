  <style>
    :root {
      --accent: #0288D1; --accent-light: #E1F5FE; --accent-dark: #01579B;
      --accent-gradient: linear-gradient(135deg, #03A9F4 0%, #0288D1 50%, #0277BD 100%);
      --bg-primary: #F0F8FF; --bg-secondary: #FFFFFF; --bg-tertiary: #F5FAFF;
      --text-primary: #0A1929; --text-secondary: #4A7A9E; --text-tertiary: #8AACC8;
      --success: #43A047; --success-light: #E8F5E9;
      --danger: #EF5350; --danger-light: #FFEBEE;
      --crescimento: #F57C00; --entrada: #0288D1;
      --separator: #D8E8F5; --separator-strong: #B8D0E8;
      --shadow-xs: 0 1px 2px rgba(10,25,41,0.03); --shadow-sm: 0 2px 8px rgba(10,25,41,0.04);
      --shadow-md: 0 8px 24px rgba(10,25,41,0.06); --shadow-lg: 0 16px 48px rgba(10,25,41,0.08);
      --shadow-xl: 0 32px 64px rgba(10,25,41,0.10);
      --glass-bg: rgba(255,255,255,0.72); --glass-border: rgba(255,255,255,0.6);
      --glass-blur: blur(40px) saturate(180%);
      --sidebar-width: 280px; --radius-xs: 6px; --radius-sm: 10px; --radius-md: 14px;
      --radius-lg: 18px; --radius-xl: 22px; --radius-2xl: 28px;
      --transition-fast: 0.15s cubic-bezier(0.2,0.0,0,1.0);
      --transition-smooth: 0.3s cubic-bezier(0.2,0.0,0,1.0);
      --transition-spring: 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    [data-theme="dark"] {
      --bg-primary: #0A1929; --bg-secondary: #102A43; --bg-tertiary: #1A3A5C;
      --text-primary: #E3F2FD; --text-secondary: #90CAF9; --text-tertiary: #64B5F6;
      --separator: #1A3A5C; --separator-strong: #243B53;
      --glass-bg: rgba(16,42,67,0.85); --glass-border: rgba(255,255,255,0.06);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { height: 100%; }
    body {
      height: auto;
      min-height: 100vh;
      overflow-y: auto !important;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch !important;
      font-family:'Inter',-apple-system,sans-serif; background:var(--bg-primary);
      color:var(--text-primary); display:flex; line-height:1.47;
      font-weight:400; -webkit-font-smoothing:antialiased;
      transition:background var(--transition-smooth),color var(--transition-smooth);
      touch-action:pan-y; position: relative;
    }
    .app-container { display:flex; width:100%; min-height:100vh; position:relative; }
    .mobile-overlay { display:none; position:fixed; inset:0; background:rgba(10,25,41,0.3); backdrop-filter:blur(8px); z-index:95; opacity:0; transition:opacity var(--transition-smooth); pointer-events:none; }
    .mobile-overlay.show { opacity:1; pointer-events:auto; }
    .hamburger-btn { display:none; position:fixed; top:16px; right:16px; z-index:110; background:var(--glass-bg); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-md); width:40px; height:40px; align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--shadow-md); color:var(--text-primary); }
    .hamburger-btn:active { transform:scale(0.94); }
    .sidebar { width:var(--sidebar-width); background:var(--glass-bg); backdrop-filter:var(--glass-blur); border-right:1px solid var(--separator); padding:24px 16px 40px; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:90; box-shadow:var(--shadow-lg); transition:transform var(--transition-spring); overflow-y:auto; }
    .sidebar-close-btn { position:absolute; top:12px; right:12px; width:32px; height:32px; border-radius:var(--radius-sm); background:transparent; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-tertiary); transition:all var(--transition-fast); z-index:5; }
    .sidebar-close-btn:hover { background:var(--bg-tertiary); color:var(--text-primary); }
    .sidebar-section { margin-bottom:12px; }
    .sidebar-section-title { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-tertiary); font-weight:700; padding:6px 10px; margin-bottom:2px; }
    .sidebar-divider { height:1px; background:var(--separator); margin:8px 0; }
    .logo-area { display:flex; align-items:center; gap:10px; margin-bottom:6px; padding:0 6px; }
    .logo-icon { background:var(--accent-gradient); color:white; width:36px; height:36px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.2rem; box-shadow:0 4px 16px rgba(2,136,209,0.35); }
    .logo-text { font-weight:800; font-size:1.3rem; letter-spacing:-0.04em; color:var(--text-primary); }
    .nav-item,.sidebar-action { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:var(--radius-sm); font-weight:500; font-size:0.83rem; color:var(--text-secondary); transition:all var(--transition-fast); cursor:pointer; background:transparent; border:none; width:100%; text-align:left; letter-spacing:-0.02em; }
    .nav-item i,.sidebar-action i { width:17px; height:17px; stroke-width:1.6; opacity:0.7; flex-shrink:0; }
    .nav-item:hover,.sidebar-action:hover { background:var(--bg-tertiary); color:var(--text-primary); }
    .nav-item.active { background:var(--accent-light); color:var(--accent-dark); font-weight:600; }
    .nav-item.active i { opacity:1; stroke-width:2; }
    .main-content { flex:1; margin-left:var(--sidebar-width); padding:32px 28px 100px; width:100%; min-height:100vh; transition:margin-left var(--transition-spring); overflow-y:auto !important; -webkit-overflow-scrolling:touch !important; }
    .bottom-nav { display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:calc(100% - 24px); max-width:520px; background:var(--glass-bg); backdrop-filter:var(--glass-blur); border-radius:var(--radius-2xl); padding:8px; box-shadow:var(--shadow-xl); z-index:100; border:1px solid var(--separator); }
    .bottom-nav.dock-hidden { opacity:0; transform:translateX(-50%) translateY(20px); pointer-events:none; }
    .bottom-nav-inner { display:flex; justify-content:space-around; align-items:center; }
    .bottom-nav-item { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:0.55rem; font-weight:500; color:var(--text-tertiary); background:none; border:none; padding:8px 4px; border-radius:var(--radius-xl); transition:all var(--transition-fast); cursor:pointer; min-width:55px; white-space:nowrap; }
    .bottom-nav-item.active { color:var(--accent-dark); background:var(--accent-light); font-weight:600; }
    .bottom-nav-item i { width:22px; height:22px; stroke-width:1.5; }
    .fab { display:none; position:fixed; bottom:120px; right:20px; width:48px; height:48px; background:var(--accent-gradient); color:white; border-radius:50%; box-shadow:0 6px 24px rgba(2,136,209,0.3); align-items:center; justify-content:center; border:none; z-index:105; cursor:pointer; font-size:1.3rem; opacity:0.85; transition:all var(--transition-smooth); }
    .fab:active { transform:scale(0.9); }
    .fab.dock-hidden { opacity:0; transform:scale(0.5); pointer-events:none; }
    .back-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius-md); background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--accent-dark); font-weight:600; font-size:0.85rem; cursor:pointer; transition:all var(--transition-fast); margin-bottom:20px; box-shadow:var(--shadow-sm); }
    .back-btn:hover { background:var(--accent-light); }
    .back-btn i { width:18px; height:18px; stroke-width:2; }
    .section-title { font-size:2rem; font-weight:800; letter-spacing:-0.04em; margin-bottom:4px; }
    .section-subtitle { font-size:0.95rem; color:var(--text-secondary); margin-bottom:24px; }
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
    .stat-card { background:var(--bg-secondary); border-radius:var(--radius-lg); padding:16px 18px; box-shadow:var(--shadow-xs); border:1px solid var(--separator); transition:all var(--transition-fast); position:relative; overflow:hidden; border-left:3px solid var(--accent); }
    .stat-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .stat-card.lucro-dashboard { border-left:none; }
    .stat-card.clickable { cursor:pointer; }
    .stat-card.clickable:hover { box-shadow:var(--shadow-lg); transform:translateY(-3px); border-color:var(--accent); }
    .stat-card .card-arrow { position:absolute; top:10px; right:10px; opacity:0; transition:opacity var(--transition-fast); color:var(--accent-dark); }
    .stat-card.clickable:hover .card-arrow { opacity:1; }
    .stat-label { font-size:0.7rem; color:var(--text-secondary); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
    .stat-value { font-size:1.7rem; font-weight:800; letter-spacing:-0.04em; }
    .stat-value.positive { color:var(--success); } .stat-value.negative { color:var(--danger); }
    .stat-value.info-color { color:var(--entrada); } .stat-value.teal-color { color:var(--crescimento); }
    .stat-value.neutral { color:var(--text-primary); } .stat-value.warning-color { color:#FFA000; }
    .lucro-destaque { background:var(--accent-gradient); color:white; border:none; border-left:none; box-shadow:0 8px 32px rgba(2,136,209,0.35); cursor:pointer; }
    .lucro-destaque .stat-label { color:rgba(255,255,255,0.85); }
    .lucro-destaque .stat-value { color:white; font-size:2rem; }
    .client-card { background:var(--bg-secondary); border-radius:var(--radius-md); padding:14px 16px; box-shadow:var(--shadow-xs); border:1px solid var(--separator); transition:all var(--transition-fast); animation:fadeInCard 0.3s ease both; }
    .client-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    @keyframes fadeInCard { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .avatar { width:38px; height:38px; border-radius:50%; background:var(--accent-light); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; color:var(--accent-dark); flex-shrink:0; }
    .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:0.7rem; font-weight:600; }
    .badge-success { background:var(--success-light); color:#2E7D32; }
    .badge-warning { background:#FFF8E1; color:#E65100; }
    .badge-danger { background:var(--danger-light); color:#C62828; }
    .search-input { width:100%; padding:12px 16px; border-radius:var(--radius-lg); border:1px solid var(--separator-strong); background:var(--bg-secondary); font-family:'Inter',sans-serif; font-size:0.9rem; outline:none; transition:all var(--transition-fast); box-shadow:var(--shadow-xs); color:var(--text-primary); }
    .search-input:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(2,136,209,0.15); }
    [data-theme="dark"] .search-input { background:#0D1F33; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 20px; border-radius:var(--radius-md); font-weight:600; font-size:0.85rem; border:none; cursor:pointer; transition:all var(--transition-fast); }
    .btn-primary { background:var(--accent-gradient); color:white; box-shadow:0 4px 16px rgba(2,136,209,0.35); }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(2,136,209,0.4); }
    .btn-danger { background:var(--danger); color:white; }
    .btn-ghost { background:transparent; color:var(--accent-dark); }
    .btn-success { background:#25D366; color:white; }
    .btn-icon { padding:8px; border-radius:var(--radius-sm); background:transparent; border:1px solid rgba(2,136,209,0.25); cursor:pointer; transition:all var(--transition-fast); display:flex; align-items:center; justify-content:center; position:relative; color:#0288D1; }
    .btn-icon:hover { background:#E1F5FE; border-color:#0288D1; }
    .btn-icon.danger:hover { background:var(--danger-light); color:var(--danger); border-color:var(--danger); }
    .btn-icon.whatsapp:hover { background:#E8F5E9; color:#25D366; border-color:#25D366; }
    .btn-icon.notes:hover { background:var(--accent-light); color:var(--accent-dark); }
    .btn-icon.has-note::after { content:''; position:absolute; top:3px; right:3px; width:7px; height:7px; border-radius:50%; background:#03A9F4; border:1px solid white; }
    [data-theme="dark"] .btn-icon { color:#4FC3F7; border:1px solid rgba(79,195,247,0.3); }
    [data-theme="dark"] .btn-icon:hover { background:rgba(79,195,247,0.15); border-color:#4FC3F7; color:#E3F2FD; }
    [data-theme="dark"] .btn-icon.danger:hover { background:rgba(229,57,53,0.15); color:#EF5350; border-color:#EF5350; }
    .modal-overlay { position:fixed; inset:0; background:rgba(10,25,41,0.35); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; animation:fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-content { background:var(--bg-secondary); border-radius:var(--radius-2xl); padding:24px; width:100%; max-width:400px; box-shadow:var(--shadow-xl); max-height:90vh; overflow-y:auto; border:1px solid var(--separator); animation:slideUp 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
    @keyframes slideUp { from { opacity:0; transform:translateY(30px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
    .confirm-modal { text-align:center; }
    .confirm-icon { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
    .confirm-icon.renew { background:var(--accent-light); }
    .confirm-icon.delete { background:var(--danger-light); }
    .toast-container { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:6px; pointer-events:none; align-items:center; }
    .toast { background:var(--glass-bg); backdrop-filter:var(--glass-blur); padding:12px 22px; border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); border:1px solid var(--glass-border); display:flex; align-items:center; gap:8px; font-weight:600; font-size:0.85rem; pointer-events:auto; animation:toastIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275); white-space:nowrap; }
    @keyframes toastIn { from { opacity:0; transform:translateY(-16px) scale(0.92); } to { opacity:1; transform:translateY(0) scale(1); } }
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-tertiary); }
    .empty-state-card { text-align:center; padding:48px 24px; background:var(--bg-secondary); border-radius:var(--radius-2xl); border:1px solid var(--separator); box-shadow:var(--shadow-sm); max-width:440px; margin:0 auto; }
    .empty-state-icon { width:64px; height:64px; border-radius:50%; background:var(--accent-light); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
    .empty-state-title { font-size:1.2rem; font-weight:700; margin-bottom:8px; color:var(--text-primary); }
    .empty-state-desc { font-size:0.9rem; color:var(--text-secondary); margin-bottom:24px; line-height:1.5; }
    .table-wrapper { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .transaction-table { width:100%; border-collapse:collapse; margin-top:20px; background:var(--bg-secondary); border-radius:var(--radius-xl); overflow:hidden; min-width:500px; }
    .transaction-table th { background:var(--bg-tertiary); padding:12px 14px; text-align:left; font-weight:600; font-size:0.8rem; color:var(--text-secondary); text-transform:uppercase; white-space:nowrap; }
    .transaction-table td { padding:12px 14px; border-top:1px solid var(--separator); font-size:0.85rem; white-space:nowrap; }
    .transaction-amount { font-weight:600; }
    .transaction-amount.positive { color:var(--success); } .transaction-amount.negative { color:var(--danger); }
    .transaction-amount.entrada { color:var(--entrada); }
    .action-icons { display:flex; gap:6px; align-items:center; }
    .textarea-input { width:100%; padding:12px; border-radius:var(--radius-md); border:1px solid var(--separator-strong); background:var(--bg-secondary); font-family:'Inter',sans-serif; font-size:0.85rem; outline:none; resize:vertical; min-height:120px; color:var(--text-primary); }
    .textarea-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(2,136,209,0.15); }
    .chart-container { position:relative; width:100%; height:280px; margin:0 auto; }
    .chart-container canvas { width:100% !important; height:100% !important; }
    .field-label { font-size:0.7rem; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:4px; }
    .pro-badge-lock { font-size:0.6rem; background:var(--accent-light); color:var(--accent-dark); padding:2px 6px; border-radius:8px; margin-left:auto; font-weight:600; }
    .pro-item { display:flex; align-items:center; gap:10px; }
    .pos-renovacao-info { background:var(--bg-tertiary); border-radius:var(--radius-md); padding:14px; margin-bottom:16px; text-align:center; }
    .pos-renovacao-info .info-item { font-size:0.85rem; margin-bottom:4px; }
    .banner-pro-wrapper { background:transparent !important; border:none !important; box-shadow:none !important; }
    .btn-delete-row { background:none; border:1px solid transparent; cursor:pointer; padding:6px; border-radius:8px; color:var(--text-tertiary); transition:all var(--transition-fast); display:flex; align-items:center; }
    .btn-delete-row:hover { background:var(--danger-light); border-color:var(--danger); color:var(--danger); }
    .btn-delete-row i { width:16px; height:16px; stroke-width:1.8; }
    .active-filter-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; background:var(--accent-light); color:var(--accent-dark); font-size:0.8rem; font-weight:600; margin-bottom:16px; }
    .active-filter-badge button { background:none; border:none; color:var(--accent-dark); cursor:pointer; padding:0; display:flex; align-items:center; }

    /* ESTILOS DA TELA DE LOGIN (NOVO) */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
      padding: 20px;
    }
    .login-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-2xl);
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--separator);
      text-align: center;
    }
    .login-logo-wrap {
      width: 96px;
      height: 96px;
      margin: 0 auto 8px;
      flex-shrink: 0;
    }
    .login-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    @keyframes slideDown { from { opacity:0; transform:translateX(-50%) translateY(-20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

    @media (max-width:1024px) {
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); box-shadow:var(--shadow-xl); }
      .main-content { margin-left:0; padding:24px 16px 140px; overflow-y:auto !important; -webkit-overflow-scrolling:touch !important; }
      .hamburger-btn { display:flex; }
      .bottom-nav { display:block; }
      .fab { display:flex; }
      .card-grid { grid-template-columns:1fr; }
      .chart-container { height:240px; }
      .stat-value { font-size:1.5rem; }
      .section-title { font-size:1.8rem; }
      .lucro-destaque .stat-value { font-size:1.7rem; }
      .empty-state-card { padding:36px 20px; }
    }
    @media (min-width:768px) and (max-width:1024px) { .card-grid { grid-template-columns:repeat(2,1fr); } }
  </style>

  <script>
    // ========== CONFIGURAÇÃO SUPABASE (NOVO) ==========
    var SUPABASE_URL = 'https://auepntbwueklrnqazkhs.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1ZXBudGJ3dWVrbHJucWF6a2hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjgzNjcsImV4cCI6MjA5MzI0NDM2N30.3Ux5eLRu2i6_tVDMxREUtcag4coGP6l29RHPippto3Q';
    
    var supabase;
    try {
      if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }
    } catch(e) {
      console.warn('Supabase não disponível');
    }

    // ========== FUNÇÃO DE LOGIN (via Supabase Auth) ==========
    function fazerLogin() {
      var email = document.getElementById('loginEmail').value.trim();
      var senha = document.getElementById('loginSenha').value.trim();
      var errorEl = document.getElementById('loginError');
      var btn = document.getElementById('loginBtn');

      if (!email || !senha) {
        if (errorEl) { errorEl.textContent = 'Preencha email e senha.'; errorEl.style.display = 'block'; }
        return;
      }

      if (!supabase) {
        if (errorEl) { errorEl.textContent = 'Serviço de autenticação indisponível.'; errorEl.style.display = 'block'; }
        return;
      }

      if (btn) { btn.disabled = true; btn.textContent = 'Entrando...'; }
      if (errorEl) errorEl.style.display = 'none';

      supabase.auth.signInWithPassword({ email: email, password: senha }).then(function(result) {
        if (btn) { btn.disabled = false; btn.textContent = 'Entrar'; }
        if (result.error) {
          if (errorEl) { 
            errorEl.textContent = '❌ Erro: ' + result.error.message + ' (status: ' + result.error.status + ')';
            errorEl.style.display = 'block'; 
          }
        } else {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('appContainer').style.display = 'flex';
          iniciarApp();
        }
      }).catch(function(err) {
        if (btn) { btn.disabled = false; btn.textContent = 'Entrar'; }
        if (errorEl) { errorEl.textContent = '❌ Erro inesperado: ' + err.message; errorEl.style.display = 'block'; }
      });
    }

    // ========== FUNÇÃO DE LOGOUT ==========
    function fazerLogout() {
      if (supabase) {
        supabase.auth.signOut().then(function() {
          document.getElementById('loginScreen').style.display = 'flex';
          document.getElementById('appContainer').style.display = 'none';
          document.getElementById('loginEmail').value = '';
          document.getElementById('loginSenha').value = '';
          var errorEl = document.getElementById('loginError');
          if (errorEl) errorEl.style.display = 'none';
        });
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
      }
    }

    // ========== VERIFICA SESSÃO ATIVA AO CARREGAR ==========
    if (supabase) {
      supabase.auth.getSession().then(function(result) {
        if (result.data && result.data.session) {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('appContainer').style.display = 'flex';
          iniciarApp();
        }
      });
    }

    // ========== APP PRINCIPAL ==========

        window._removerTransacoesCliente = function(cid) {
          var c = db.clientes.find(function(x) { return x.id === cid; }); 
          if(!c) return;
          var hoje = new Date(); 
          var m = hoje.getFullYear() + '-' + String(hoje.getMonth()+1).padStart(2,'0');
          var transacoesCliente = db.transacoes.filter(function(t) { return t.clienteId === cid && t.data.startsWith(m); });
          if(transacoesCliente.length === 0) { 
            showToast('Nenhuma transação para remover este mês', 'warning'); 
            return; 
          }
          var totalEnt = transacoesCliente.filter(function(t) { return t.tipo === 'entrada'; }).reduce(function(s,t) { return s+t.valor; }, 0);
          var totalSai = transacoesCliente.filter(function(t) { return t.tipo === 'saida'; }).reduce(function(s,t) { return s+t.valor; }, 0);
          showConfirmModal('Remover transações?', 'Isso irá remover <strong>todas as movimentações</strong> de <strong>' + c.nome + '</strong> no mês atual.<br><br>➕ Entradas: R$ ' + totalEnt.toFixed(2) + '<br>➖ Saídas: R$ ' + totalSai.toFixed(2), 'delete', 'Sim, remover', 'btn-danger', function() {
            db.transacoes = db.transacoes.filter(function(t) { return !(t.clienteId === cid && t.data.startsWith(m)); });
            if(!db.transacoesRemovidas) db.transacoesRemovidas = [];
            db.transacoesRemovidas.push({ clienteId:cid, mes:m });
            saveDB();
            addLog('Transações de ' + c.nome + ' removidas');
            renderDashboard();
            renderSection('financas');
            showToast('Transações removidas!');
          });
        };

';

        function renderFinancas() {
          var hoje = new Date();

          var ma = hoje.getMonth() === 0 ? (hoje.getFullYear()-1)+'-12' : hoje.getFullYear()+'-'+String(hoje.getMonth()).padStart(2,'0');
          var ent = db.transacoes.filter(function(t) { return t.tipo === 'entrada' && t.data.startsWith(m); }).reduce(function(s,t) { return s+t.valor; }, 0);
          var sai = db.transacoes.filter(function(t) { return t.tipo === 'saida' && t.data.startsWith(m); }).reduce(function(s,t) { return s+t.valor; }, 0);
          var luc = ent - sai;
          var ea = db.transacoes.filter(function(t) { return t.tipo === 'entrada' && t.data.startsWith(ma); }).reduce(function(s,t) { return s+t.valor; }, 0);
          var sa = db.transacoes.filter(function(t) { return t.tipo === 'saida' && t.data.startsWith(ma); }).reduce(function(s,t) { return s+t.valor; }, 0);
          var la = ea - sa;
          var cresc = la !== 0 ? ((luc-la)/Math.abs(la))*100 : (luc>0?100:0);
          var crescTxt = cresc >= 0 ? '+' + cresc.toFixed(1) + '%' : cresc.toFixed(1) + '%';

            if(t.clienteId && clienteTransacoes[t.clienteId]) { 
              if(t.tipo === 'entrada') clienteTransacoes[t.clienteId].entrada += t.valor;

          }).join('');

          lucide.createIcons();
          setTimeout(function() { 
            if(chartInstance) chartInstance.destroy(); 
            var ctx = document.getElementById('finChart'); 
            if(ctx) { 
              chartInstance = new Chart(ctx, { 
                type:'bar', 
                data:{ 
                  labels:['Este Mês'], 
                  datasets:[
                    { label:'Entradas', data:[ent], backgroundColor:'#0288D1', borderRadius:8, borderSkipped:false },
                    { label:'Saídas', data:[sai], backgroundColor:'#EF5350', borderRadius:8, borderSkipped:false },
                    { label:'Lucro', data:[luc], backgroundColor:'#43A047', borderRadius:8, borderSkipped:false }
                  ] 
                }, 
                options:{ 
                  responsive:true, 
                  maintainAspectRatio:false, 
                  plugins:{ 
                    legend:{ position:'bottom', labels:{ usePointStyle:true, padding:18, font:{ size:11 } } } 
                  }, 
                  scales:{ 
                    y:{ beginAtZero:true, grid:{ color:'rgba(0,0,0,0.04)' } }, 
                    x:{ grid:{ display:false } } 
                  } 
                } 
              }); 
            } 
          }, 200);
        }

              });

        }

          document.body.insertAdjacentHTML('beforeend', h); 
          document.getElementById('saveCli').addEventListener('click', function() {

        async function backupArquivo() {
          if(!exigePRO()) return;
          var backupData = { app: 'Owerplay Gestor', versao: '5.0', data: new Date().toISOString(), dados: db };
          try {
            showToast('Salvando backup na nuvem...', 'info');
            var resp = await fetch('https://api.jsonbin.io/v3/b', {
              method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY, 'X-Bin-Name': 'owerplay-backup-' + new Date().toISOString().split('T')[0], 'X-Bin-Private': 'true' }, body: JSON.stringify(backupData)
            });
            var data = await resp.json();
            if (data.metadata && data.metadata.id) {
              localStorage.setItem('owerplay_backup_cloud_id', data.metadata.id);
              addLog('Backup salvo na nuvem (ID: ' + data.metadata.id + ')');
              showToast('Backup salvo na nuvem! ☁️✅');
            } else { throw new Error('Resposta inválida da API'); }
          } catch(e) {
            addLog('Erro ao salvar backup na nuvem: ' + e.message);
            showToast('Falha na nuvem. Salvando localmente...', 'warning');
          }
          try {
            var jsonStr = JSON.stringify(db, null, 2);
            var blob = new Blob([jsonStr], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a'); a.href = url; a.download = 'owerplay_backup_' + new Date().toISOString().split('T')[0] + '.json'; a.click();
            setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
          } catch(e) {}
        }

        async function restaurarArquivo() {
          if(!exigePRO()) return;
          var cloudId = localStorage.getItem('owerplay_backup_cloud_id');
          var restaurado = false;
          if (cloudId) {
            try {
              showToast('Buscando backup na nuvem...', 'info');
              var resp = await fetch('https://api.jsonbin.io/v3/b/' + cloudId + '/latest', { headers: { 'X-Master-Key': JSONBIN_MASTER_KEY } });
              var data = await resp.json();
              if (data.record && data.record.dados && data.record.dados.clientes) {
                db = data.record.dados;
                if(!db.transacoes) db.transacoes = []; if(!db.templates) db.templates = defaultTemplates; if(!db.log) db.log = []; if(!db.transacoesRemovidas) db.transacoesRemovidas = [];
                saveDB(); renderSection(currentSection);
                showToast('Backup restaurado da nuvem! ☁️✅');
                addLog('Backup restaurado via nuvem (ID: ' + cloudId + ')');
                restaurado = true;
                try { confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } }); } catch(e) {}
              }
            } catch(e) {
              addLog('Erro ao restaurar da nuvem: ' + e.message);
              showToast('Backup na nuvem indisponível...', 'warning');
            }
          }
          if (!restaurado) {
            var input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = function(e) {
              var file = e.target.files[0]; if(!file) return;
              var reader = new FileReader();
              reader.onload = function(ev) {
                try {
                  var data = JSON.parse(ev.target.result);
                  if(!data.clientes && !data.dados) throw new Error('Inválido');
                  if (data.dados && data.dados.clientes) { db = data.dados; } else { db = data; }
                  if(!db.transacoes) db.transacoes = []; if(!db.templates) db.templates = defaultTemplates; if(!db.log) db.log = []; if(!db.transacoesRemovidas) db.transacoesRemovidas = [];
                  saveDB(); renderSection(currentSection);
                  showToast('Backup restaurado do arquivo! 📁✅');
                  addLog('Backup restaurado via arquivo local');
                  try { confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } }); } catch(e) {}
                } catch(err) { showToast('Arquivo de backup inválido! ❌', 'error'); }
              };
              reader.readAsText(file);
            };
            input.click();
          }
        }

        document.getElementById('sidebarBackup').addEventListener('click', function() { closeSidebar(); backupArquivo(); });
        document.getElementById('sidebarRestore').addEventListener('click', function() { closeSidebar(); restaurarArquivo(); });

        async function ativarCodigoPremium(codigoDigitado) { 
          try { 
            var resp = await fetch(JSONBIN_API_URL+'/latest',{headers:{'X-Master-Key':JSONBIN_MASTER_KEY}}); 
            var data = await resp.json(); 
            var codigos = data.record.codigos; 
            var encontrado = codigos.find(function(c) { return c.codigo === codigoDigitado.trim(); }); 
            if(!encontrado) { showToast('Código inválido! ❌', 'error'); return false; } 
            if(encontrado.usado) { showToast('Código já utilizado! ❌', 'error'); return false; } 
            if(encontrado.expiracao && new Date(encontrado.expiracao) < new Date()) { showToast('Código expirado! ❌', 'error'); return false; } 
            encontrado.usado = true; 
            encontrado.data_ativacao = new Date().toISOString(); 
            await fetch(JSONBIN_API_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_MASTER_KEY},body:JSON.stringify({codigos:codigos})}); 
            planoPro = true; 
            savePro(); 
            showToast('Código ativado! Bem-vindo ao PRO! 🎉'); 
            try { confetti({particleCount:100,spread:80,origin:{y:0.5}}); } catch(e) {} 
            return true; 
          } catch(e) { 
            showToast('Erro ao validar código. Tente novamente.', 'error'); 
            return false; 
          } 
        }

          var listColor = isDark?'#90CAF9':'#0A1929'; 
          var sectionTitle = isDark?'#64B5F6':'#64B5F6'; 
          var html = '<div class="modal-overlay" id="bannerProOverlay"><div class="modal-content banner-pro-wrapper" style="max-width:90vw;padding:0;background:transparent;border:none;box-shadow:none;animation:none;"><div style="background:' + bg + ';border-radius:18px;padding:20px 18px;max-width:100%;margin:20px auto;border:1px solid ' + borderColor + ';box-shadow:0 4px 24px rgba(10,25,41,0.08);"><div style="text-align:center;margin-bottom:14px;"><div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);font-weight:600;margin-bottom:2px;">Owerplay PRO</div><p style="color:' + textSec + ';font-size:0.85rem;margin:0;">Desbloqueie todo o poder do seu gestor</p></div><div style="background:' + cardBg + ';border-radius:14px;padding:14px;text-align:center;margin-bottom:14px;border:1px solid ' + borderColor + ';"><div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.04em;color:' + textSec + ';font-weight:600;margin-bottom:2px;">Plano PRO</div><div style="font-size:1.7rem;font-weight:800;color:' + textColor + ';">R$ 19,90<span style="font-size:0.8rem;color:' + textSec + ';font-weight:500;"> /mês</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px 10px;margin-bottom:14px;"><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:' + listColor + ';">⭐ Clientes ilimitados</div><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:' + listColor + ';">⭐ Servidores ilimitados</div><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:' + listColor + ';">⭐ Backup e restauração</div><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:' + listColor + ';">⭐ Múltiplas mensagens</div><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:' + listColor + ';">⭐ Gráficos e relatórios</div><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:' + listColor + ';">⭐ Histórico financeiro</div></div><div style="background:' + cardBg + ';border-radius:12px;padding:10px;margin-bottom:14px;border:1px dashed ' + dashBorder + ';"><div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.04em;color:' + sectionTitle + ';font-weight:600;margin-bottom:6px;">Já tem um código PRO?</div><div style="display:flex;gap:6px;"><input type="text" class="search-input" id="codigoPremiumInput" placeholder="Digite o código" style="flex:1;background:' + inputBg + ';border-color:' + inputBorder + ';color:' + textColor + ';font-size:0.8rem;padding:8px 12px;"><button class="btn btn-primary" id="ativarCodigoBtn" style="white-space:nowrap;font-size:0.8rem;padding:8px 14px;">Ativar</button></div></div><button class="btn btn-primary" id="btnAssinarPRO" style="width:100%;margin-bottom:6px;padding:10px;font-size:0.85rem;">Quero ser PRO</button><button id="btnWhatsApp" style="width:100%;padding:10px;border-radius:12px;border:1px solid #25D366;background:transparent;color:#25D366;font-weight:600;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:8px;">💬 Assinar via WhatsApp</button><button id="btnTalvezDepois" style="width:100%;padding:8px;border-radius:12px;border:none;background:transparent;color:' + textSec + ';font-weight:500;font-size:0.8rem;cursor:pointer;">Talvez depois</button></div></div></div>'; 
          document.body.insertAdjacentHTML('beforeend', html); 
          document.getElementById('btnAssinarPRO').addEventListener('click', function() { window.open(KIWIFY_LINK, '_blank'); }); 
          document.getElementById('btnWhatsApp').addEventListener('click', function() { window.open(WHATSAPP_LINK, '_blank'); }); 
          document.getElementById('btnTalvezDepois').addEventListener('click', function() { document.getElementById('bannerProOverlay').remove(); }); 
          document.getElementById('ativarCodigoBtn').addEventListener('click', async function() { 
            var codigo = document.getElementById('codigoPremiumInput').value.trim(); 
            if(!codigo) { showToast('Digite um código!', 'warning'); return; } 
            document.getElementById('ativarCodigoBtn').disabled = true; 
            document.getElementById('ativarCodigoBtn').textContent = 'Verificando...'; 
            var ok = await ativarCodigoPremium(codigo); 
            if(ok) { document.getElementById('bannerProOverlay').remove(); renderSection(currentSection); } 
            else { document.getElementById('ativarCodigoBtn').disabled = false; document.getElementById('ativarCodigoBtn').textContent = 'Ativar'; } 
          }); 
          document.getElementById('bannerProOverlay').addEventListener('click', function(e) { if(e.target.id === 'bannerProOverlay') e.target.remove(); }); 
        }

        document.getElementById('sidebarPlanoPRO').addEventListener('click', function() { 
          if(planoPro) { showToast('Você já é PRO! ⭐', 'info'); } 
          else { showBannerPRO(); } 
        });

        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme')||'light');
        
        function renderMensagens() { 
          mainContent.innerHTML = '<button class="back-btn" onclick="window.goBack()"><i data-lucide="chevron-left"></i> Voltar</button><h1 class="section-title">Mensagens</h1><p class="section-subtitle">Comunique-se com seus clientes</p><div class="stat-card" style="margin-bottom:16px;"><h3>📋 Cobrança</h3><p style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:8px;">Tags: {nome}, {sobrenome}, {vencimento}, {valor}, {plano}</p><textarea class="textarea-input" id="tplCobranca" style="min-height:140px;">' + db.templates.cobranca + '</textarea></div><div class="stat-card" style="margin-bottom:20px;"><h3>📋 Renovação</h3><p style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:8px;">Tags: {nome}, {sobrenome}, {vencimento}</p><textarea class="textarea-input" id="tplRenovacao" style="min-height:100px;">' + db.templates.renovacao + '</textarea></div><div style="display:flex;gap:10px;"><button class="btn btn-ghost" style="flex:1;" id="resetTpl">Restaurar Padrão</button><button class="btn btn-primary" style="flex:1;" id="saveTpl">Salvar Templates</button></div>'; 
          lucide.createIcons(); 
          document.getElementById('saveTpl').onclick = function() { 
            db.templates.cobranca = document.getElementById('tplCobranca').value; 
            db.templates.renovacao = document.getElementById('tplRenovacao').value; 
            saveDB(); 
            addLog('Templates atualizados'); 
            showToast('Templates salvos!'); 
          }; 
          document.getElementById('resetTpl').onclick = function() { 
            db.templates.cobranca = defaultTemplates.cobranca; 
            db.templates.renovacao = defaultTemplates.renovacao; 
            saveDB(); 
            renderMensagens(); 
            showToast('Restaurado!', 'info'); 
          }; 
        }

        // ========== SISTEMA DE NOTIFICAÇÕES ==========
        function pluralCliente(n) {
          if(n === 1) return '1 cliente vence hoje';
          if(n === 2) return '2 clientes vencem hoje';
          if(n === 3) return '3 clientes vencem hoje';
          if(n === 4) return '4 clientes vencem hoje';
          return n + ' clientes vencem hoje';
        }

        function verificarVencimentosHoje() {
          var hoje = new Date().toISOString().split('T')[0];
          return db.clientes.filter(function(c) { return c.vencimento === hoje; });
        }

        function mostrarAlertaVisual(clientes) {
          var existing = document.getElementById('notifBanner');
          if(existing) existing.remove();
          if(!clientes.length) return;

          var nomes = clientes.slice(0,2).map(function(c) { return c.nome.split(' ')[0]; }).join(', ');
          var extra = clientes.length > 2 ? ' +' + (clientes.length - 2) : '';
          var temWhats = clientes.filter(function(c){ return c.whatsapp; }).length;

          var banner = document.createElement('div');
          banner.id = 'notifBanner';
          banner.style.cssText = [
            'position:fixed',
            'top:16px',
            'left:50%',
            'transform:translateX(-50%)',
            'z-index:9999',
            'background:var(--bg-secondary)',
            'border:1.5px solid var(--separator-strong)',
            'border-left:4px solid var(--accent)',
            'color:var(--text-primary)',
            'padding:12px 16px',
            'border-radius:var(--radius-md)',
            'box-shadow:var(--shadow-lg)',
            'display:flex',
            'align-items:center',
            'gap:12px',
            'max-width:92vw',
            'width:360px',
            'animation:slideDown .3s cubic-bezier(0.175,0.885,0.32,1.275)'
          ].join(';');

          banner.innerHTML =
            '<div style="width:38px;height:38px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem;">📅</div>' +
            '<div style="flex:1;min-width:0;">' +
              '<div style="font-weight:700;font-size:0.88rem;color:var(--text-primary);">' + pluralCliente(clientes.length) + '</div>' +
              '<div style="font-size:0.75rem;color:var(--text-secondary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + nomes + extra + '</div>' +
            '</div>' +
            '<div style="display:flex;gap:6px;flex-shrink:0;">' +
              (temWhats ? '<button id="btnBannerMassa" style="background:var(--accent);color:white;border:none;border-radius:8px;padding:6px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;">💬 Cobrar</button>' : '') +
              '<button id="btnBannerFechar" style="background:var(--bg-tertiary);border:1px solid var(--separator);color:var(--text-secondary);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;">×</button>' +
            '</div>';

          document.body.appendChild(banner);

          document.getElementById('btnBannerFechar').addEventListener('click', function() { banner.remove(); });
          if(temWhats) {
            document.getElementById('btnBannerMassa').addEventListener('click', function() {
              banner.remove();
              showCobrancaMassaModal();
            });
          }

          setTimeout(function() { if(document.getElementById('notifBanner')) banner.remove(); }, 10000);
        }

        function dispararNotificacaoBrowser(clientes) {
          if(!clientes.length || Notification.permission !== 'granted') return;
          new Notification('📅 Owerplay Gestor', {
            body: pluralCliente(clientes.length) + '!',
            icon: document.querySelector('.login-logo') ? document.querySelector('.login-logo').src : '',
            tag: 'vencimento-hoje'
          });
        }

        function iniciarNotificacoes() {
          var clientes = verificarVencimentosHoje();
          mostrarAlertaVisual(clientes);
          if('Notification' in window) {
            if(Notification.permission === 'granted') {
              dispararNotificacaoBrowser(clientes);
            } else if(Notification.permission !== 'denied') {
              Notification.requestPermission().then(function(perm) {
                if(perm === 'granted') dispararNotificacaoBrowser(clientes);
              });
            }
          }
          setInterval(function() {
            var c = verificarVencimentosHoje();
            mostrarAlertaVisual(c);
          }, 3600000);
        }

        // Carrega dados do Supabase e inicia o app
        carregarDadosSupabase(function() {
          sincronizarTransacoes(); 
          renderSection('dashboard');
          checkMobile();
          atualizarDarkModeText(); 
          atualizarBadgePro(); 
          atualizarIconesPro();
          iniciarNotificacoes();
        });

        function checkMobile() { 
          if(window.innerWidth >= 1024 && sidebar) closeSidebar(); 
          updateFab(); 
        }

        window.addEventListener('resize', checkMobile); 
        checkMobile();

        // Swipe navigation
        (function() {
          var sections = ['dashboard', 'clientes', 'planos', 'servidores', 'financas'];
          var touchStartX = 0;
          var touchStartY = 0;
          
          document.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
          }, { passive: false });
          
          document.addEventListener('touchend', function(e) {
            var touchEndX = e.changedTouches[0].clientX;
            var touchEndY = e.changedTouches[0].clientY;
            var diffX = touchStartX - touchEndX;
            var diffY = touchStartY - touchEndY;
            
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 60) {
              e.preventDefault();
              var currentIndex = sections.indexOf(currentSection);
              if (diffX > 0 && currentIndex < sections.length - 1) {
                navigateTo(sections[currentIndex + 1]);
              } else if (diffX < 0 && currentIndex > 0) {
                navigateTo(sections[currentIndex - 1]);
              }
            }
          }, { passive: false });
        })();

      })();
    }
  </script>
</body>
</html>
