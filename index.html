<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Owerplay Gestor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-card { background: white; width: 100%; max-width: 400px; height: 100%; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        #loginScreen { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        #mainApp { display: none; height: 100%; flex-direction: column; }
        input { width: 90%; padding: 15px; margin: 10px auto; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; background: #fafafa; }
        button { width: 95%; padding: 16px; margin: 20px auto; border-radius: 14px; border: none; background-color: #007AFF; color: white; font-size: 17px; font-weight: 600; cursor: pointer; }
        header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="app-card">
        <!-- TELA DE LOGIN -->
        <div id="loginScreen">
            <h1 style="font-size: 32px; margin-bottom: 5px;">Owerplay</h1>
            <p style="color: #8e8e93; margin-bottom: 30px;">Gestor de Acesso</p>
            <input type="email" id="loginEmail" placeholder="E-mail cadastrado">
            <input type="password" id="loginPassword" placeholder="Senha">
            <button id="btnEntrar" onclick="handleLogin()">Entrar no Sistema</button>
        </div>

        <!-- CONTEÚDO DO APP -->
        <div id="mainApp">
            <header>
                <span style="font-weight: 600;">Owerplay Ativo</span>
                <button onclick="location.reload()" style="width:auto; margin:0; padding:8px 15px; background:#FF3B30; font-size: 13px;">Sair</button>
            </header>
            <div style="padding: 30px; text-align: center;">
                <div style="font-size: 50px; margin-bottom: 20px;">✅</div>
                <h2>Acesso Confirmado!</h2>
                <p id="msgSucesso" style="color: #666;"></p>
                <p>O seu banco de dados Supabase está conectado corretamente.</p>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE - LINHAS ÚNICAS SEM QUEBRA
        const SUPABASE_URL = 'https://auepntbwueklrnqazkhs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1ZXBudGJ3dWVrbHJucWF6a2hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjgzNjcsImV4cCI6MjA5MzI0NDM2N30.3Ux5eLRu2i6_tVDMxREUtcag4coGP6l29RHPippto3Q';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnEntrar');

            if (!email || !password) {
                alert("Por favor, preencha o e-mail e a senha.");
                return;
            }

            btn.innerText = "Verificando...";
            btn.disabled = true;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert("Erro: " + error.message);
                btn.innerText = "Entrar no Sistema";
                btn.disabled = false;
            } else {
                document.getElementById('msgSucesso').innerText = "Usuário: " + data.user.email;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
