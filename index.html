<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <title>Owerplay Gestor</title>
  
  <link rel="icon" type="image/png" href="IMG_20260501_113710.png">
  <link rel="apple-touch-icon" href="IMG_20260501_113710.png">
  <meta name="apple-mobile-web-app-status-bar-style" content="#0288D1">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --accent:       #0288D1; --accent-light: #E1F5FE; --accent-dark:  #01579B;
      --success:      #2E7D32; --success-bg:   #E8F5E9; --warning:      #E65100;
      --warning-bg:   #FFF3E0; --danger:       #C62828; --danger-bg:    #FFEBEE;
      --bg:           #F0F4F8; --surface:      #FFFFFF; --surface2:     #F7FAFC;
      --border:       #E2E8F0; --text:         #1A202C; --text2:        #4A5568;
      --text3:        #718096; --radius:       14px;    --radius-sm:    8px;
      --shadow:       0 2px 12px rgba(0,0,0,.08); --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
    }
    [data-theme="dark"] { --bg:#0F172A; --surface:#1E293B; --surface2:#253047; --border:#334155; --text:#F1F5F9; --text2:#94A3B8; --text3:#64748B; --accent-light:#1E3A5F; --shadow:0 2px 12px rgba(0,0,0,.3); }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{background:#FFFFFF}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
    #app{display:flex;height:100dvh;overflow:hidden}
    
    .sidebar{position:fixed;inset:0;z-index:200;display:flex;pointer-events:none}
    .sidebar-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .4s cubic-bezier(.25,.1,.25,1)}
    .sidebar.open .sidebar-backdrop{background:rgba(0,0,0,.45);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
    .sidebar-panel{width:285px;height:100%;overflow-y:auto;background:rgba(255,255,255,.82);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-right:1px solid rgba(255,255,255,.5);box-shadow:4px 0 40px rgba(0,0,0,.12);display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,16px);transform:translateX(-100%);transition:transform .45s cubic-bezier(.32,.72,0,1);will-change:transform;position:relative;z-index:1}
    [data-theme="dark"] .sidebar-panel{background:rgba(15,23,42,.88);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-right:1px solid rgba(255,255,255,.08);box-shadow:4px 0 40px rgba(0,0,0,.35)}
    .sidebar.open{pointer-events:all}
    .sidebar.open .sidebar-panel{transform:translateX(0);transition:transform .5s cubic-bezier(.16,1,.3,1)}
    .sidebar-header{display:flex;align-items:center;gap:12px;padding:20px 20px 18px;border-bottom:1px solid rgba(0,0,0,.06);margin-bottom:4px}
    [data-theme="dark"] .sidebar-header{border-bottom-color:rgba(255,255,255,.06)}
    .sidebar-logo{width:38px;height:38px;object-fit:cover;border-radius:10px}
    .sidebar-brand{font-size:.95rem;font-weight:800;color:var(--text)}
    .sidebar-close{margin-left:auto;background:rgba(0,0,0,.04);border:none;color:var(--text3);cursor:pointer;padding:8px;border-radius:50%;display:flex;align-items:center;transition:background .2s}
    [data-theme="dark"] .sidebar-close{background:rgba(255,255,255,.06)}
    .sidebar-close:active{background:rgba(0,0,0,.1)}
    .sidebar-section{padding:12px 12px 0}
    .sidebar-section-label{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 10px;margin-bottom:6px}
    .sidebar-item{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--text);cursor:pointer;padding:11px 14px;border-radius:12px;font-family:inherit;font-size:.88rem;font-weight:500;transition:all .18s;text-align:left;position:relative;overflow:hidden}
    .sidebar-item:active{background:rgba(0,0,0,.06);transform:scale(.97)}
    [data-theme="dark"] .sidebar-item:active{background:rgba(255,255,255,.06)}
    .sidebar-item.danger{color:var(--danger)}
    .sidebar-divider{height:1px;background:rgba(0,0,0,.06);margin:8px 20px}
    [data-theme="dark"] .sidebar-divider{background:rgba(255,255,255,.06)}
    .sidebar-panel::-webkit-scrollbar{width:3px}
    .sidebar-panel::-webkit-scrollbar-track{background:transparent}
    .sidebar-panel::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
    [data-theme="dark"] .sidebar-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}

    .topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;height:62px;gap:12px}
    .topbar-menu{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;border-radius:8px;display:flex;align-items:center;flex-shrink:0}
    .topbar-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
    .topbar-brand{font-family:'Poppins',sans-serif;font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;letter-spacing:-0.5px}
    [data-theme="dark"] .topbar-brand{background:linear-gradient(135deg,#38BDF8,#0EA5E9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .topbar-slogan{font-size:0.55rem;font-weight:500;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;margin-top:5px}
    .main-wrap{flex:1;display:flex;flex-direction:column;width:100%;overflow:hidden}
    #mainContent{flex:1;overflow-y:auto;padding:16px 16px 100px;-webkit-overflow-scrolling:touch}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;background:none;border:none;cursor:pointer;color:var(--text3);font-family:inherit;font-size:.6rem;font-weight:600;transition:color .15s}
    .nav-btn.active{color:var(--accent)}.nav-btn i{transition:transform .15s}.nav-btn.active i{transform:scale(1.15)}
    #fab{position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom,0px) + 74px);z-index:150;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(2,136,209,.4);display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s}
    #fab:active{transform:scale(.93)}#fab.hidden{display:none}
    
    .card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border)}.card+.card{margin-top:10px}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .stat-card{background:var(--surface);border-radius:var(--radius);padding:14px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .12s;position:relative;overflow:hidden}
    .stat-card:active{transform:scale(.97)}.stat-label{font-size:.7rem;font-weight:600;color:var(--text3);margin-bottom:4px}
    .stat-value{font-size:1.5rem;font-weight:800;color:var(--text)}.stat-value.green{color:var(--success)}.stat-value.red{color:var(--danger)}.stat-value.orange{color:var(--warning)}
    .lucro-card{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);border-radius:var(--radius);padding:20px;color:#fff;margin-bottom:14px;cursor:default;box-shadow:0 6px 24px rgba(2,136,209,.35);transition:transform .12s;position:relative}
    .lucro-label{font-size:.75rem;font-weight:600;opacity:.8;margin-bottom:4px}.lucro-value{font-size:2rem;font-weight:800}
    .lucro-eye{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px;cursor:pointer;display:flex}
    .client-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px;margin-bottom:10px;box-shadow:var(--shadow);animation:fadeUp .2s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .client-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .avatar{width:36px;height:36px;border-radius:50%;background:var(--accent-light);color:var(--accent-dark);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;flex-shrink:0}
    .client-name{font-weight:700;font-size:.85rem}.client-sub{font-size:.68rem;color:var(--text3);margin-top:1px}
    .badge{display:inline-flex;align-items:center;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:99px;flex-shrink:0}
    .badge-ok{background:var(--success-bg);color:var(--success)}.badge-exp{background:var(--danger-bg);color:var(--danger)}.badge-today{background:var(--warning-bg);color:var(--warning)}
    .client-footer{display:flex;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);font-size:.72rem;color:var(--text3)}
    .client-actions{display:flex;gap:5px;margin-top:10px}
    .action-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:7px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text2);font-size:.65rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
    .action-btn:active{background:var(--surface2)}
    .action-btn.nota-destaque{border-color:#EF5350;background:var(--danger-bg);color:var(--danger);font-weight:700}
    [data-theme="dark"] .action-btn.nota-destaque{background:rgba(198,40,40,.15);border-color:#EF5350;color:#EF5350}
    
    .input{width:100%;padding:11px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.9rem;outline:none;transition:border-color .15s}
    .input:focus{border-color:var(--accent)}.input[type="date"]{color-scheme:light dark}select.input option{background:var(--surface);color:var(--text)}
    .field{margin-bottom:12px}.field-label{display:block;font-size:.75rem;font-weight:700;color:var(--text2);margin-bottom:5px}
    .search-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;margin-bottom:14px}
    .search-bar input{flex:1;border:none;background:none;padding:11px 0;color:var(--text);font-family:inherit;font-size:.9rem;outline:none}.search-bar i{color:var(--text3);flex-shrink:0}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:700;transition:transform .12s,opacity .12s}
    .btn:active{transform:scale(.96)}.btn-primary{background:var(--accent);color:#fff}.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}.btn-ghost{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}.btn-full{width:100%}
    .modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;padding:16px;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:var(--surface);border-radius:20px 20px 16px 16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:24px 20px 28px;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
    @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-title{font-size:1.1rem;font-weight:800;margin-bottom:18px}.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px}
    .modal-actions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
    .empty-state{text-align:center;padding:48px 24px;color:var(--text3)}.empty-state i{margin-bottom:12px;opacity:.4}.empty-state p{font-size:.9rem;margin-bottom:16px}
    .filter-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);color:var(--accent-dark);font-size:.75rem;font-weight:700;padding:5px 10px;border-radius:99px;margin-bottom:12px}
    .filter-badge button{background:none;border:none;cursor:pointer;color:var(--accent-dark);display:flex;padding:0}
    
    #toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--surface);color:var(--text);padding:14px 18px;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);font-size:.85rem;font-weight:600;z-index:9999;opacity:0;transition:all .35s cubic-bezier(.175,.885,.32,1.275);white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:12px;border-left:4px solid var(--border);max-width:90vw}
    [data-theme="dark"] #toast{box-shadow:0 8px 32px rgba(0,0,0,.4)}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.success{border-left-color:var(--success)}
    #toast.error{border-left-color:var(--danger)}
    #toast.warning{border-left-color:var(--warning)}
    .toast-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700}
    .toast-icon.success{background:var(--success-bg);color:var(--success)}
    .toast-icon.error{background:var(--danger-bg);color:var(--danger)}
    .toast-icon.warning{background:var(--warning-bg);color:var(--warning)}
    [data-theme="dark"] .toast-icon.success{background:rgba(46,125,50,.2);color:#4CAF50}
    [data-theme="dark"] .toast-icon.error{background:rgba(198,40,40,.2);color:#EF5350}
    [data-theme="dark"] .toast-icon.warning{background:rgba(230,81,0,.2);color:#FF9800}

    .finance-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
    .fin-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 10px;text-align:center}
    .fin-stat-label{font-size:.65rem;font-weight:700;color:var(--text3);margin-bottom:3px}.fin-stat-value{font-size:1rem;font-weight:800}
    .trans-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.83rem}.trans-row:last-child{border-bottom:none}
    .trans-desc{font-weight:600;color:var(--text)}.trans-date{font-size:.7rem;color:var(--text3);margin-top:1px}.trans-amount{font-weight:700}.trans-amount.saida{color:var(--danger)}
    .log-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.8rem}.log-row:last-child{border-bottom:none}
    .log-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}.log-msg{color:var(--text);flex:1}.log-date{color:var(--text3);font-size:.68rem;flex-shrink:0}
    .list-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px}
    .list-item-main{font-weight:700;font-size:.9rem}.list-item-sub{font-size:.75rem;color:var(--text3);margin-top:2px}.list-item-actions{display:flex;gap:6px}
    .icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px;cursor:pointer;color:var(--text2);display:flex}
    
    .daily-alert-overlay {position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease}
    .daily-alert {background:var(--surface);border-radius:20px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:alertBounce .4s cubic-bezier(.175,.885,.32,1.275)}
    @keyframes alertBounce{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
    .alert-header {background:linear-gradient(135deg,#E65100,#BF360C);color:#fff;padding:20px 20px 16px;border-radius:20px 20px 0 0;display:flex;align-items:center;gap:12px}
    .alert-icon-alert {width:42px;height:42px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .alert-title {font-size:1.1rem;font-weight:800}.alert-subtitle {font-size:.78rem;opacity:.9;margin-top:2px}
    .alert-body {padding:16px 20px}
    .alert-client-item {display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:8px;margin-bottom:4px}
    .alert-client-item:hover{background:var(--surface2)}.alert-client-item:last-child{border-bottom:none;margin-bottom:0}
    .alert-avatar {width:36px;height:36px;border-radius:50%;background:var(--warning-bg);color:var(--warning);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0}
    .alert-client-info {flex:1;min-width:0}.alert-client-name {font-weight:600;font-size:.85rem;color:var(--text)}.alert-client-plan {font-size:.7rem;color:var(--text3);margin-top:1px}
    .alert-amount {font-weight:700;font-size:.85rem;color:var(--warning);flex-shrink:0}
    .alert-footer {padding:16px 20px;display:flex;gap:10px}.alert-footer .btn{flex:1}

    .timeline {position:relative;padding-left:28px}
    .timeline::before {content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:var(--border)}
    .timeline-item {position:relative;margin-bottom:16px}.timeline-item:last-child{margin-bottom:0}
    .timeline-dot {position:absolute;left:-21px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--surface);z-index:1}
    .timeline-dot.green{background:var(--success)}.timeline-dot.red{background:var(--danger)}.timeline-dot.orange{background:var(--warning)}.timeline-dot.blue{background:var(--accent)}
    .timeline-content {background:var(--surface2);border-radius:10px;padding:10px 12px}
    .timeline-date {font-size:.7rem;color:var(--text3);font-weight:600;margin-bottom:4px}
    .timeline-info {font-size:.78rem;color:var(--text);font-weight:500}
    .timeline-value {font-size:.75rem;color:var(--success);font-weight:700;margin-top:2px}
    .timeline-badge {display:inline-block;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:4px}
    .timeline-badge.first{background:var(--accent-light);color:var(--accent-dark)}.timeline-badge.late{background:var(--danger-bg);color:var(--danger)}
    .inadim-summary {display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
    .inadim-summary-item {background:var(--surface2);border-radius:10px;padding:12px 8px;text-align:center}
    .inadim-summary-value {font-size:1.3rem;font-weight:800;color:var(--text)}.inadim-summary-label {font-size:.6rem;font-weight:700;color:var(--text3);text-transform:uppercase;margin-top:2px}
    .inadim-group-title {font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;margin-top:16px;display:flex;align-items:center;gap:6px}
    .inadim-group-title:first-child{margin-top:0}
    .inadim-dot {width:8px;height:8px;border-radius:50%;display:inline-block}
    .inadim-dot.critico{background:var(--danger)}.inadim-dot.atencao{background:var(--warning)}.inadim-dot.recente{background:#F59E0B}
    .inadim-client-card {background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
    .inadim-client-info {flex:1;min-width:0}.inadim-client-name {font-weight:700;font-size:.85rem}.inadim-client-detail {font-size:.7rem;color:var(--text3);margin-top:2px}
    .inadim-client-value {font-weight:700;font-size:.85rem;color:var(--danger);flex-shrink:0}
    .inadim-actions {display:flex;gap:6px;margin-top:4px}
    .inadim-btn {font-size:.65rem;padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-weight:600;display:flex;align-items:center;gap:4px}
    .inadim-btn.cobrar{background:var(--success-bg);color:var(--success)}.inadim-btn.nota{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

    .lembrete-item-ui {display:flex;align-items:flex-start;gap:10px;padding:10px 8px;background:var(--surface2);border-radius:10px;margin-bottom:6px;transition:all .15s}
    .lembrete-check{width:20px;height:20px;border:2px solid #CBD5E1;border-radius:6px;flex-shrink:0;margin-top:1px;transition:all .15s;display:flex;align-items:center;justify-content:center;cursor:pointer}
    [data-theme="dark"] .lembrete-check{border-color:#475569}
    .lembrete-check.feito{background:var(--success);border-color:var(--success);color:#fff;font-size:12px}
    .lembrete-texto{flex:1;font-size:.83rem;color:var(--text);font-weight:500;word-break:break-word;cursor:pointer;padding:1px 0}
    .lembrete-texto.feito{text-decoration:line-through;color:var(--text3)}
    .lembrete-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0;transition:all .15s;display:flex;align-items:center}
    .lembrete-del:active{background:rgba(0,0,0,.05);color:var(--danger)}
    .lembrete-input-wrap{width:100%;padding:10px 12px;border-radius:10px;border:2px dashed var(--border);background:none;font-family:inherit;font-size:.85rem;outline:none;transition:border-color .15s;margin-bottom:14px;color:var(--text)}
    .lembrete-input-wrap:focus{border-color:var(--accent)}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>

<script>
(function(){'use strict';
var STORAGE_KEY='owerplay_v3';
var DEFAULT_TEMPLATES={cobranca:"Olá {primeiro_nome}, Bom dia!\nSeu plano de tv vence hoje *{vencimento}*\n\n⚠️ *Na data do vencimento, o sistema poderá bloquear automaticamente a qualquer momento, renove assim que possível!*\n\nDADOS PARA PAGAMENTO:\nValor: *R${valor}*\nPix:\nBanco:\n\n✅ *Favor enviar comprovante*",renovacao:"📌 Obrigado pela confiança!\n✅ Sua assinatura foi renovada com sucesso!\n🗓️ PRÓXIMO VENCIMENTO: *{vencimento}*"};
var db={clientes:[],planos:[],servidores:[],transacoes:[],log:[],lembretes:[],templates:Object.assign({},DEFAULT_TEMPLATES)};
var currentSec='dashboard',cliFilter=null,darkMode=false,lucroOculto=false,chartInst=null;
function loadDB(){try{var raw=localStorage.getItem(STORAGE_KEY);if(raw){var saved=JSON.parse(raw);db=Object.assign({clientes:[],planos:[],servidores:[],transacoes:[],log:[],lembretes:[],templates:Object.assign({},DEFAULT_TEMPLATES)},saved);if(!db.templates)db.templates=Object.assign({},DEFAULT_TEMPLATES);if(!db.lembretes)db.lembretes=[]}}catch(e){}darkMode=localStorage.getItem('ow_dark')==='1';lucroOculto=localStorage.getItem('ow_lucroOc')==='1';applyDark()}
function saveDB(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(db))}catch(e){}}
function autoSincTrans(){var m=monthStr(0);db.transacoes=db.transacoes.filter(function(t){if(!t.data||!t.data.startsWith(m))return true;if(!t.clienteId)return true;return db.clientes.some(function(c){return c.id===t.clienteId})});db.clientes.forEach(function(c){var p=db.planos.find(function(x){return x.id===c.planoId});var s=db.servidores.find(function(x){return x.id===c.servidorId});if(p){var valEntrada=p.valor-(c.desconto||0);if(valEntrada>0&&!db.transacoes.some(function(t){return t.clienteId===c.id&&t.tipo==='entrada'&&t.data.startsWith(m)})){db.transacoes.push({id:'t'+Date.now()+Math.random().toString(36).slice(2),clienteId:c.id,tipo:'entrada',valor:valEntrada,data:today(),desc:'Mensalidade '+c.nome})}}if(s&&s.valor){if(!db.transacoes.some(function(t){return t.clienteId===c.id&&t.servId===s.id&&t.tipo==='saida'&&t.data.startsWith(m)})){db.transacoes.push({id:'t'+Date.now()+Math.random().toString(36).slice(2),clienteId:c.id,servId:s.id,tipo:'saida',valor:s.valor,data:today(),desc:'Servidor: '+s.nome+' ('+c.nome+')'})}}});saveDB()}
function addLog(msg){db.log.unshift({msg:msg,ts:new Date().toLocaleString('pt-BR')});if(db.log.length>80)db.log.pop()}
function applyDark(){document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');localStorage.setItem('ow_dark',darkMode?'1':'0');var el=document.getElementById('darkModeLabel');if(el)el.textContent=darkMode?'Modo Claro':'Modo Escuro'}
function toast(msg,type){var el=document.getElementById('toast');if(!el)return;var icon='';var iconSpan='';if(type==='success'){icon='✓';iconSpan='<span class="toast-icon success">'+icon+'</span>'}else if(type==='error'){icon='✕';iconSpan='<span class="toast-icon error">'+icon+'</span>'}else if(type==='warning'){icon='!';iconSpan='<span class="toast-icon warning">'+icon+'</span>'}else{iconSpan=''}el.innerHTML=iconSpan+'<span>'+msg+'</span>';el.className='show '+(type||'');clearTimeout(toast._t);toast._t=setTimeout(function(){el.className='';el.innerHTML=''},2800)}
function icons(){if(window.lucide)lucide.createIcons()}
function openSidebar(){document.getElementById('sidebar').classList.add('open')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open')}
function navigateTo(sec,filter){currentSec=sec;cliFilter=filter||null;closeSidebar();document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.dataset.sec===sec)});var fab=document.getElementById('fab');if(fab)fab.className=(sec==='financas')?'hidden':'';render(sec)}
function render(sec){var mc=document.getElementById('mainContent');if(!mc)return;mc.scrollTop=0;if(sec==='dashboard')renderDashboard(mc);else if(sec==='clientes')renderClientes(mc);else if(sec==='planos')renderPlanos(mc);else if(sec==='servidores')renderServidores(mc);else if(sec==='financas')renderFinancas(mc);icons()}

function verificarVencimentosHoje(){var hoje=today();var clientesHoje=db.clientes.filter(function(c){return c.vencimento===hoje});if(clientesHoje.length>0){mostrarAlertaDiario(clientesHoje)}}
function mostrarAlertaDiario(clientesHoje){var alertaAnterior=document.getElementById('dailyAlertOverlay');if(alertaAnterior)alertaAnterior.remove();var clientesHtml=clientesHoje.map(function(c){var plano=db.planos.find(function(p){return p.id===c.planoId})||{};var serv=db.servidores.find(function(s){return s.id===c.servidorId})||{};var valor=(plano.valor||0)-(c.desconto||0);var partes=(c.nome||'?').trim().split(' ').filter(function(n){return n.length>0});var ini=(partes.length>=2?partes[0][0]+partes[partes.length-1][0]:(partes[0]||'?').substring(0,2)).toUpperCase();return'<div class="alert-client-item" onclick="window._fecharAlertaDiario(); window._wp(\''+esc(c.id)+'\')"><div class="alert-avatar">'+ini+'</div><div class="alert-client-info"><div class="alert-client-name">'+esc(c.nome)+'</div><div class="alert-client-plan">'+esc(plano.nome||'Sem plano')+' · '+esc(serv.nome||'Sem servidor')+'</div></div><div class="alert-amount">R$ '+fmt(valor)+'</div></div>'}).join('');var totalValor=clientesHoje.reduce(function(soma,c){var plano=db.planos.find(function(p){return p.id===c.planoId})||{};return soma+((plano.valor||0)-(c.desconto||0))},0);var overlay=document.createElement('div');overlay.id='dailyAlertOverlay';overlay.className='daily-alert-overlay';overlay.innerHTML='<div class="daily-alert"><div class="alert-header"><div class="alert-icon-alert"><i data-lucide="bell" width="22" height="22" style="color:#fff"></i></div><div><div class="alert-title">Vencimentos Hoje!</div><div class="alert-subtitle">'+clientesHoje.length+' cliente'+(clientesHoje.length>1?'s':'')+' · Total: R$ '+fmt(totalValor)+'</div></div></div><div class="alert-body">'+clientesHtml+'</div><div class="alert-footer"><button class="btn btn-ghost" onclick="window._fecharAlertaDiario()">Fechar</button>'+(clientesHoje.some(function(c){return c.whatsapp})?'<button class="btn btn-primary" onclick="window._cobrarTodosAlerta()"><i data-lucide="send" width="14" height="14"></i> Cobrar Todos</button>':'')+'</div></div>';document.body.appendChild(overlay);overlay.addEventListener('click',function(e){if(e.target===overlay){fecharAlertaDiario()}});icons()}
function fecharAlertaDiario(){var overlay=document.getElementById('dailyAlertOverlay');if(overlay){overlay.style.opacity='0';overlay.style.transition='opacity 0.2s';setTimeout(function(){overlay.remove()},200)}}
function cobrarTodosAlerta(){var hoje=today();var clientesHoje=db.clientes.filter(function(c){return c.vencimento===hoje&&c.whatsapp});fecharAlertaDiario();if(clientesHoje.length===0){toast('Nenhum cliente com WhatsApp','warning');return}var delay=0;clientesHoje.forEach(function(c){setTimeout(function(){sendWA(c,'cobranca')},delay);delay+=2500});toast('Abrindo WhatsApp para '+clientesHoje.length+' cliente(s)...','success')}

function renderDashboard(mc){
  var hoje=today(),mesAtual=hoje.slice(0,7);
  var ent=sumTrans('entrada',mesAtual),sai=sumTrans('saida',mesAtual),lucro=ent-sai;
  var ativos=db.clientes.filter(function(c){return c.vencimento>=hoje}).length;
  var venc=db.clientes.filter(function(c){return c.vencimento<hoje}).length;
  var hj=db.clientes.filter(function(c){return c.vencimento===hoje}).length;
  var lv=lucroOculto?'••••••':'R$ '+fmt(lucro);
  var eyeIcon=lucroOculto?'eye-off':'eye';
  mc.innerHTML='<div class="lucro-card"><button class="lucro-eye" onclick="window._toggleLucro()"><i data-lucide="'+eyeIcon+'" width="16" height="16"></i></button><div class="lucro-label">💰 Lucro do Mês</div><div class="lucro-value" id="lucroVal">'+lv+'</div></div><div class="stat-grid">'+statCard('✅ Ativos',ativos,'',"window._filter('active')")+statCard('⚠️ Vencidos',venc,'red',"window._filter('expired')")+statCard('📅 Hoje',hj,'orange',"window._filter('today')")+statCard('👥 Total',db.clientes.length,'',"window._filter('all')")+'</div><div style="margin-bottom:10px;"><div class="search-bar"><i data-lucide="search" width="16" height="16"></i><input id="dashSearch" placeholder="Buscar cliente..." autocomplete="off"></div><div id="dashCards"></div></div>';
  renderCards('dashCards',db.clientes,hoje);
  var inp=document.getElementById('dashSearch');
  if(inp)inp.addEventListener('input',function(){var q=this.value.trim().toLowerCase();var list=q?db.clientes.filter(function(c){return c.nome.toLowerCase().includes(q)||(c.whatsapp&&c.whatsapp.includes(q))}):db.clientes;renderCards('dashCards',list,today())})
}
function statCard(label,val,color,onclick){return'<div class="stat-card" onclick="'+onclick+'"><div class="stat-label">'+label+'</div><div class="stat-value'+(color?' '+color:'')+'">'+val+'</div></div>'}
function renderClientes(mc){var hoje=today(),list=db.clientes.slice(),filterLabel='';if(cliFilter==='active'){list=list.filter(function(c){return c.vencimento>=hoje});filterLabel='Ativos'}if(cliFilter==='expired'){list=list.filter(function(c){return c.vencimento<hoje});filterLabel='Vencidos'}if(cliFilter==='today'){list=list.filter(function(c){return c.vencimento===hoje});filterLabel='Hoje'}if(cliFilter==='all'){filterLabel='Todos'}var filterHtml=filterLabel?'<div class="filter-badge">'+filterLabel+' ('+list.length+')<button onclick="window._clearFilter()"><i data-lucide="x" width="12" height="12"></i></button></div>':'';mc.innerHTML=filterHtml+'<div class="search-bar"><i data-lucide="search" width="16" height="16"></i><input id="cliSearch" placeholder="Buscar por nome ou WhatsApp..." autocomplete="off"></div><div id="cliCards"></div>';var snapshot=list.slice();renderCards('cliCards',snapshot,hoje);var inp=document.getElementById('cliSearch');if(inp)inp.addEventListener('input',function(){var q=this.value.trim().toLowerCase();var filtered=q?snapshot.filter(function(c){return c.nome.toLowerCase().includes(q)||(c.whatsapp&&c.whatsapp.includes(q))}):snapshot;renderCards('cliCards',filtered,today())})}
function renderCards(containerId,list,hoje){var cont=document.getElementById(containerId);if(!cont)return;if(list.length===0){cont.innerHTML='<div class="empty-state"><i data-lucide="user-round" width="48" height="48"></i><p>Nenhum cliente encontrado</p></div>';icons();return}var sorted=list.slice().sort(function(a,b){return a.vencimento.localeCompare(b.vencimento)});cont.innerHTML=sorted.map(function(c,i){var plano=db.planos.find(function(p){return p.id===c.planoId})||{};var serv=db.servidores.find(function(s){return s.id===c.servidorId})||{};var partes=(c.nome||'?').trim().split(' ').filter(function(n){return n.length>0});var ini=(partes.length>=2?partes[0][0]+partes[partes.length-1][0]:(partes[0]||'?').substring(0,2)).toUpperCase();var badge=c.vencimento<hoje?'<span class="badge badge-exp">Vencido</span>':c.vencimento===hoje?'<span class="badge badge-today">Hoje</span>':'<span class="badge badge-ok">Ativo</span>';var valor=((plano.valor||0)-(c.desconto||0));var cid=esc(c.id);var temNota=(c.anotacoes&&c.anotacoes.trim())?' nota-destaque':'';return'<div class="client-card" style="animation-delay:'+(i*0.035)+'s"><div class="client-card-header"><div class="avatar">'+ini+'</div><div style="flex:1;min-width:0"><div class="client-name">'+esc(c.nome)+'</div><div class="client-sub">'+esc(plano.nome||'Sem plano')+' · '+esc(serv.nome||'Sem servidor')+'</div></div>'+badge+'</div><div class="client-footer"><span>📅 '+fmtDate(c.vencimento)+'</span><span>R$ '+fmt(valor)+'</span></div><div class="client-actions">'+(c.whatsapp?'<button class="action-btn" onclick="window._wp(\''+cid+'\')"><i data-lucide="message-circle" width="13" height="13"></i>WhatsApp</button>':'')+'<button class="action-btn" onclick="window._renovar(\''+cid+'\')"><i data-lucide="rotate-cw" width="13" height="13"></i>Renovar</button><button class="action-btn'+temNota+'" onclick="window._nota(\''+cid+'\')"><i data-lucide="file-text" width="13" height="13"></i>Nota</button><button class="action-btn" onclick="window._editar(\''+cid+'\')"><i data-lucide="pencil" width="13" height="13"></i>Editar</button><button class="action-btn" onclick="window._excluir(\''+cid+'\')"><i data-lucide="trash-2" width="13" height="13"></i></button></div></div>'}).join('');icons()}
function renderPlanos(mc){var html=db.planos.map(function(p){return'<div class="list-item"><div><div class="list-item-main">'+esc(p.nome)+'</div><div class="list-item-sub">R$ '+fmt(p.valor)+'</div></div><div class="list-item-actions"><button class="icon-btn" onclick="window._editPlano(\''+p.id+'\')"><i data-lucide="pencil" width="15" height="15"></i></button><button class="icon-btn" onclick="window._delPlano(\''+p.id+'\')"><i data-lucide="trash-2" width="15" height="15"></i></button></div></div>'}).join('');mc.innerHTML=(html||'<div class="empty-state"><i data-lucide="layers" width="48" height="48"></i><p>Nenhum plano cadastrado</p></div>')}
function renderServidores(mc){var html=db.servidores.map(function(s){return'<div class="list-item"><div><div class="list-item-main">'+esc(s.nome)+'</div><div class="list-item-sub">'+(s.valor?'Custo: R$ '+fmt(s.valor):'Sem custo')+'</div></div><div class="list-item-actions"><button class="icon-btn" onclick="window._editServ(\''+s.id+'\')"><i data-lucide="pencil" width="15" height="15"></i></button><button class="icon-btn" onclick="window._delServ(\''+s.id+'\')"><i data-lucide="trash-2" width="15" height="15"></i></button></div></div>'}).join('');mc.innerHTML=(html||'<div class="empty-state"><i data-lucide="server" width="48" height="48"></i><p>Nenhum servidor cadastrado</p></div>')}
function renderFinancas(mc){var m=monthStr(0),mant=monthStr(-1);var ent=sumTrans('entrada',m),sai=sumTrans('saida',m),luc=ent-sai;var entA=sumTrans('entrada',mant),saiA=sumTrans('saida',mant),lucA=entA-saiA;var cresc=lucA!==0?((luc-lucA)/Math.abs(lucA)*100):(luc>0?100:0);var crescTxt=(cresc>=0?'+':'')+cresc.toFixed(1)+'%';var recent=db.transacoes.slice().sort(function(a,b){if(a.data>b.data)return-1;if(a.data<b.data)return 1;if(a.id>b.id)return-1;if(a.id<b.id)return 1;return 0}).slice(0,20);var transHtml=recent.length?recent.map(function(t){var c=db.clientes.find(function(x){return x.id===t.clienteId});var nome=t.desc||(c?c.nome:'—');var cor=t.tipo==='entrada'?'#0288D1':'var(--danger)';return'<div class="trans-row"><div><div class="trans-desc">'+esc(nome)+'</div><div class="trans-date">'+fmtDate(t.data)+'</div></div><div class="trans-amount" style="color:'+cor+'">'+(t.tipo==='entrada'?'+':'-')+' R$ '+fmt(t.valor)+'</div></div>'}).join(''):'<p style="color:var(--text3);font-size:.85rem;padding:12px 0;">Nenhuma transação</p>';mc.innerHTML='<div class="finance-stat-row">'+finStat('Entradas','R$ '+fmt(ent),'var(--accent)')+finStat('Saídas','R$ '+fmt(sai),'var(--danger)')+finStat('Lucro','R$ '+fmt(luc),luc>=0?'var(--success)':'var(--danger)')+'</div><div class="card" style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><div style="font-size:.8rem;font-weight:700;color:var(--text3);">vs mês anterior</div><div style="font-size:.85rem;font-weight:700;color:'+(cresc>=0?'var(--success)':'var(--danger)')+';">'+crescTxt+'</div></div><div style="position:relative;height:170px;"><canvas id="finChart"></canvas></div></div><div class="card" style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div style="font-weight:700;">Transações Recentes</div><button onclick="window._addTrans()" style="background:var(--accent);color:#fff;border:none;border-ra // FUNÇÃO ENVIAR WHATSAPP CORRIGIDA (APK + LIMPEZA DE EMOJIS)
function sendWA(c,tipo){
  var p=db.planos.find(function(x){return x.id===c.planoId});
  var val=p?(p.valor-(c.desconto||0)):0;
  var tpl=db.templates[tipo]||'';
  var primeiroNome=c.nome.trim().split(' ')[0];
  var msg=tpl.replace(/{primeiro_nome}/g,primeiroNome).replace(/{nome}/g,c.nome).replace(/{vencimento}/g,fmtDate(c.vencimento)).replace(/{valor}/g,fmt(val));
  // Limpeza de emojis problemáticos no WebView
  msg=msg.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{2B50}\u{2764}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}]/gu,'');
  var num=c.whatsapp.replace(/\D/g,'');
  var url='https://wa.me/'+num+'?text='+encodeURIComponent(msg);
  // Tenta intent primeiro (APK), fallback para navegador
  try{
    var intent='intent://send?phone='+num+'&text='+encodeURIComponent(msg)+'#Intent;scheme=whatsapp;package=com.whatsapp;end';
    window.location.href=intent;
    setTimeout(function(){window.open(url,'_blank')},700);
  }catch(e){
    window.open(url,'_blank');
  }
}

function modalInadimplencia(){var hoje=today();var vencidos=db.clientes.filter(function(c){return c.vencimento<hoje}).sort(function(a,b){return a.vencimento.localeCompare(b.vencimento)});if(vencidos.length===0){var body='<div class="empty-state"><i data-lucide="check-circle" width="40" height="40" style="color:var(--success)"></i><p>Nenhum cliente inadimplente! 🎉</p></div>';showModal('inadim','⚠️ Inadimplência',body,'<button class="btn btn-ghost btn-full" onclick="window._closeModal(\'inadim\')">Fechar</button>');return}var totalEmAberto=0;var somaDias=0;var criticos=[];var atencao=[];var recentes=[];vencidos.forEach(function(c){var p=db.planos.find(function(x){return x.id===c.planoId})||{};var valor=(p.valor||0)-(c.desconto||0);totalEmAberto+=valor;var dias=Math.floor((new Date(hoje)-new Date(c.vencimento))/86400000);somaDias+=dias;var clienteInfo={id:c.id,nome:c.nome,dias:dias,valor:valor,vencimento:c.vencimento,whatsapp:c.whatsapp};if(dias>7){criticos.push(clienteInfo)}else if(dias>=3){atencao.push(clienteInfo)}else{recentes.push(clienteInfo)}});var mediaDias=Math.round(somaDias/vencidos.length);function criarCardCliente(cli){return'<div class="inadim-client-card"><div class="inadim-client-info"><div class="inadim-client-name">'+esc(cli.nome)+'</div><div class="inadim-client-detail">'+cli.dias+' dia'+(cli.dias>1?'s':'')+' em atraso · Venceu '+fmtDate(cli.vencimento)+'</div><div class="inadim-actions">'+(cli.whatsapp?'<button class="inadim-btn cobrar" onclick="window._closeModal(\'inadim\'); window._wp(\''+esc(cli.id)+'\')"><i data-lucide="message-circle" width="11" height="11"></i> Cobrar</button>':'')+'<button class="inadim-btn nota" onclick="window._closeModal(\'inadim\'); window._nota(\''+esc(cli.id)+'\')"><i data-lucide="file-text" width="11" height="11"></i> Nota</button></div></div><div class="inadim-client-value">R$ '+fmt(cli.valor)+'</div></div>'}var sectionsHtml='';if(criticos.length>0){sectionsHtml+='<div class="inadim-group-title"><span class="inadim-dot critico"></span> 🔴 CRÍTICO (+7 dias)</div>';sectionsHtml+=criticos.map(criarCardCliente).join('')}if(atencao.length>0){sectionsHtml+='<div class="inadim-group-title"><span class="inadim-dot atencao"></span> 🟠 ATENÇÃO (3-7 dias)</div>';sectionsHtml+=atencao.map(criarCardCliente).join('')}if(recentes.length>0){sectionsHtml+='<div class="inadim-group-title"><span class="inadim-dot recente"></span> 🟡 RECENTE (1-2 dias)</div>';sectionsHtml+=recentes.map(criarCardCliente).join('')}var temWhatsApp=vencidos.some(function(c){return c.whatsapp});var body='<div class="inadim-summary"><div class="inadim-summary-item"><div class="inadim-summary-value" style="color:var(--danger)">'+vencidos.length+'</div><div class="inadim-summary-label">Em Atraso</div></div><div class="inadim-summary-item"><div class="inadim-summary-value">R$ '+fmt(totalEmAberto)+'</div><div class="inadim-summary-label">Total Aberto</div></div><div class="inadim-summary-item"><div class="inadim-summary-value">'+mediaDias+'d</div><div class="inadim-summary-label">Média Atraso</div></div></div>'+sectionsHtml;var actions='<button class="btn btn-ghost btn-full" onclick="window._closeModal(\'inadim\')">Fechar</button>'+(temWhatsApp?'<button class="btn btn-primary btn-full" onclick="window._cobrancaInadimplencia()"><i data-lucide="send" width="14" height="14"></i> Cobrar Todos</button>':'');showModal('inadim','⚠️ Central de Cobrança',body,actions)}
function cobrancaInadimplencia(){closeModal('inadim');var hoje=today();var vencidos=db.clientes.filter(function(c){return c.vencimento<hoje&&c.whatsapp});if(vencidos.length===0){toast('Nenhum cliente com WhatsApp','warning');return}var delay=0;vencidos.forEach(function(c){setTimeout(function(){sendWA(c,'cobranca')},delay);delay+=2500});toast('Abrindo WhatsApp para '+vencidos.length+' cliente(s)...','success')}
function modalCobrancaMassa(){var hoje=today();var hoje_clientes=db.clientes.filter(function(c){return c.vencimento===hoje&&c.whatsapp});if(!hoje_clientes.length){toast('Nenhum cliente com WhatsApp vence hoje','warning');return}var checks=hoje_clientes.map(function(c){return'<label style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;"><input type="checkbox" class="massa-check" data-id="'+esc(c.id)+'" checked style="width:18px;height:18px;accent-color:var(--accent);"><span style="font-size:.88rem;font-weight:600;">'+esc(c.nome)+'</span></label>'}).join('');var body='<div style="margin-bottom:12px;font-size:.85rem;color:var(--text2);">'+hoje_clientes.length+' cliente(s) vencem hoje com WhatsApp:</div>'+checks;showModal('massa','📲 Cobrança em Massa',body,'<button class="btn btn-ghost btn-full" onclick="window._closeModal(\'massa\')">Cancelar</button><button class="btn btn-primary btn-full" id="massaSend">Enviar para todos</button>');document.getElementById('massaSend').addEventListener('click',function(){var ids=[];document.querySelectorAll('.massa-check:checked').forEach(function(ch){ids.push(ch.dataset.id)});closeModal('massa');var delay=0;ids.forEach(function(cid){var c=db.clientes.find(function(x){return x.id===cid});if(c)setTimeout(function(){sendWA(c,'cobranca')},delay);delay+=2500});toast('Abrindo WhatsApp para '+ids.length+' cliente(s)...','success')})}
function modalLembretes(){var body='<div><input class="lembrete-input-wrap" id="lembreteInput" placeholder="Escreva um lembrete..."></div><div id="lembretesLista"></div>';var el=showModal('lembretes','📝 Lembretes',body,'<button class="btn btn-ghost btn-full" onclick="window._closeModal(\'lembretes\')">Fechar</button><button class="btn btn-primary btn-full" id="lembreteAdd">Adicionar</button>');renderLembretesLista();document.getElementById('lembreteAdd').addEventListener('click',function(){var texto=document.getElementById('lembreteInput').value.trim();if(!texto){toast('Escreva algo','warning');return}db.lembretes.push({id:'l'+Date.now(),texto:texto,feito:false,data:today()});saveDB();document.getElementById('lembreteInput').value='';renderLembretesLista();toast('Lembrete salvo!','success')})}
function renderLembretesLista(){var container=document.getElementById('lembretesLista');if(!container)return;if(db.lembretes.length===0){container.innerHTML='<div style="text-align:center;padding:30px 20px;color:var(--text3);font-size:.85rem;">✨<br>Nenhum lembrete ainda.<br>Comece a anotar suas tarefas!</div>';return}var html='';for(var i=db.lembretes.length-1;i>=0;i--){var l=db.lembretes[i];var feitoClass=l.feito?' feito':'';html+='<div class="lembrete-item-ui"><div class="lembrete-check'+feitoClass+'" onclick="window._toggleLembrete(\''+l.id+'\')">'+(l.feito?'✓':'')+'</div><span class="lembrete-texto'+feitoClass+'" onclick="window._editarLembrete(\''+l.id+'\')">'+esc(l.texto)+'</span><button class="lembrete-del" onclick="window._delLembrete(\''+l.id+'\')"><i data-lucide="trash-2" width="14" height="14"></i></button></div>'}container.innerHTML=html;icons()}
function toggleLembrete(id){var l=db.lembretes.find(function(x){return x.id===id});if(!l)return;l.feito=!l.feito;saveDB();renderLembretesLista()}
function editarLembrete(id){var l=db.lembretes.find(function(x){return x.id===id});if(!l)return;var novoTexto=prompt('Editar lembrete:',l.texto);if(novoTexto!==null&&novoTexto.trim()!==''){l.texto=novoTexto.trim();saveDB();renderLembretesLista();toast('Lembrete atualizado!','success')}}
function delLembrete(id){db.lembretes=db.lembretes.filter(function(x){return x.id!==id});saveDB();renderLembretesLista();toast('Lembrete removido','success')}
function modalLog(){var rows=db.log.slice(0,50).map(function(l){return'<div class="log-row"><div class="log-dot"></div><div class="log-msg">'+esc(l.msg)+'</div><div class="log-date">'+(l.ts||'')+'</div></div>'}).join('')||'<p style="color:var(--text3);font-size:.85rem;">Nenhuma atividade</p>';showModal('log','📋 Log de Atividades',rows,'<button class="btn btn-ghost btn-full" onclick="window._closeModal(\'log\')">Fechar</button>')}
function modalMensagens(){var body='<div class="field"><label class="field-label">Mensagem de Cobrança</label><textarea class="input" id="tplCob" rows="6" style="resize:vertical;font-size:.82rem;">'+esc(db.templates.cobranca)+'</textarea></div><div style="font-size:.72rem;color:var(--text3);margin-bottom:12px;">Use: {nome} · {primeiro_nome} · {vencimento} · {valor}</div><div class="field"><label class="field-label">Mensagem de Renovação</label><textarea class="input" id="tplRen" rows="4" style="resize:vertical;font-size:.82rem;">'+esc(db.templates.renovacao)+'</textarea></div>';showModal('msg','💬 Mensagens WhatsApp',body,'<button class="btn btn-ghost btn-full" onclick="window._closeModal(\'msg\')">Cancelar</button><button class="btn btn-primary btn-full" id="msgSave">Salvar</button>');document.getElementById('msgSave').addEventListener('click',function(){db.templates.cobranca=document.getElementById('tplCob').value;db.templates.renovacao=document.getElementById('tplRen').value;saveDB();closeModal('msg');toast('Mensagens salvas!','success')})}
function today(){return new Date().toISOString().split('T')[0]}
function monthStr(offset){var d=new Date();d.setDate(1);d.setMonth(d.getMonth()+(offset||0));return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function sumTrans(tipo,prefix){return db.transacoes.filter(function(t){return t.tipo===tipo&&t.data&&t.data.startsWith(prefix)}).reduce(function(s,t){return s+t.valor},0)}
function fmt(n){return(n||0).toFixed(2)}
function fmtDate(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('pt-BR')}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

window._filter=function(f){navigateTo('clientes',f)};
window._clearFilter=function(){navigateTo('clientes')};
window._toggleLucro=function(){lucroOculto=!lucroOculto;localStorage.setItem('ow_lucroOc',lucroOculto?'1':'0');render('dashboard')};
window._cobrancaMassa=function(){modalCobrancaMassa()};
window._addTrans=function(){modalTrans()};
window._resetFin=function(){confirmModal('Resetar Financeiro?','Todas as transações serão apagadas.',function(){db.transacoes=[];addLog('Financeiro resetado');saveDB();render('financas');toast('Financeiro resetado','success')})};
window._closeModal=function(id){closeModal(id)};
window._editar=function(id){modalCliente(id)};
window._excluir=function(id){var c=db.clientes.find(function(x){return x.id===id});if(!c)return;confirmModal('Excluir '+c.nome+'?','Todas as transações deste cliente também serão removidas.',function(){db.clientes=db.clientes.filter(function(x){return x.id!==id});db.transacoes=db.transacoes.filter(function(t){return t.clienteId!==id});addLog(c.nome+' excluído');saveDB();render(currentSec);toast('Cliente excluído','success')})};
window._renovar=function(id){modalRenovar(id)};
window._nota=function(id){modalNota(id)};
window._wp=function(id){modalWhatsApp(id)};
window._editPlano=function(id){modalPlano(id)};
window._delPlano=function(id){var p=db.planos.find(function(x){return x.id===id});if(!p)return;confirmModal('Excluir plano?','Clientes vinculados perderão o plano.',function(){db.planos=db.planos.filter(function(x){return x.id!==id});addLog('Plano excluído: '+p.nome);saveDB();render('planos');toast('Plano excluído','success')})};
window._editServ=function(id){modalServ(id)};
window._delServ=function(id){var s=db.servidores.find(function(x){return x.id===id});if(!s)return;confirmModal('Excluir servidor?','Clientes vinculados perderão o servidor.',function(){db.servidores=db.servidores.filter(function(x){return x.id!==id});addLog('Servidor excluído: '+s.nome);saveDB();render('servidores');toast('Servidor excluído','success')})};
window._fecharAlertaDiario=fecharAlertaDiario;
window._cobrarTodosAlerta=cobrarTodosAlerta;
window._cobrancaInadimplencia=cobrancaInadimplencia;
window._toggleLembrete=toggleLembrete;
window._editarLembrete=editarLembrete;
window._delLembrete=delLembrete;

var SECS=['dashboard','clientes','planos','servidores','financas'],swX=0,swY=0;
var mc=document.getElementById('mainContent');
if(mc){mc.addEventListener('touchstart',function(e){swX=e.touches[0].clientX;swY=e.touches[0].clientY},{passive:true});mc.addEventListener('touchend',function(e){var dx=swX-e.changedTouches[0].clientX,dy=swY-e.changedTouches[0].clientY;if(Math.abs(dx)>Math.abs(dy)*1.5&&Math.abs(dx)>55){var idx=SECS.indexOf(currentSec);if(dx>0&&idx<SECS.length-1)navigateTo(SECS[idx+1]);else if(dx<0&&idx>0)navigateTo(SECS[idx-1])}},{passive:true})}

document.getElementById('menuBtn').addEventListener('click',openSidebar);
document.getElementById('sidebarClose').addEventListener('click',closeSidebar);
document.getElementById('sidebarBackdrop').addEventListener('click',closeSidebar);
document.querySelectorAll('.nav-btn').forEach(function(btn){btn.addEventListener('click',function(){navigateTo(btn.dataset.sec)})});
document.getElementById('fab').addEventListener('click',function(){if(currentSec==='clientes')modalCliente();else if(currentSec==='planos')modalPlano();else if(currentSec==='servidores')modalServ();else if(currentSec==='dashboard')modalCliente()});
document.getElementById('btnBackup').addEventListener('click',function(){closeSidebar();exportarBackup()});
document.getElementById('btnInadimplencia').addEventListener('click',function(){closeSidebar();modalInadimplencia()});
document.getElementById('btnLembretes').addEventListener('click',function(){closeSidebar();modalLembretes()});
document.getElementById('btnLog').addEventListener('click',function(){closeSidebar();modalLog()});
document.getElementById('btnDarkMode').addEventListener('click',function(){darkMode=!darkMode;applyDark()});
document.getElementById('btnNotif').addEventListener('click',function(){closeSidebar();ativarNotifs()});
document.getElementById('btnMensagens').addEventListener('click',function(){closeSidebar();modalMensagens()});
document.getElementById('btnRestaurar').addEventListener('click',function(){document.getElementById('fileRestore').click()});
document.getElementById('fileRestore').addEventListener('change',function(){restaurarBackup(this.files[0]);this.value=''});

function exportarBackup(){try{var blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='owerplay-backup-'+today()+'.json';document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url)},300);toast('Backup exportado!','success')}catch(e){toast('Erro ao exportar','error')}}
function restaurarBackup(file){if(!file)return;var reader=new FileReader();reader.onload=function(e){try{var data=JSON.parse(e.target.result);if(!data.clientes)throw new Error();db=data;if(!db.templates)db.templates=Object.assign({},DEFAULT_TEMPLATES);if(!db.lembretes)db.lembretes=[];saveDB();render(currentSec);toast('Backup restaurado!','success')}catch(ex){toast('Arquivo inválido','error')}};reader.readAsText(file)}
function ativarNotifs(){if(!('Notification' in window)){toast('Notificações não suportadas','warning');return}Notification.requestPermission().then(function(p){if(p==='granted'){toast('Notificações ativadas!','success')}else toast('Permissão negada','warning')})}

loadDB();autoSincTrans();saveDB();navigateTo('dashboard');verificarVencimentosHoje();
})();
</script>
</body>
