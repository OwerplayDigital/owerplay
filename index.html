<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OwerPlay Gestor</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236366f1'/%3E%3Ctext x='50' y='68' font-family='Arial' font-size='40' font-weight='bold' fill='white' text-anchor='middle'%3EOW%3C/text%3E%3C/svg%3E">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', Arial, sans-serif;
            background: #0b0f1a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
        }
        /* TELA DE LOGIN */
        #tela-login {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            background: #0b0f1a;
        }
        .login-card {
            background: #161b2c;
            border: 1px solid #2d3348;
            border-radius: 24px;
            padding: 30px 22px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .login-logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: #6366f1;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .login-sub {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .login-card input {
            width: 100%;
            background: #0b0f1a;
            border: 1.5px solid #2d3348;
            padding: 14px;
            border-radius: 14px;
            color: white;
            outline: none;
            margin-bottom: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 8px;
            font-family: inherit;
        }
        .btn-primary {
            background: #6366f1;
            color: white;
        }
        .btn-outline {
            background: transparent;
            color: #6366f1;
            border: 2px solid #6366f1;
            margin-top: 14px;
        }
        .login-msg {
            color: #fb7185;
            font-size: 0.65rem;
            margin-top: 8px;
            min-height: 18px;
            text-align: center;
        }
        .login-info {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 12px;
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #2d3348;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: rodar 0.8s linear infinite;
            margin: 15px auto;
            display: none;
        }
        @keyframes rodar { to { transform: rotate(360deg); } }

        /* APP */
        #tela-app { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        nav {
            width: 100%;
            height: 70px;
            background: #070a13;
            border-radius: 20px 20px 0 0;
            border-top: 1px solid #2d3348;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            bottom: 0;
            z-index: 9999;
            padding-bottom: 5px;
        }
        nav button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 0.55rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            padding: 5px;
        }
        nav button.ativo { color: white; }
        nav button .nav-icon { font-size: 1.3rem; }
        main {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            padding-bottom: 85px;
        }
        .tab { display: none; }
        .tab.ativo { display: block; }
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .app-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: #6366f1;
            letter-spacing: 1px;
        }
        .btn-sair {
            background: rgba(251,113,133,0.15);
            color: #fb7185;
            border: 1px solid rgba(251,113,133,0.3);
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        .stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-card {
            flex: 1;
            background: #161b2c;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid #2d3348;
        }
        .stat-card small {
            font-size: 0.5rem;
            color: #94a3b8;
            text-transform: uppercase;
            display: block;
            margin-bottom: 3px;
        }
        .stat-card b {
            font-size: 0.95rem;
            color: white;
        }
        .card {
            background: #161b2c;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid #2d3348;
            margin-bottom: 8px;
        }
        .card b {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 3px;
        }
        .card p {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        /* Toast */
        .toast {
            visibility: hidden;
            min-width: 260px;
            background: #10b981;
            color: white;
            text-align: center;
            border-radius: 16px;
            padding: 16px;
            position: fixed;
            z-index: 99999;
            left: 50%;
            top: 30px;
            transform: translateX(-50%);
            font-weight: 700;
            font-size: 0.85rem;
        }
        .toast.mostrar { visibility: visible; animation: toastAnim 3s; }
        @keyframes toastAnim {
            0% { top: 0; opacity: 0; }
            10% { top: 30px; opacity: 1; }
            90% { top: 30px; opacity: 1; }
            100% { top: 0; opacity: 0; }
        }
    </style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- TELA DE LOGIN -->
<div id="tela-login">
    <div class="login-card">
        <div class="login-logo">OWERPLAY</div>
        <div class="login-sub" id="login-sub">Faça login para acessar seu gestor</div>
        <input type="email" id="login-email" placeholder="Seu email" autocomplete="email">
        <input type="password" id="login-senha" placeholder="Sua senha">
        <div class="login-msg" id="login-msg"></div>
        <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">Entrar</button>
        <div class="login-info" id="login-info">Não tem conta?</div>
        <button class="btn btn-outline" id="btn-toggle" onclick="toggleModo()">Criar conta grátis</button>
        <div class="spinner" id="spinner"></div>
    </div>
</div>

<!-- TELA DO APP -->
<div id="tela-app">
    <main>
        <!-- DASHBOARD -->
        <div class="tab ativo" id="tab-dash">
            <div class="app-header">
                <div class="app-title">OWERPLAY GESTOR</div>
                <button class="btn-sair" onclick="handleLogout()">Sair</button>
            </div>
            <div class="stats-row">
                <div class="stat-card"><small>Lucro do Mês</small><b id="dash-lucro">R$ 0,00</b></div>
                <div class="stat-card"><small>Novos Clientes</small><b id="dash-novos">0</b></div>
            </div>
            <div id="lista-dash"></div>
        </div>

        <!-- CLIENTES -->
        <div class="tab" id="tab-cli">
            <div class="app-title" style="margin-bottom:15px;">CLIENTES</div>
            <div id="lista-cli"></div>
        </div>

        <!-- PLANOS -->
        <div class="tab" id="tab-pla">
            <div class="app-title" style="margin-bottom:15px;">PLANOS</div>
            <div id="lista-pla"></div>
        </div>

        <!-- SERVIDORES -->
        <div class="tab" id="tab-srv">
            <div class="app-title" style="margin-bottom:15px;">SERVIDORES</div>
            <div id="lista-srv"></div>
        </div>

        <!-- FINANÇAS -->
        <div class="tab" id="tab-fin">
            <div class="app-title" style="margin-bottom:15px;">FINANCEIRO</div>
            <div id="lista-fin"></div>
        </div>
    </main>

    <nav>
        <button class="ativo" data-tab="tab-dash" onclick="showTab('tab-dash')"><span class="nav-icon">🏠</span>Início</button>
        <button data-tab="tab-cli" onclick="showTab('tab-cli')"><span class="nav-icon">👥</span>Clientes</button>
        <button data-tab="tab-pla" onclick="showTab('tab-pla')"><span class="nav-icon">📦</span>Planos</button>
        <button data-tab="tab-srv" onclick="showTab('tab-srv')"><span class="nav-icon">🖥️</span>Servidores</button>
        <button data-tab="tab-fin" onclick="showTab('tab-fin')"><span class="nav-icon">💰</span>Finanças</button>
    </nav>
</div>

<script>
// ============================================
// SUPABASE
// ============================================
var SUPABASE_URL = 'https://jctfbwyftrdundxxgnwa.supabase.co';
var SUPABASE_KEY = 'sb_publishable_ZfiNQ7QhDCjzjnUTtyudEQ_u-FMmnU0';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================
// VARIÁVEIS
// ============================================
var user = null;
var modo = 'login';
var tabAtual = 'tab-dash';
var clientes = [];
var planos = [];
var servidores = [];
var transacoes = [];

// ============================================
// TOAST
// ============================================
function toast(msg) {
    var t = document.getElementById('toast');
    t.innerText = msg;
    t.className = 'toast mostrar';
    setTimeout(function(){ t.className = 'toast'; }, 3000);
}

// ============================================
// LOGIN
// ============================================
function toggleModo() {
    modo = modo === 'login' ? 'cadastro' : 'login';
    document.getElementById('btn-login').innerText = modo === 'login' ? 'Entrar' : 'Criar conta';
    document.getElementById('login-sub').innerText = modo === 'login' ? 'Faça login para acessar seu gestor' : 'Crie sua conta gratuita';
    document.getElementById('login-info').innerText = modo === 'login' ? 'Não tem conta?' : 'Já tem conta?';
    document.getElementById('btn-toggle').innerText = modo === 'login' ? 'Criar conta grátis' : 'Fazer login';
    document.getElementById('login-msg').innerText = '';
}

async function handleLogin() {
    var email = document.getElementById('login-email').value.trim();
    var senha = document.getElementById('login-senha').value.trim();
    var msgEl = document.getElementById('login-msg');
    var btn = document.getElementById('btn-login');
    var spin = document.getElementById('spinner');
    
    msgEl.innerText = '';
    if (!email || !senha) { msgEl.innerText = 'Preencha todos os campos.'; return; }
    if (senha.length < 6) { msgEl.innerText = 'Senha: mínimo 6 caracteres.'; return; }
    
    btn.style.display = 'none';
    spin.style.display = 'block';
    
    try {
        var res;
        if (modo === 'cadastro') {
            res = await supabase.auth.signUp({ email: email, password: senha });
            if (res.error) throw res.error;
            toast('Conta criada! Faça login.');
            toggleModo();
            return;
        } else {
            res = await supabase.auth.signInWithPassword({ email: email, password: senha });
            if (res.error) throw res.error;
        }
        
        user = res.data.user;
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('tela-app').style.display = 'flex';
        await carregarTudo();
        atualizarListas();
        
    } catch(e) {
        msgEl.innerText = modo === 'login' ? 'Email ou senha inválidos.' : 'Erro ao criar conta.';
        console.error(e);
    }
    
    btn.style.display = 'block';
    spin.style.display = 'none';
}

async function handleLogout() {
    await supabase.auth.signOut();
    user = null;
    clientes = [];
    planos = [];
    servidores = [];
    transacoes = [];
    document.getElementById('tela-app').style.display = 'none';
    document.getElementById('tela-login').style.display = 'flex';
    document.getElementById('login-email').value = '';
    document.getElementById('login-senha').value = '';
}

// ============================================
// CARREGAR DADOS
// ============================================
async function carregarTudo() {
    if (!user) return;
    try {
        var resCli = await supabase.from('clientes').select('*').eq('user_id', user.id).order('vencimento');
        clientes = (resCli.data || []).map(function(c){
            return { id: c.id, nome: c.nome, venc: c.vencimento, plano: c.plano_nome, servidor: c.servidor_nome, plano_valor: parseFloat(c.plano_valor||0), servidor_custo: parseFloat(c.servidor_custo||0), desconto: parseFloat(c.desconto||0) };
        });
        
        var resPla = await supabase.from('planos').select('*').eq('user_id', user.id);
        planos = resPla.data || [];
        
        var resSrv = await supabase.from('servidores').select('*').eq('user_id', user.id);
        servidores = resSrv.data || [];
        
        var resTra = await supabase.from('transacoes').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
        transacoes = resTra.data || [];
    } catch(e) {
        console.error('Erro ao carregar:', e);
    }
}

// ============================================
// ATUALIZAR LISTAS
// ============================================
function atualizarListas() {
    // Dashboard
    var dashHtml = '';
    var hoje = new Date(); hoje.setHours(0,0,0,0);
    var lucroMes = 0;
    var mesAtual = new Date().toISOString().slice(0,7);
    var novos = 0;
    var primDia = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    
    transacoes.forEach(function(t){
        if (t.data_mes === mesAtual) lucroMes += (parseFloat(t.entrada||0) - parseFloat(t.saida||0));
    });
    clientes.forEach(function(c){
        var dc = new Date(c.data_cadastro || '2000-01-01');
        if (dc >= primDia) novos++;
    });
    
    document.getElementById('dash-lucro').innerText = 'R$ ' + lucroMes.toFixed(2);
    document.getElementById('dash-novos').innerText = novos;
    
    clientes.forEach(function(c){
        var p = c.venc.split('-');
        var dv = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
        dv.setHours(0,0,0,0);
        var diff = Math.round((dv.getTime() - hoje.getTime()) / (1000*60*60*24));
        var status = 'Ativo';
        var cor = '#10b981';
        if (diff < 0) { status = 'Vencido'; cor = '#fb7185'; }
        else if (diff === 0) { status = 'Hoje'; cor = '#fb7185'; }
        else if (diff === 1) { status = 'Amanhã'; cor = '#f59e0b'; }
        
        dashHtml += '<div class="card" style="border-left: 3px solid ' + cor + '">' +
            '<b>' + c.nome + ' <span style="font-size:0.6rem;color:' + cor + '">' + status + '</span></b>' +
            '<p>Venc: ' + c.venc.split('-').reverse().join('/') + ' | ' + (c.plano||'—') + '</p>' +
            '<p style="font-size:0.6rem;">Servidor: ' + (c.servidor||'—') + '</p>' +
            '</div>';
    });
    document.getElementById('lista-dash').innerHTML = dashHtml || '<p style="color:#94a3b8;text-align:center;margin-top:20px;">Nenhum cliente cadastrado</p>';
    
    // Clientes
    document.getElementById('lista-cli').innerHTML = dashHtml || '<p style="color:#94a3b8;text-align:center;margin-top:20px;">Nenhum cliente cadastrado</p>';
    
    // Planos
    var plaHtml = '';
    planos.forEach(function(p){
        plaHtml += '<div class="card"><b>' + p.nome + '</b><p>Valor: R$ ' + parseFloat(p.valor||0).toFixed(2) + '</p></div>';
    });
    document.getElementById('lista-pla').innerHTML = plaHtml || '<p style="color:#94a3b8;text-align:center;margin-top:20px;">Nenhum plano cadastrado</p>';
    
    // Servidores
    var srvHtml = '';
    servidores.forEach(function(s){
        srvHtml += '<div class="card"><b>' + s.nome + '</b><p>Custo: R$ ' + parseFloat(s.custo||0).toFixed(2) + '</p></div>';
    });
    document.getElementById('lista-srv').innerHTML = srvHtml || '<p style="color:#94a3b8;text-align:center;margin-top:20px;">Nenhum servidor cadastrado</p>';
    
    // Finanças
    var finHtml = '';
    var totalEnt = 0, totalSai = 0;
    transacoes.forEach(function(t){
        var ent = parseFloat(t.entrada||0);
        var sai = parseFloat(t.saida||0);
        totalEnt += ent;
        totalSai += sai;
        finHtml += '<div class="card"><b>' + t.cliente_nome + '</b>' +
            '<p>Entrada: R$ ' + ent.toFixed(2) + ' | Saída: R$ ' + sai.toFixed(2) + ' | Lucro: R$ ' + (ent-sai).toFixed(2) + '</p></div>';
    });
    document.getElementById('lista-fin').innerHTML = 
        '<div class="stats-row"><div class="stat-card"><small>Entrada Total</small><b>R$ ' + totalEnt.toFixed(2) + '</b></div>' +
        '<div class="stat-card"><small>Saída Total</small><b>R$ ' + totalSai.toFixed(2) + '</b></div>' +
        '<div class="stat-card"><small>Lucro</small><b>R$ ' + (totalEnt-totalSai).toFixed(2) + '</b></div></div>' +
        finHtml || '<p style="color:#94a3b8;text-align:center;margin-top:20px;">Nenhuma transação</p>';
}

// ============================================
// NAVEGAÇÃO
// ============================================
function showTab(id) {
    tabAtual = id;
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('ativo'); });
    document.getElementById(id).classList.add('ativo');
    
    document.querySelectorAll('nav button').forEach(function(b){ b.classList.remove('ativo'); });
    var btn = document.querySelector('[data-tab="' + id + '"]');
    if (btn) btn.classList.add('ativo');
}

// ============================================
// VERIFICAR SESSÃO EXISTENTE
// ============================================
supabase.auth.getSession().then(function(res){
    if (res.data && res.data.session && res.data.session.user) {
        user = res.data.session.user;
        window.location.reload();
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('tela-app').style.display = 'flex';
        carregarTudo().then(atualizarListas);
    }
});
</script>
</body>
</html>
