<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Owerplay Gestor</title>
    <style>
        :root {
            --accent: #0288D1;
            --bg: #0A1929;
            --card: #132F4C;
        }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: var(--card); padding: 30px; border-radius: 16px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #1E4976; background: #173A5E; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-card">
        <div style="font-size: 2.5rem; margin-bottom: 10px;">✦</div>
        <h1>Owerplay Gestor</h1>
        <input type="email" id="email" placeholder="Seu email">
        <input type="password" id="email_pass" placeholder="Sua senha">
        <button onclick="fazerLogin()" id="btn">Entrar no Painel</button>
    </div>

    <script>
        // Suas chaves que aparecem no print
        const URL = 'https://paozivvbxvstfkbvaxex.supabase.co/auth/v1/token?grant_type=password';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhb3ppdnZieHZzdGZrYnZheGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTI2MTQxNzksImV4cCI6MjA0MTY5MDE3OX0.zS-H0_6Uu_x-y9B-7Gv2G5Z1-v-w-q-m-p-x-r-s-t-u-v';

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('email_pass').value;
            const btn = document.getElementById('btn');

            if (!email || !password) return alert("Preencha tudo!");

            btn.innerText = "Conectando...";

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: {
                        'apikey': KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.access_token) {
                    alert("Acesso autorizado!");
                    document.getElementById('loginScreen').style.display = 'none';
                    // Aqui você pode carregar o restante do seu app
                } else {
                    alert("Erro: " + (data.error_description || "Dados incorretos"));
                    btn.innerText = "Entrar no Painel";
                }
            } catch (err) {
                alert("Erro de conexão. O Supabase ainda está bloqueando o acesso local.");
                btn.innerText = "Entrar no Painel";
            }
        }
    </script>
</body>
</html>
