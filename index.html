    .card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border)}.card+.card{margin-top:10px}

    .stat-card {
  background: var(--surface);
  border-radius: 18px;
  padding: 14px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow .25s ease;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(8px);
  -webkit-tap-highlight-color: transparent;
}
    .stat-card:active { transform: scale(0.97); }
    .stat-card .stat-label{font-size:.7rem;font-weight:600;color:var(--text3);margin-bottom:4px}
    .stat-value{font-size:1.5rem;font-weight:800;color:var(--text)}.stat-value.green{color:var(--success)}.stat-value.red{color:var(--danger)}.stat-value.orange{color:var(--warning)}
    .lucro-card {
  background: linear-gradient(135deg,var(--fin-entrada) 0%,var(--fin-entrada-dark) 100%);
  border-radius: 24px;
  padding: 22px;
  color: #fff;
  margin-bottom: 14px;
  cursor: pointer;
  box-shadow: 0 10px 35px rgba(2,136,209,.28);
  transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow .3s ease, background .4s ease;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.lucro-card:active { transform: scale(0.97); }

.lucro-card::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,.08);
}

}.lucro-value{font-size:2rem;font-weight:800}
.lucro-value.oculto {
  font-size: 2rem;
  letter-spacing: 0.15em;
}

function splitSafeGraphemes(text){
  var txt=String(text||'');
  if(typeof Intl!=='undefined'&&typeof Intl.Segmenter==='function'){
    return Array.from(new Intl.Segmenter('pt-BR',{granularity:'grapheme'}).segment(txt),function(part){return part.segment;});
  }
  var units=Array.from(txt),parts=[];
  units.forEach(function(unit){
    var cp=unit.codePointAt(0);
    var prev=parts[parts.length-1];
    if(!prev){parts.push(unit);return;}
    var prevEndsWithJoiner=prev.charAt(prev.length-1)==='\u200D';
    var prevSymbols=Array.from(prev);
    var prevLastSymbol=prevSymbols[prevSymbols.length-1]||'';
    var prevLastCp=prevLastSymbol?prevLastSymbol.codePointAt(0):0;
    var shouldAttach=unit==='\u200D'||prevEndsWithJoiner||isCombiningMark(cp)||isVariationSelector(cp)||isSkinTone(cp)||(isRegionalIndicator(prevLastCp)&&isRegionalIndicator(cp)&&prevSymbols.length===1);
    if(shouldAttach)parts[parts.length-1]+=unit;
    else parts.push(unit);
  });

}
function truncateGraphemes(text,limit){

function hasBrokenUnicode(text){
  var value=String(text||'');
  if(value.indexOf('�')!==-1)return true;
  for(var i=0;i<value.length;i++){
    var code=value.charCodeAt(i);
    if(code>=0xD800&&code<=0xDBFF){
      var next=value.charCodeAt(i+1);
      if(!(next>=0xDC00&&next<=0xDFFF))return true;
      i++;
    }else if(code>=0xDC00&&code<=0xDFFF){
      return true;
    }
  }
  return false;
}
function decodeHtmlEntities(str){
  // Decodifica entidades HTML que foram salvas erroneamente nos templates (bug do esc() + innerHTML)
  // Usa um textarea temporário — funciona em qualquer WebView Android sem depender de DOMParser
  try{
    var el=document.createElement('textarea');
    el.innerHTML=str;
    return el.value;
  }catch(e){return str;}
}
function repararEmojisTemplates(){
  // Detecta se algum template contém entidades HTML literais (ex: &#x26A0; ou &amp;)
  // e decodifica, restaurando os emojis originais
  if(!db.templates)return false;
  var alterou=false;
  Object.keys(db.templates).forEach(function(k){
    var original=db.templates[k];
    if(typeof original!=='string')return;
    // Se contém padrão de entidade HTML
    if(/&(?:#x?[0-9a-fA-F]+|[a-zA-Z]+);/.test(original)){
      var decoded=decodeHtmlEntities(original);
      if(decoded!==original){
        db.templates[k]=decoded;
        alterou=true;
      }
    }
  });
  return alterou;
}
function corrigirTemplatesPadrao(){
  var alterou=false;
  if(!db.templates){db.templates={};alterou=true;}
  var templatesNormalizados={};
  Object.keys(db.templates).forEach(function(k){
    var novoKey=normalizeTemplateKey(k)||k;
    if(novoKey!==k)alterou=true;
    if(templatesNormalizados[novoKey]===undefined){
      templatesNormalizados[novoKey]=db.templates[k];
    }else if(novoKey!==k){
      templatesNormalizados[k]=db.templates[k];
    }
  });
  db.templates=templatesNormalizados;
  var cob=db.templates.cobranca||'';
  // Só sobrescreve cobrança se estiver VAZIA ou com unicode realmente quebrado
  // (surrogate pair solto). Não sobrescreve mais por conteúdo antigo — o usuário
  // pode ter customizado e esse check apagava o conteúdo dele.
  if(!cob || hasBrokenUnicode(cob)){
    db.templates.cobranca=DEFAULT_TEMPLATES.cobranca;
    alterou=true;
  }
  var ren=db.templates.renovacao||'';
  // Idem para renovação: só reseta se vazio ou unicode quebrado
  if(!ren || hasBrokenUnicode(ren)){
    db.templates.renovacao=DEFAULT_TEMPLATES.renovacao;
    alterou=true;
  }
  return alterou;
}

    if(type==='error') navigator.vibrate([30,50,30]);
    else navigator.vibrate(10);
  }
  var el=document.getElementById('toast');
  if(!el)return;
  var iconSpan='';
  var borderColor='';
  if(type==='success'){
    iconSpan='<span class="toast-icon" style="background:var(--accent-light);color:var(--accent-dark);">✓</span>';
    borderColor='var(--accent)';
  }else if(type==='error'){
    iconSpan='<span class="toast-icon" style="background:var(--danger-bg);color:var(--danger);">✕</span>';
    borderColor='var(--danger)';
  }else if(type==='warning'){
    iconSpan='<span class="toast-icon" style="background:var(--danger-bg);color:var(--danger);">!</span>';
    borderColor='var(--danger)';
  }else{
    iconSpan='<span class="toast-icon" style="background:var(--accent-light);color:var(--accent-dark);">✓</span>';
    borderColor='var(--accent)';
  }
  el.innerHTML=iconSpan+'<span>'+msg+'</span>';
  el.className='show '+(type||'');
  el.style.borderLeftColor=borderColor;
  clearTimeout(toast._t);
  toast._t=setTimeout(function(){
    el.className='';
    el.innerHTML='';
    el.style.borderLeftColor='';
  },2800);
}

function verificarNotificacoes(){
  var hoje=today();

  // ── Lembretes com data agendada para hoje ─────────────────────────────────
  // Verifica SEMPRE (independente de permissão de notificação do sistema),
  // exibindo toast in-app para cada lembrete vencido não concluído.
  var lembretesHoje=db.lembretes.filter(function(l){
    return !l.feito && l.dataAgendada && l.dataAgendada<=hoje && !l.alertaMostrado;
  });
  lembretesHoje.forEach(function(l,i){
    setTimeout(function(){
      toast('📅 Lembrete: '+l.texto,'success');
    },i*800);
    l.alertaMostrado=true;
  });
  if(lembretesHoje.length) saveDB();

  // ── Notificações do sistema (push) para vencimentos de clientes ───────────
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  var amanha=new Date();amanha.setDate(amanha.getDate()+1);var amanhaStr=new Intl.DateTimeFormat('en-CA',{timeZone:'America/Sao_Paulo'}).format(amanha);
  var d3=new Date();d3.setDate(d3.getDate()+3);var d3Str=new Intl.DateTimeFormat('en-CA',{timeZone:'America/Sao_Paulo'}).format(d3);

  var vencendoHoje=db.clientes.filter(function(c){return c.ativo!==false&&c.vencimento===hoje;});
  var vencendoAmanha=db.clientes.filter(function(c){return c.ativo!==false&&c.vencimento===amanhaStr;});
  var vencendo3dias=db.clientes.filter(function(c){return c.ativo!==false&&c.vencimento===d3Str;});

  function nomesCurtos(lista){return lista.slice(0,3).map(function(c){return c.nome.split(' ')[0];}).join(', ')+(lista.length>3?' +outros':'');}

  if(vencendoHoje.length){
    new Notification('🔴 Vencimentos hoje — Owerplay',{
      body:vencendoHoje.length+' cliente(s): '+nomesCurtos(vencendoHoje),
      icon:'IMG_20260501_113710.png',
      tag:'venc-hoje'
    });
  }
  if(vencendoAmanha.length){
    setTimeout(function(){
      new Notification('🟡 Vencimentos amanhã — Owerplay',{
        body:vencendoAmanha.length+' cliente(s): '+nomesCurtos(vencendoAmanha),
        icon:'IMG_20260501_113710.png',
        tag:'venc-amanha'
      });
    },3000);
  }
  if(vencendo3dias.length){
    setTimeout(function(){
      new Notification('🔵 Vencem em 3 dias — Owerplay',{
        body:vencendo3dias.length+' cliente(s): '+nomesCurtos(vencendo3dias),
        icon:'IMG_20260501_113710.png',
        tag:'venc-3dias'
      });
    },6000);
  }
}

}

  var savedDark = localStorage.getItem('ow_dark');
  var savedDarkDate = localStorage.getItem('ow_dark_date');
  var hojeStr = new Date().toLocaleDateString('pt-BR');
  var hora = new Date().getHours();

  if(savedDarkDate === hojeStr && savedDark !== null){
    // Usuário alterou manualmente hoje — respeita a escolha
    darkMode = savedDark === '1';
  } else {
    // Sem escolha manual hoje — aplica automático por horário
    darkMode = escuroAutomatico;
  }

}

async function carregarDados(){
  var uid=currentUser.id;

  var resp=await supabase
    .from('backups')
    .select('dados')
    .eq('user_id', uid)
    .maybeSingle();

  // Se houve erro de rede/Supabase, cai no localStorage silenciosamente
  if(resp.error && resp.error.code !== 'PGRST116'){
    console.warn('[Owerplay] Supabase load error, using local cache:', resp.error.message);
  }

  if(resp.data&&resp.data.dados){
    var dadosNuvem=resp.data.dados;
    // Merge profundo: os dados salvos têm prioridade sobre os defaults
    db=Object.assign({},db,dadosNuvem);
    // Templates: defaults como base, templates salvos sobrescrevem (nunca perdem)
    db.templates=Object.assign({},DEFAULT_TEMPLATES,dadosNuvem.templates||{});
    db.templateNames=Object.assign({cobranca:'Cobrança',renovacao:'Renovação'},dadosNuvem.templateNames||{});
    if(!db.lembretes)db.lembretes=[];
    saveLocal();
    return;
  }

  var local=localStorage.getItem(STORAGE_KEY+'_'+uid);

  if(local){
    try{
      var parsed=JSON.parse(local);
      db=Object.assign({},db,parsed);
      db.templates=Object.assign({},DEFAULT_TEMPLATES,parsed.templates||{});
      db.templateNames=Object.assign({cobranca:'Cobrança',renovacao:'Renovação'},parsed.templateNames||{});
      if(!db.lembretes)db.lembretes=[];
    }catch(e){}
  }
}
function saveLocal(){if(!currentUser)return;try{localStorage.setItem(STORAGE_KEY+'_'+currentUser.id,JSON.stringify(db));}catch(e){}}
function salvarNuvem(){
if(!currentUser)return;
// Proteção: nunca sobrescreve nuvem com db vazio (ex: erro de carregamento)
if(!db.clientes&&!db.planos&&!db.transacoes){return;}
var sync=document.getElementById('syncStatus');
if(sync){
sync.innerHTML='🟡 Salvando...';
}
saveLocal();

supabase.from('backups').upsert(
{
  user_id: currentUser.id,
  dados: db
},
{
  onConflict: 'user_id'
}
).then(function(res){

  if(sync){
    sync.innerHTML=res.error
    ? '🔴 Erro ao sincronizar'
    : '🟢 Sincronizado';
  }

});
}
function limparTransacoesAntigas(){
  // Mantém apenas transações dos últimos 12 meses.
  // Transações manuais (sem clienteId) também são preservadas dentro do período.
  var limite=monthStr(-12);
  var antes=db.transacoes.length;
  db.transacoes=db.transacoes.filter(function(t){
    return !t.data||t.data.slice(0,7)>=limite;
  });
  var removidas=antes-db.transacoes.length;
  if(removidas>0)addLog('Limpeza automática: '+removidas+' transações antigas removidas');
}
function saveDB(){limparTransacoesAntigas();saveLocal();salvarNuvem();}

window._toggleLembrete=function(id){
  var l=db.lembretes.find(function(x){return x.id===id;});
  if(l){
    l.feito=!l.feito;
    if(l.feito && l.recorrencia){
      var hoje=new Date();
      var prox=new Date(hoje);
      if(l.recorrencia==='daily') prox.setDate(hoje.getDate()+1);
      else if(l.recorrencia==='weekly') prox.setDate(hoje.getDate()+7);
      else if(l.recorrencia==='monthly') prox.setMonth(hoje.getMonth()+1);
      l.dataAgendada=prox.toISOString().split('T')[0];
      l.feito=false;
      l.alertaMostrado=false;
      toast('Lembrete recorrente reagendado para '+fmtDate(l.dataAgendada),'success');
    }
    saveDB();
    renderLembretesLista();
  }
};

window._delLembrete=function(id){
  confirmModal('Excluir lembrete?','Esta ação não pode ser desfeita.',function(){
    db.lembretes=db.lembretes.filter(function(x){return x.id!==id;});
    saveDB();
    renderLembretesLista();
    toast('Lembrete removido','success');
  });

function obterListaFiltrada(){
  var hoje=today();
  var list=db.clientes.slice();
  if(cliFilter==='active') list=list.filter(function(c){ return c.vencimento>=hoje; });
  if(cliFilter==='expired') list=list.filter(function(c){ return c.vencimento<hoje; });
  if(cliFilter==='today') list=list.filter(function(c){ return c.vencimento===hoje; });
  if(cliFilterPlano) list=list.filter(function(c){ return c.planoId===cliFilterPlano; });
  if(cliFilterServidor){
    list=list.filter(function(c){
      if(c.servidoresIds && Array.isArray(c.servidoresIds)){
        return c.servidoresIds.includes(cliFilterServidor);
      }
      return c.servidorId === cliFilterServidor;
    });
  }
  list.sort(function(a,b){ return a.vencimento.localeCompare(b.vencimento); });
  return list;
}

function renderFinancas(mc){

  var entA=sumTrans('entrada',mant),saiA=sumTrans('saida',mant),lucA=entA-saiA;
  var cresc=lucA!==0?((luc-lucA)/Math.abs(lucA)*100):(luc>0?100:0);
  var crescTxt=(cresc>=0?'+':'')+cresc.toFixed(1)+'%';
  var crescClasse=cresc>=0?'positive':'negative';
  
  var agrupado={};
  db.transacoes.slice().sort(function(a,b){if(a.data>b.data)return -1;if(a.data<b.data)return 1;return 0;}).forEach(function(t){
    var chave=(t.clienteId||'manual')+'_'+(t.data||'');
    if(!agrupado[chave]) agrupado[chave]={entrada:0,saida:0,data:t.data,clienteId:t.clienteId,servidores:[]};
    if(t.tipo==='entrada') agrupado[chave].entrada+=t.valor;
    else{
      agrupado[chave].saida+=t.valor;
      if(t.servId) agrupado[chave].servidores.push(t.servId);
    }
  });
  
  var chaves=Object.keys(agrupado).sort(function(a,b){
  if(agrupado[a].data>agrupado[b].data)return -1;
  if(agrupado[a].data<agrupado[b].data)return 1;
  if(a>b)return -1;
  if(a<b)return 1;
  return 0;
}).slice(0,20);
  
  var transHtml='';
  chaves.forEach(function(k){
    var g=agrupado[k];
    var c=g.clienteId?db.clientes.find(function(x){return x.id===g.clienteId;}):null;
    var nome=c?c.nome:(g.entrada>0?'Transação manual':'Transação manual');
    var servsNomes=g.servidores.map(function(sid){
      var s=db.servidores.find(function(x){return x.id===sid;});
      return s?s.nome:'';
    }).filter(Boolean).join(' + ');
    var sub=fmtDate(g.data);
    if(servsNomes) sub+=' · '+servsNomes;
    
    var badges='';
    if(g.entrada>0) badges+='<span class="badge-entrada">+R$ '+fmt(g.entrada)+'</span>';
    else if(g.entrada===0 && g.clienteId) badges+='<span class="badge-entrada">R$ 0,00</span>';
    if(g.saida>0) badges+='<span class="badge-saida">-R$ '+fmt(g.saida)+'</span>';
    
    transHtml+='<div class="trans-row"><div><div class="trans-desc">'+esc(nome)+'</div><div class="trans-date">'+sub+'</div></div><div class="trans-values">'+badges+'</div></div>';
  });
  
  if(!transHtml) transHtml='<p style="color:var(--text3);font-size:.85rem;padding:12px 0;">Nenhuma transação</p>';
  
  mc.innerHTML='<div class="finance-stat-row">'+finStat('Entradas','R$ '+fmt(ent),'var(--fin-entrada)')+finStat('Saídas','R$ '+fmt(sai),'var(--danger)')+finStat('Lucro','R$ '+fmt(luc),luc>=0?'var(--success)':'var(--danger)')+'</div><div class="card finance-chart-card" style="margin-bottom:12px;"><div class="finance-chart-head"><div><div class="finance-chart-title">Gráfico financeiro</div><div class="finance-chart-sub">Entradas, saídas e lucro</div></div><div class="finance-growth '+crescClasse+'"><span>vs mês anterior</span><strong>'+crescTxt+'</strong></div></div><div class="finance-chart-wrap"><canvas id="finChart"></canvas></div></div><div class="card" style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div style="font-weight:700;">Transações Recentes</div><button onclick="window._addTrans()" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:.75rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit;"><i data-lucide="plus" width="12" height="12"></i>Adicionar</button></div>'+transHtml+'</div><div style="display:flex;gap:8px;"><button class="btn btn-danger btn-full" onclick="window._resetFin()"><i data-lucide="trash-2" width="15" height="15"></i>Resetar Financeiro</button></div>';
  renderChart();
}

function renderChart(){setTimeout(function(){
  var ctx=document.getElementById('finChart');if(!ctx||!window.Chart)return;
  var labels=[],ents=[],sais=[],lucs=[];
  var mesesAbreviados = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
  for(var i=5;i>=0;i--){
    var ms=monthStr(-i);
    var d=new Date();
    d.setDate(1);
    d.setMonth(d.getMonth()-i);
    var lbl = mesesAbreviados[d.getMonth()];
    var e=sumTrans('entrada',ms),s=sumTrans('saida',ms);
    labels.push(lbl);
    ents.push(e);
    sais.push(s);
    lucs.push(e-s);
  }
  var newKey=JSON.stringify(ents)+JSON.stringify(sais);
  if(chartInst&&chartDataKey===newKey){return;}
  chartDataKey=newKey;
  if(chartInst){try{chartInst.destroy();}catch(e){}chartInst=null;}
  var gridColor=darkMode?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';
  var textColor=darkMode?'#94A3B8':'#718096';
  chartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels:labels,
      datasets:[
        {label:'Entradas',data:ents,backgroundColor:'#0288D1',borderRadius:5,borderSkipped:false},
        {label:'Saídas',data:sais,backgroundColor:'#EF5350',borderRadius:5,borderSkipped:false},
        {label:'Lucro',data:lucs,backgroundColor:'#43A047',borderRadius:5,borderSkipped:false}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:textColor,font:{size:10},boxWidth:10}}
      },
      scales:{
        x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:9}}},
        y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:9},callback:function(v){return'R$'+v;}}}
      },
      barPercentage:0.65,
      categoryPercentage:0.8
    }
  });
},80);}

function executarRenovacao(c,nd,nv){
  c.vencimento=nd;if(!c.renovacoes)c.renovacoes=[];c.renovacoes.unshift({data:today(),novoVencimento:nd,valor:nv});

}

is.slice(metade);var lucroPrimeiro=primeiroBloco.reduce(function(s,d){return s+d.lucro;},0);var lucroSegundo=segundoBloco.reduce(function(s,d){return s+d.lucro;},0);var cresc=lucroPrimeiro!==0?((lucroSegundo-lucroPrimeiro)/Math.abs(lucroPrimeiro)*100):(lucroSegundo>0?100:0);var seta=cresc>=0?'↑':'↓';var corCresc=cresc>=0?'var(--success)':'var(--danger)';crescimentoHtml='<div class="resumo-anual-crescimento"><span style="color:'+corCresc+'">'+seta+' '+(cresc>=0?'+':'')+cresc.toFixed(1)+'%</span><span style="font-size:.7rem;color:var(--text3);">último semestre vs anterior</span></div>';}var dadosParaGrafico=dadosMensais.slice(-7);var labelsParaGrafico=labelsMeses.slice(-7);var body='<div class="resumo-anual-grid"><div class="resumo-anual-stat"><div class="resumo-anual-stat-valor" style="color:var(--fin-entrada)">R$ '+fmt(entradasAno)+'</div><div class="resumo-anual-stat-label">Entradas</div></div><div class="resumo-anual-stat"><div class="resumo-anual-stat-valor" style="color:var(--danger)">R$ '+fmt(saidasAno)+'</div><div class="resumo-anual-stat-label">Saídas</div></div><div class="resumo-anual-stat"><div class="resumo-anual-stat-valor" style="color:'+(lucroAno>=0?'var(--success)':'var(--danger)')+'">R$ '+fmt(lucroAno)+'</div><div class="resumo-anual-stat-label">Lucro</div></div></div><div class="resumo-anual-media">📊 Média mensal: <strong>R$ '+fmt(mediaMensal)+'</strong> (considerando '+numMeses+' mês'+(numMeses>1?'es':'')+' de uso)</div><div class="resumo-anual-destaques">'+(melhorMes?'<div class="resumo-anual-destaque"><div class="resumo-anual-destaque-emoji">🏆</div><div class="resumo-anual-destaque-info">Melhor mês<span>'+new Date(melhorMes.ms+'-01').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})+' · R$ '+fmt(melhorMes.lucro)+'</span></div></div>':'')+(piorMes?'<div class="resumo-anual-destaque"><div class="resumo-anual-destaque-emoji">📉</div><div class="resumo-anual-destaque-info">Pior mês<span>'+new Date(piorMes.ms+'-01').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})+' · R$ '+fmt(piorMes.lucro)+'</span></div></div>':'')+'</div>'+crescimentoHtml+'<div class="card" style="margin-bottom:0;"><div style="font-weight:700;font-size:.8rem;margin-bottom:8px;">📊 Gráfico Mensal</div><div style="position:relative;height:200px;"><canvas id="resumoChart"></canvas></div></div>';showModal('resumo','📊 Resumo Anual',body,'<button class="btn btn-ghost btn-full" onclick="window._closeModal(\'resumo\')">Fechar</button>');renderResumoChart(dadosParaGrafico,labelsParaGrafico);}
function renderResumoChart(dados,labels){setTimeout(function(){var ctx=document.getElementById('resumoChart');if(!ctx||!window.Chart)return;if(chartInstResumo){try{chartInstResumo.destroy();}catch(e){}chartInstResumo=null;}var gridColor=darkMode?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';var textColor=darkMode?'#94A3B8':'#718096';chartInstResumo=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:'Entradas',data:dados.map(function(d){return d.entrada;}),backgroundColor:'#0288D1',borderRadius:5,borderSkipped:false},{label:'Saídas',data:dados.map(function(d){return d.saida;}),backgroundColor:'#EF5350',borderRadius:5,borderSkipped:false},{label:'Lucro',data:dados.map(function(d){return d.lucro;}),backgroundColor:'#43A047',borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:textColor,font:{size:9},boxWidth:10}}},scales:{x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:8}}},y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:8},callback:function(v){return'R$'+v;}}}}}});},100);}

function autoSincTrans(){
  var m=monthStr(0);
  db.transacoes=db.transacoes.filter(function(t){
    if(!t.data||!t.data.startsWith(m))return true;
    if(!t.clienteId)return true;
    return db.clientes.some(function(c){return c.id===t.clienteId;});
  });
  db.clientes.forEach(function(c){
    var p=db.planos.find(function(x){return x.id===c.planoId;});
    if(p){
      var valEntrada=p.valor-(c.desconto||0);
      if(valEntrada>0&&!db.transacoes.some(function(t){return t.clienteId===c.id&&t.tipo==='entrada'&&t.data.startsWith(m)&&!t.servId;})){
        db.transacoes.push({id:'t'+Date.now()+Math.random().toString(36).slice(2),clienteId:c.id,tipo:'entrada',valor:valEntrada,data:today(),desc:c.nome});
      }
    }
    var servs=c.servidoresIds||(c.servidorId?[c.servidorId]:[]);
    servs.forEach(function(sid){
      var s=db.servidores.find(function(x){return x.id===sid;});
      if(s&&s.valor&&!db.transacoes.some(function(t){return t.clienteId===c.id&&t.servId===s.id&&t.tipo==='saida'&&t.data.startsWith(m);})){
        db.transacoes.push({id:'t'+Date.now()+Math.random().toString(36).slice(2),clienteId:c.id,servId:s.id,tipo:'saida',valor:s.valor,data:today(),desc:s.nome});
      }
    });
  });
  saveDB();
}
