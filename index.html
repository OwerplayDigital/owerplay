<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Owerplay Gestor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  
  <style>
    :root {
      --accent: #DCC89B; --accent-light: #FFFEF8; --accent-dark: #B8A67A;
      --accent-gradient: linear-gradient(135deg, #DCC89B 0%, #CBB888 50%, #B8A67A 100%);
      --bg-primary: #FFFDF8; --bg-secondary: #FFFFFF; --bg-tertiary: #FFFEF5;
      --text-primary: #1C1B1A; --text-secondary: #8E8278; --text-tertiary: #B5AAA0;
      --success: #8DC98F; --success-light: #E8F5E9;
      --info: #8BA4C2; --info-light: #EDF2F8;
      --teal: #7CC4B4; --teal-light: #E8F6F2;
      --warning: #D4A853;
      --danger: #D9756B; --danger-light: #FCEAE8;
      --separator: #E8E2D5; --separator-strong: #D8D0C0;
      --shadow-xs: 0 1px 2px rgba(28,27,26,0.03); --shadow-sm: 0 2px 8px rgba(28,27,26,0.04);
      --shadow-md: 0 8px 24px rgba(28,27,26,0.06); --shadow-lg: 0 16px 48px rgba(28,27,26,0.08);
      --shadow-xl: 0 32px 64px rgba(28,27,26,0.10);
      --glass-bg: rgba(255,255,255,0.72); --glass-border: rgba(255,255,255,0.6);
      --glass-blur: blur(40px) saturate(180%);
      --sidebar-width: 280px; --radius-xs: 6px; --radius-sm: 10px; --radius-md: 14px;
      --radius-lg: 18px; --radius-xl: 22px; --radius-2xl: 28px;
      --transition-fast: 0.15s cubic-bezier(0.2, 0.0, 0, 1.0);
      --transition-smooth: 0.3s cubic-bezier(0.2, 0.0, 0, 1.0);
      --transition-spring: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    [data-theme="dark"] {
      --bg-primary: #1C1A18; --bg-secondary: #2A2725; --bg-tertiary: #353230;
      --text-primary: #F5F0EB; --text-secondary: #B5AAA0; --text-tertiary: #8E8278;
      --separator: #3D3936; --separator-strong: #4D4945;
      --glass-bg: rgba(42,39,37,0.72); --glass-border: rgba(255,255,255,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      display: flex; min-height: 100vh; line-height: 1.47059; font-weight: 400;
      letter-spacing: -0.022em; -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale; -webkit-tap-highlight-color: transparent;
      overflow-x: hidden; transition: background var(--transition-smooth), color var(--transition-smooth);
      touch-action: pan-y;
    }

    .app-container { display: flex; width: 100%; min-height: 100vh; position: relative; }
    .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(28,27,26,0.3); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 95; opacity: 0; transition: opacity var(--transition-smooth); pointer-events: none; }
    .mobile-overlay.show { opacity: 1; pointer-events: auto; }

    .hamburger-btn { display: none; position: fixed; top: 16px; right: 16px; z-index: 110; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: var(--radius-md); width: 40px; height: 40px; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-md); color: var(--text-primary); transition: all var(--transition-fast); }
    .hamburger-btn:active { transform: scale(0.94); }

    .sidebar { width: var(--sidebar-width); background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-right: 1px solid var(--separator); padding: 24px 16px 40px; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 90; box-shadow: var(--shadow-lg); transition: transform var(--transition-spring); overflow-y: auto; }
    .sidebar-close-btn { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: var(--radius-sm); background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); transition: all var(--transition-fast); z-index: 5; }
    .sidebar-close-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .sidebar-section { margin-bottom: 12px; }
    .sidebar-section-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); font-weight: 700; padding: 6px 10px; margin-bottom: 2px; }
    .sidebar-divider { height: 1px; background: var(--separator); margin: 8px 0; }
    .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; padding: 0 6px; }
    .logo-icon { background: var(--accent-gradient); color: white; width: 36px; height: 36px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; box-shadow: 0 4px 16px rgba(220,200,155,0.35); }
    .logo-text { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.04em; color: var(--text-primary); }
    .nav-item, .sidebar-action { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: var(--radius-sm); font-weight: 500; font-size: 0.83rem; color: var(--text-secondary); transition: all var(--transition-fast); cursor: pointer; background: transparent; border: none; width: 100%; text-align: left; letter-spacing: -0.02em; }
    .nav-item i, .sidebar-action i { width: 17px; height: 17px; stroke-width: 1.6; opacity: 0.7; flex-shrink: 0; }
    .nav-item:hover, .sidebar-action:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-light); color: var(--accent-dark); font-weight: 600; }
    .nav-item.active i { opacity: 1; stroke-width: 2; }

    .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 32px 28px 100px; width: 100%; min-height: 100vh; transition: margin-left var(--transition-spring); touch-action: pan-y; }

    .bottom-nav { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 24px); max-width: 520px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-radius: var(--radius-2xl); padding: 8px 8px; box-shadow: var(--shadow-xl); z-index: 100; border: 1px solid var(--separator); transition: opacity var(--transition-smooth), transform var(--transition-smooth); }
    .bottom-nav.hidden { opacity: 0; transform: translateX(-50%) translateY(20px); pointer-events: none; }
    .bottom-nav-inner { display: flex; justify-content: space-around; align-items: center; }
    .bottom-nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 0.55rem; font-weight: 500; color: var(--text-tertiary); background: none; border: none; padding: 8px 4px; border-radius: var(--radius-xl); transition: all var(--transition-fast); cursor: pointer; min-width: 55px; white-space: nowrap; }
    .bottom-nav-item.active { color: var(--accent-dark); background: var(--accent-light); font-weight: 600; }
    .bottom-nav-item i { width: 22px; height: 22px; stroke-width: 1.5; }

    .fab { display: none; position: fixed; bottom: 120px; right: 20px; width: 48px; height: 48px; background: var(--accent-gradient); color: white; border-radius: 50%; box-shadow: 0 6px 24px rgba(220,200,155,0.4); align-items: center; justify-content: center; border: none; z-index: 105; cursor: pointer; font-size: 1.3rem; opacity: 0.85; transition: all var(--transition-smooth); }
    .fab:active { transform: scale(0.9); }
    .fab.hidden { opacity: 0; transform: scale(0.5); pointer-events: none; }

    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-md); background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); color: var(--accent-dark); font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all var(--transition-fast); margin-bottom: 20px; box-shadow: var(--shadow-sm); }
    .back-btn:hover { background: var(--accent-light); box-shadow: var(--shadow-md); transform: translateX(-2px); }
    .back-btn:active { transform: scale(0.96); }
    .back-btn i { width: 18px; height: 18px; stroke-width: 2; }

    .section-title { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 4px; }
    .section-subtitle { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 24px; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

    .stat-card { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow-xs); border: 1px solid var(--separator); transition: all var(--transition-fast); position: relative; overflow: hidden; border-left: 3px solid var(--accent); }
    .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .stat-card.lucro-dashboard { border-left: none; }

    .stat-card.clickable { cursor: pointer; }
    .stat-card.clickable:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); border-color: var(--accent); }
    .stat-card.clickable:active { transform: scale(0.97); }
    .stat-card .card-arrow { position: absolute; top: 10px; right: 10px; opacity: 0; transition: opacity var(--transition-fast); color: var(--accent-dark); }
    .stat-card.clickable:hover .card-arrow { opacity: 1; }

    .stat-label { font-size: 0.7rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .stat-value { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.04em; transition: all 0.3s ease; }
    .stat-value.positive { color: var(--success); } .stat-value.negative { color: var(--danger); }
    .stat-value.warning-color { color: var(--warning); } .stat-value.neutral { color: var(--text-primary); }
    .stat-value.info-color { color: var(--info); } .stat-value.teal-color { color: var(--teal); }

    .lucro-destaque { background: var(--accent-gradient); color: white; border: none; border-left: none; box-shadow: 0 8px 32px rgba(220,200,155,0.35); cursor: pointer; }
    .lucro-destaque .stat-label { color: rgba(255,255,255,0.85); }
    .lucro-destaque .stat-value { color: white; font-size: 2rem; }
    .lucro-destaque:hover { box-shadow: 0 12px 40px rgba(220,200,155,0.5); transform: translateY(-3px); }
    .lucro-destaque .card-arrow { color: rgba(255,255,255,0.8); }

    .client-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; box-shadow: var(--shadow-xs); border: 1px solid var(--separator); transition: all var(--transition-fast); animation: fadeInCard 0.3s ease both; }
    .client-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .client-card:active { transform: scale(0.98); background: var(--bg-tertiary); }
    @keyframes fadeInCard { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; color: var(--accent-dark); flex-shrink: 0; }
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
    .badge-success { background: var(--success-light); color: #4A7A4F; }
    .badge-warning { background: #FFF5EB; color: #A87D3F; }
    .badge-danger { background: var(--danger-light); color: #B55D55; }

    .search-input { width: 100%; padding: 12px 16px; border-radius: var(--radius-lg); border: 1px solid var(--separator-strong); background: var(--bg-secondary); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: all var(--transition-fast); box-shadow: var(--shadow-xs); color: var(--text-primary); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(220,200,155,0.15); }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: var(--radius-md); font-weight: 600; font-size: 0.85rem; border: none; cursor: pointer; transition: all var(--transition-fast); }
    .btn-primary { background: var(--accent-gradient); color: white; box-shadow: 0 4px 16px rgba(220,200,155,0.35); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(220,200,155,0.4); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-ghost { background: transparent; color: var(--accent-dark); }
    .btn-icon { padding: 8px; border-radius: var(--radius-sm); background: transparent; border: none; cursor: pointer; transition: all var(--transition-fast); display: flex; align-items: center; justify-content: center; position: relative; }
    .btn-icon:hover { background: var(--bg-tertiary); }
    .btn-icon.danger:hover { background: var(--danger-light); color: var(--danger); }
    .btn-icon.whatsapp:hover { background: #E8F5E9; color: #25D366; }
    .btn-icon.notes:hover { background: var(--accent-light); color: var(--accent-dark); }
    .btn-icon.has-note::after { content: ''; position: absolute; top: 3px; right: 3px; width: 7px; height: 7px; border-radius: 50%; background: var(--info); border: 1px solid white; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(28,27,26,0.35); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content { background: var(--bg-secondary); border-radius: var(--radius-2xl); padding: 24px; width: 100%; max-width: 400px; box-shadow: var(--shadow-xl); max-height: 90vh; overflow-y: auto; border: 1px solid var(--separator); animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .confirm-modal { text-align: center; }
    .confirm-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .confirm-icon.renew { background: var(--accent-light); }
    .confirm-icon.delete { background: var(--danger-light); }

    .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; pointer-events: none; align-items: center; }
    .toast { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding: 12px 22px; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.85rem; pointer-events: auto; animation: toastIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-16px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
    .empty-state-card { text-align: center; padding: 48px 24px; background: var(--bg-secondary); border-radius: var(--radius-2xl); border: 1px solid var(--separator); box-shadow: var(--shadow-sm); max-width: 440px; margin: 0 auto; }
    .empty-state-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .empty-state-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
    .empty-state-desc { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }

    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .transaction-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--bg-secondary); border-radius: var(--radius-xl); overflow: hidden; min-width: 500px; }
    .transaction-table th { background: var(--bg-tertiary); padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; white-space: nowrap; }
    .transaction-table td { padding: 12px 14px; border-top: 1px solid var(--separator); font-size: 0.85rem; white-space: nowrap; }
    .transaction-amount { font-weight: 600; }
    .transaction-amount.positive { color: var(--success); } .transaction-amount.negative { color: var(--danger); }
    .transaction-amount.neutral { color: var(--text-primary); }

    .active-filter-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; background: var(--accent-light); color: var(--accent-dark); font-size: 0.8rem; font-weight: 600; margin-bottom: 16px; }
    .active-filter-badge button { background: none; border: none; color: var(--accent-dark); cursor: pointer; padding: 0; display: flex; align-items: center; }

    .action-icons { display: flex; gap: 6px; align-items: center; }
    .textarea-input { width: 100%; padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--separator-strong); background: var(--bg-secondary); font-family: 'Inter', sans-serif; font-size: 0.85rem; outline: none; resize: vertical; min-height: 120px; color: var(--text-primary); transition: all var(--transition-fast); }
    .textarea-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(220,200,155,0.15); }

    .chart-container { position: relative; width: 100%; height: 280px; margin: 0 auto; }
    .chart-container canvas { width: 100% !important; height: 100% !important; }
    .chart-modal-container { position: relative; width: 100%; height: 300px; margin: 0 auto; }

    .copy-input { background: var(--bg-tertiary); border: 1px solid var(--separator); border-radius: var(--radius-md); padding: 10px 14px; font-family: monospace; font-size: 0.7rem; word-break: break-all; color: var(--text-secondary); margin: 8px 0; max-height: 80px; overflow-y: auto; user-select: all; }

    .field-label { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 4px; margin-top: 0; }

    .pro-badge-lock { font-size: 0.6rem; background: var(--accent-light); color: var(--accent-dark); padding: 2px 6px; border-radius: 8px; margin-left: auto; font-weight: 600; }
    .pro-item { display: flex; align-items: center; gap: 10px; }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-xl); }
      .main-content { margin-left: 0; padding: 24px 16px 140px; } .hamburger-btn { display: flex; }
      .bottom-nav { display: block; } .fab { display: flex; } .card-grid { grid-template-columns: 1fr; }
      .back-btn { font-size: 0.8rem; padding: 6px 14px; } .chart-container { height: 240px; }
      .stat-value { font-size: 1.5rem; } .section-title { font-size: 1.8rem; }
      .lucro-destaque .stat-value { font-size: 1.7rem; } .empty-state-card { padding: 36px 20px; }
    }
    @media (min-width: 768px) and (max-width: 1024px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="app-container" id="appContainer">
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <button class="hamburger-btn" id="hamburgerBtn"><i data-lucide="menu" width="20" height="20"></i></button>
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-close-btn" id="sidebarCloseBtn"><i data-lucide="x" width="18" height="18"></i></button>
      <div class="logo-area"><div class="logo-icon">✦</div><span class="logo-text">Owerplay Gestor</span></div>
      <div class="sidebar-section"><div class="sidebar-section-title">Ferramentas</div>
        <button class="sidebar-action pro-item" id="sidebarRelatorio"><i data-lucide="bar-chart-3"></i> Relatório 6 Meses <span class="pro-badge-lock">⭐ PRO</span></button>
        <button class="sidebar-action pro-item" id="sidebarBackup"><i data-lucide="save"></i> Backup <span class="pro-badge-lock">⭐ PRO</span></button>
        <button class="sidebar-action pro-item" id="sidebarRestore"><i data-lucide="folder-open"></i> Restaurar Backup <span class="pro-badge-lock">⭐ PRO</span></button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section"><div class="sidebar-section-title">Atividades</div>
        <button class="sidebar-action pro-item" id="sidebarLog"><i data-lucide="list-checks"></i> Log de Atividades <span class="pro-badge-lock">⭐ PRO</span></button>
        <button class="sidebar-action" id="sidebarNotificacoes"><i data-lucide="bell"></i> Notificações <span id="notifBadge" style="background:var(--danger);color:white;font-size:0.6rem;padding:2px 7px;border-radius:10px;margin-left:auto;display:none;">0</span></button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section"><div class="sidebar-section-title">Preferências</div>
        <button class="sidebar-action" id="sidebarDarkMode"><i data-lucide="moon"></i> <span id="darkModeText">Modo Escuro</span></button>
        <button class="sidebar-action pro-item" id="sidebarMensagens"><i data-lucide="message-square"></i> Mensagens <span class="pro-badge-lock">⭐ PRO</span></button>
        <button class="sidebar-action" id="sidebarPlanoPRO"><i data-lucide="crown"></i> <span id="proBadgeText" style="color:#DCC89B;">Plano FREE</span></button>
      </div>
    </aside>
    <main class="main-content" id="mainContent"></main>
    <div class="toast-container" id="toastContainer"></div>
    <nav class="bottom-nav" id="bottomNav">
      <div class="bottom-nav-inner">
        <button class="bottom-nav-item active" data-section="dashboard"><i data-lucide="grid-2x2" width="22" height="22"></i><span>Início</span></button>
        <button class="bottom-nav-item" data-section="clientes"><i data-lucide="user-round" width="22" height="22"></i><span>Clientes</span></button>

      let currentSection = 'dashboard', clientesFilter = null, chartInstance = null, lastScrollY = 0;

      function showNotif() { const hoje = new Date().toISOString().split('T')[0]; const venc = db.clientes.filter(c => c.vencimento < hoje); const av = db.clientes.filter(c => c.vencimento >= hoje && c.vencimento <= new Date(Date.now()+3*86400000).toISOString().split('T')[0]); const txtVenc = venc.length === 1 ? '1 cliente vencido' : venc.length + ' clientes vencidos'; const txtAv = av.length === 1 ? '1 cliente vence' : av.length + ' clientes vencem'; const h = `<div class="modal-overlay" id="notifOverlay"><div class="modal-content" style="max-width:440px;"><h3 style="margin-bottom:12px;font-weight:700;">🔔 Notificações</h3>${venc.length===0&&av.length===0?'<p style="color:var(--text-tertiary);text-align:center;">Nenhuma notificação</p>':''}${venc.length>0?`<div style="margin-bottom:12px;"><strong style="color:var(--danger);">⚠️ ${txtVenc}:</strong>${venc.map(c=>`<div style="font-size:0.8rem;padding:4px 0;">• ${c.nome} - ${new Date(c.vencimento+'T00:00:00').toLocaleDateString('pt-BR')}</div>`).join('')}</div>`:''}${av.length>0?`<div><strong style="color:var(--warning);">📅 ${txtAv} em até 3 dias:</strong>${av.map(c=>`<div style="font-size:0.8rem;padding:4px 0;">• ${c.nome} - ${new Date(c.vencimento+'T00:00:00').toLocaleDateString('pt-BR')}</div>`).join('')}</div>`:''}<button class="btn btn-ghost" style="width:100%;margin-top:12px;" onclick="document.getElementById('notifOverlay').remove()">Fechar</button></div></div>`; document.body.insertAdjacentHTML('beforeend', h); document.getElementById('notifOverlay').addEventListener('click', (e) => { if (e.target.id === 'notifOverlay') e.target.remove(); }); }

      function showConfirmModal(title, msg, iconType, btnText, btnClass, cb) { const icons = { renew: { icon: 'refresh-cw', bg: 'var(--accent-light)', color: 'var(--accent-dark)' }, delete: { icon: 'trash', bg: 'var(--danger-light)', color: 'var(--danger)' } }; const ic = icons[iconType] || icons.delete; const h = `<div class="modal-overlay" id="confirmModalOverlay"><div class="modal-content confirm-modal"><div class="confirm-icon ${iconType}" style="background:${ic.bg};"><i data-lucide="${ic.icon}" width="28" height="28" style="color:${ic.color}"></i></div><h3 style="margin-bottom:8px;font-weight:700;">${title}</h3><p style="color:var(--text-secondary);margin-bottom:20px;font-size:0.9rem;">${msg}</p><div style="display:flex;gap:10px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('confirmModalOverlay').remove()">Cancelar</button><button class="btn ${btnClass}" style="flex:1;" id="confirmActionBtn">${btnText}</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); lucide.createIcons(); document.getElementById('confirmActionBtn').addEventListener('click', () => { document.getElementById('confirmModalOverlay').remove(); cb(); }); document.getElementById('confirmModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'confirmModalOverlay') e.target.remove(); }); }
      function showRenewModal(cid) { const c = db.clientes.find(x => x.id === cid); if (!c) return; const p = db.planos.find(x => x.id === c.planoId); const s = db.servidores.find(x => x.id === c.servidorId); const vp = p ? p.valor - (c.desconto || 0) : 0; const da = new Date(c.vencimento + 'T12:00:00'); if (da < new Date()) da.setTime(Date.now()); da.setDate(da.getDate() + 30); const ds = da.toISOString().split('T')[0]; const h = `<div class="modal-overlay" id="renewModalOverlay"><div class="modal-content"><div style="text-align:center;margin-bottom:16px;"><div class="confirm-icon renew" style="background:var(--accent-light);"><i data-lucide="calendar-sync" width="28" height="28" style="color:var(--accent-dark)"></i></div><h3 style="font-weight:700;">Renovar Cliente</h3></div><div style="background:var(--bg-tertiary);border-radius:var(--radius-md);padding:14px;margin-bottom:16px;"><div style="display:flex;align-items:center;gap:10px;"><div class="avatar" style="width:36px;height:36px;font-size:0.9rem;">${c.nome.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase()}</div><div><div style="font-weight:600;font-size:0.95rem;">${c.nome}</div><div style="font-size:0.8rem;color:var(--text-secondary);">Vence em: ${new Date(c.vencimento+'T00:00:00').toLocaleDateString('pt-BR')}</div></div></div></div><label style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">🗓️ Nova data:</label><input type="date" class="search-input" id="renewDate" value="${ds}" style="margin-bottom:12px;"><div style="background:var(--accent-light);border-radius:var(--radius-md);padding:10px 14px;text-align:center;margin-bottom:20px;"><span style="font-size:0.8rem;">💰 Valor:</span><span style="font-weight:700;font-size:1.1rem;color:var(--accent-dark);margin-left:6px;">R$ ${vp.toFixed(2)}</span></div><div style="display:flex;gap:10px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('renewModalOverlay').remove()">Cancelar</button><button class="btn btn-primary" style="flex:1;" id="confirmRenewBtn">Renovar</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); lucide.createIcons(); document.getElementById('confirmRenewBtn').addEventListener('click', () => { const nd = document.getElementById('renewDate').value; if (!nd) { showToast('Selecione uma data', 'error'); return; } c.vencimento = nd; const hoje = new Date(); const m = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`; db.transacoes.push({ id: 't_renov_' + c.id + '_' + Date.now(), descricao: 'Renovação ' + c.nome, valor: vp, tipo: 'entrada', data: m + '-01', clienteId: c.id }); if (s) { db.transacoes.push({ id: 'ts_renov_' + c.id + '_' + Date.now(), descricao: 'Servidor (' + c.nome + ')', valor: s.custo, tipo: 'saida', data: m + '-01', clienteId: c.id, servidorId: s.id }); } saveDB(); addLog(c.nome + ' renovado até ' + new Date(nd+'T00:00:00').toLocaleDateString('pt-BR')); document.getElementById('renewModalOverlay').remove(); renderSection(currentSection); showToast('Renovado com sucesso!'); try { confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } }); } catch(e) {} }); document.getElementById('renewModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'renewModalOverlay') e.target.remove(); }); }
      function showNotesModal(cid) { const c = db.clientes.find(x => x.id === cid); if (!c) return; const h = `<div class="modal-overlay" id="notesModalOverlay"><div class="modal-content"><h3>📝 Anotações</h3><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:14px;">${c.nome}</p><textarea class="textarea-input" id="notesText">${c.anotacoes || ''}</textarea><div style="display:flex;gap:10px;margin-top:16px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('notesModalOverlay').remove()">Cancelar</button><button class="btn btn-primary" style="flex:1;" id="saveNotesBtn">Salvar</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); lucide.createIcons(); document.getElementById('saveNotesBtn').addEventListener('click', () => { c.anotacoes = document.getElementById('notesText').value; saveDB(); addLog('Anotações: ' + c.nome); document.getElementById('notesModalOverlay').remove(); renderSection(currentSection); showToast('Anotações salvas!'); }); document.getElementById('notesModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'notesModalOverlay') e.target.remove(); }); }
      function showRelatorio() { const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']; const hoje = new Date(); const lb=[], ed=[], sd=[], ld=[]; for (let i=5;i>=0;i--) { const mes=new Date(hoje.getFullYear(),hoje.getMonth()-i,1); const ms=`${mes.getFullYear()}-${String(mes.getMonth()+1).padStart(2,'0')}`; lb.push(meses[mes.getMonth()]); ed.push(db.transacoes.filter(t=>t.tipo==='entrada'&&t.data.startsWith(ms)).reduce((s,t)=>s+t.valor,0)); sd.push(db.transacoes.filter(t=>t.tipo==='saida'&&t.data.startsWith(ms)).reduce((s,t)=>s+t.valor,0)); ld.push(ed[ed.length-1]-sd[sd.length-1]); } const h=`<div class="modal-overlay" id="relatorioOverlay"><div class="modal-content" style="max-width:520px;"><h3 style="margin-bottom:14px;font-weight:700;">📊 Relatório 6 Meses</h3><div class="chart-modal-container"><canvas id="relatorioChart"></canvas></div><button class="btn btn-ghost" style="width:100%;margin-top:16px;" onclick="document.getElementById('relatorioOverlay').remove()">Fechar</button></div></div>`; document.body.insertAdjacentHTML('beforeend',h); setTimeout(()=>{const ctx=document.getElementById('relatorioChart');if(ctx){new Chart(ctx,{type:'bar',data:{labels:lb,datasets:[{label:'Entradas',data:ed,backgroundColor:'#8BA4C2',borderRadius:8,borderSkipped:false},{label:'Saídas',data:sd,backgroundColor:'#D9756B',borderRadius:8,borderSkipped:false},{label:'Lucro',data:ld,backgroundColor:'#8DC98F',borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:18,font:{size:11}}}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.04)'}},x:{grid:{display:false}}}}});}},200);document.getElementById('relatorioOverlay').addEventListener('click',(e)=>{if(e.target.id==='relatorioOverlay')e.target.remove();});}

      function renderDashboard() { 
        const hoje = new Date().toISOString().split('T')[0]; 
        const ent = db.transacoes.filter(t => t.tipo==='entrada').reduce((s,t) => s+t.valor, 0); 
        const sai = db.transacoes.filter(t => t.tipo==='saida').reduce((s,t) => s+t.valor, 0); 
        const luc = ent - sai;
        
        mainContent.innerHTML = `<h1 class="section-title">Owerplay Gestor</h1><p class="section-subtitle">Conectando você ao lucro</p><div style="max-width:400px;margin:0 auto 24px;"><div class="stat-card lucro-dashboard lucro-destaque clickable" onclick="window.navigateToFinancas()"><i data-lucide="arrow-up-right" class="card-arrow" width="18" height="18"></i><div class="stat-label">💰 Lucro do Mês</div><div class="stat-value">R$ ${luc.toFixed(2)}</div></div></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px;"><div class="stat-card clickable" onclick="window.navigateWithFilter('active')"><i data-lucide="arrow-up-right" class="card-arrow" width="16" height="16"></i><div class="stat-label">✅ Ativos</div><div class="stat-value">${db.clientes.filter(c=>c.vencimento>=hoje).length}</div></div><div class="stat-card clickable" onclick="window.navigateWithFilter('expired')"><i data-lucide="arrow-up-right" class="card-arrow" width="16" height="16"></i><div class="stat-label">⚠️ Vencidos</div><div class="stat-value" style="color:var(--danger)">${db.clientes.filter(c=>c.vencimento<hoje).length}</div></div><div class="stat-card clickable" onclick="window.navigateWithFilter('today')"><i data-lucide="arrow-up-right" class="card-arrow" width="16" height="16"></i><div class="stat-label">📅 Hoje</div><div class="stat-value warning-color">${db.clientes.filter(c=>c.vencimento===hoje).length}</div></div><div class="stat-card clickable" onclick="window.navigateWithFilter('all')"><i data-lucide="arrow-up-right" class="card-arrow" width="16" height="16"></i><div class="stat-label">👥 Total</div><div class="stat-value neutral">${db.clientes.length}</div></div></div><input type="text" class="search-input" placeholder="🔍 Buscar cliente..." id="searchDash" style="margin-bottom:16px;"><div class="card-grid" id="dashboardClients"></div>`; 
        renderCards('dashboardClients', db.clientes, hoje);
      }
      function renderCards(contId, clientes, hoje) { const cont = document.getElementById(contId); if (!cont) return; if (clientes.length === 0) { cont.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><i data-lucide="user-round" width="48" height="48"></i><p style="font-size:1.1rem;font-weight:500;">Nenhum cliente encontrado</p></div>`; lucide.createIcons(); return; } cont.innerHTML = clientes.sort((a,b)=>a.vencimento.localeCompare(b.vencimento)).map((c,i) => { const p = db.planos.find(x=>x.id===c.planoId) || {}; const s = db.servidores.find(x=>x.id===c.servidorId) || {}; const ini = c.nome.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase(); let sc='badge-success', st='Ativo'; if (c.vencimento < hoje) { sc='badge-danger'; st='Vencido'; } else if (c.vencimento === hoje) { sc='badge-warning'; st='Hoje'; } return `<div class="client-card" style="animation-delay:${i*0.04}s"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div class="avatar">${ini}</div><div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:0.9rem;">${c.nome}</div><div style="font-size:0.7rem;color:var(--text-secondary);">${p.nome||'Sem plano'} · ${s.nome||'Sem servidor'}</div></div><span class="badge ${sc}">${st}</span></div><div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--separator);font-size:0.75rem;color:var(--text-secondary);margin-bottom:6px;"><span>📅 ${new Date(c.vencimento+'T00:00:00').toLocaleDateString('pt-BR')}</span><span>R$ ${((p.valor||0)-(c.desconto||0)).toFixed(2)}</span></div><div class="action-icons" style="justify-content:flex-end;"><button class="btn-icon whatsapp" onclick="window._wp('${c.id}')"><i data-lucide="messages-square" width="18" height="18"></i></button><button class="btn-icon notes ${c.anotacoes?'has-note':''}" onclick="window._note('${c.id}')"><i data-lucide="file-text" width="18" height="18"></i></button><button class="btn-icon" onclick="window._renovar('${c.id}')"><i data-lucide="rotate-cw" width="18" height="18"></i></button><button class="btn-icon" onclick="window._editar('${c.id}')"><i data-lucide="pencil" width="18" height="18"></i></button><button class="btn-icon danger" onclick="window._excluir('${c.id}')"><i data-lucide="trash" width="18" height="18"></i></button></div></div>`; }).join(''); lucide.createIcons(); }
      function renderClientes() { const hoje = new Date().toISOString().split('T')[0]; let cl = [...db.clientes]; let label = ''; if (clientesFilter === 'active') { cl = cl.filter(c => c.vencimento >= hoje); label = 'Ativos'; } else if (clientesFilter === 'expired') { cl = cl.filter(c => c.vencimento < hoje); label = 'Vencidos'; } else if (clientesFilter === 'today') { cl = cl.filter(c => c.vencimento === hoje); label = 'Hoje'; } else if (clientesFilter === 'all') { label = 'Todos'; } let html = `<button class="back-btn" onclick="window.goBack()"><i data-lucide="chevron-left"></i> Voltar</button><h1 class="section-title">Clientes</h1><p class="section-subtitle">Seus clientes, seu patrimônio</p>`; if (!label && db.clientes.length === 0 && db.planos.length === 0 && db.servidores.length === 0) { html += `<div class="empty-state-card"><div class="empty-state-icon"><i data-lucide="users" width="32" height="32" style="color:var(--accent-dark)"></i></div><div class="empty-state-title">Nenhum cliente</div><div class="empty-state-desc">Cadastre primeiro <strong>Servidor</strong> e <strong>Plano</strong>.</div><button class="btn btn-primary" onclick="window.goBack()">Começar</button></div>`; } else { if (label) html += `<div class="active-filter-badge">🔍 ${label} (${cl.length}) <button onclick="window.clearFilter()"><i data-lucide="x" width="14" height="14"></i></button></div>`; html += `<div class="card-grid" id="clientesList"></div>`; } mainContent.innerHTML = html; if (cl.length > 0 || db.planos.length > 0 || db.servidores.length > 0) { renderCards('clientesList', cl, hoje); } clientesFilter = null; }
      window.clearFilter = function() { clientesFilter = null; renderClientes(); };
      window._wp = function(id) { sendWhatsApp(id, 'cobranca'); };

      window._excluir = function(id) { const c = db.clientes.find(x => x.id === id); if (!c) return; showConfirmModal('Tem certeza?', 'Esta ação é <strong>irreversível</strong>.', 'delete', 'Sim, excluir', 'btn-danger', () => { db.clientes = db.clientes.filter(x => x.id !== id); sincronizarTransacoes(); addLog(c.nome + ' excluído'); renderSection(currentSection); showToast('Excluído!'); }); };
      function abrirModalCliente(id = null) { const c = id ? db.clientes.find(x => x.id === id) : null; if (db.planos.length === 0 && !id) { showToast('Cadastre um plano primeiro!', 'warning'); return; } if (db.servidores.length === 0 && !id) { showToast('Cadastre um servidor primeiro!', 'warning'); return; } const h = `<div class="modal-overlay" id="modalCli"><div class="modal-content"><h2 style="margin-bottom:16px;">${id?'Editar':'Novo'} Cliente</h2><div style="display:flex;flex-direction:column;gap:12px;"><div><label class="field-label">Nome</label><input class="search-input" id="nomeCli" value="${c?.nome||''}"></div><div><label class="field-label">WhatsApp</label><input class="search-input" id="whatsCli" value="${c?.whatsapp||''}"></div><div><label class="field-label">Vencimento</label><input type="date" class="search-input" id="vencCli" value="${c?.vencimento||''}"></div><div><label class="field-label">Plano</label><select class="search-input" id="planoCli"><option value=""></option>${db.planos.map(p=>`<option value="${p.id}" ${c?.planoId===p.id?'selected':''}>${p.nome} - R$${p.valor.toFixed(2)}</option>`).join('')}</select></div><div><label class="field-label">Desconto (R$)</label><input type="number" class="search-input" id="descCli" value="${c?.desconto||''}"></div><div><label class="field-label">Servidor</label><select class="search-input" id="servCli"><option value=""></option>${db.servidores.map(s=>`<option value="${s.id}" ${c?.servidorId===s.id?'selected':''}>${s.nome}</option>`).join('')}</select></div></div><div style="display:flex;gap:10px;margin-top:20px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('modalCli').remove()">Cancelar</button><button class="btn btn-primary" style="flex:1;" id="saveCli">Salvar</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); document.getElementById('saveCli').addEventListener('click', () => { const nome = document.getElementById('nomeCli').value.trim(); const venc = document.getElementById('vencCli').value; if (!nome || !venc) { showToast('Preencha nome e vencimento', 'error'); return; } const novo = { id: id || 'c'+Date.now(), nome, whatsapp: document.getElementById('whatsCli').value, vencimento: venc, planoId: document.getElementById('planoCli').value, desconto: parseFloat(document.getElementById('descCli').value)||0, servidorId: document.getElementById('servCli').value, anotacoes: c?.anotacoes || '' }; if (id) { db.clientes = db.clientes.map(x => x.id===id ? novo : x); saveDB(); } else { db.clientes.push(novo); sincronizarTransacoes(); } addLog(id ? (nome + ' atualizado') : (nome + ' cadastrado')); document.getElementById('modalCli').remove(); renderSection(currentSection); showToast(id ? 'Atualizado!' : 'Cadastrado!'); }); document.getElementById('modalCli').addEventListener('click', (e) => { if (e.target.id==='modalCli') e.target.remove(); }); }

      function renderPlanos() { let html = `<button class="back-btn" onclick="window.goBack()"><i data-lucide="chevron-left"></i> Voltar</button><h1 class="section-title">Planos</h1><p class="section-subtitle">Configure seus planos</p>`; if (db.planos.length === 0) { html += `<div class="empty-state-card"><div class="empty-state-icon"><i data-lucide="box" width="32" height="32" style="color:var(--accent-dark)"></i></div><div class="empty-state-title">Crie seus Planos</div><div class="empty-state-desc">Defina categorias de venda com nome e valor para oferecer aos seus clientes de forma organizada.</div><button class="btn btn-primary" onclick="window._newPlano()">+ Criar Plano</button></div>`; } else { html += `<div class="card-grid" id="planosList"></div>`; } mainContent.innerHTML = html; if (db.planos.length > 0) { const c = document.getElementById('planosList'); c.innerHTML = db.planos.map(p => `<div class="stat-card"><div style="font-weight:600;font-size:1rem;">${p.nome}</div><div style="font-size:1.4rem;font-weight:700;margin:6px 0;">R$ ${p.valor.toFixed(2)}</div><div class="action-icons" style="justify-content:flex-end;"><button class="btn-icon" onclick="window._editPlano('${p.id}')"><i data-lucide="pencil" width="18" height="18"></i></button><button class="btn-icon danger" onclick="window._delPlano('${p.id}')"><i data-lucide="trash" width="18" height="18"></i></button></div></div>`).join(''); } lucide.createIcons(); updateFab(); }
      window._newPlano = function() { abrirModalPlano(); };
      window._editPlano = (id) => abrirModalPlano(id);
      window._delPlano = (id) => { const p = db.planos.find(x => x.id===id); if (!p) return; showConfirmModal('Tem certeza?', 'Esta ação é <strong>irreversível</strong>.', 'delete', 'Sim, excluir', 'btn-danger', () => { db.planos = db.planos.filter(x => x.id!==id); sincronizarTransacoes(); addLog('Plano ' + p.nome + ' excluído'); renderSection('planos'); showToast('Excluído!'); }); };
      function abrirModalPlano(id = null) { const p = id ? db.planos.find(x => x.id === id) : null; const h = `<div class="modal-overlay" id="modalPlano"><div class="modal-content"><h2 style="margin-bottom:14px;">${id?'Editar':'Novo'} Plano</h2><div style="display:flex;flex-direction:column;gap:12px;"><div><label class="field-label">Nome</label><input class="search-input" id="nomePlano" value="${p?.nome||''}"></div><div><label class="field-label">Valor (R$)</label><input type="number" class="search-input" id="valorPlano" value="${p?.valor||''}"></div></div><div style="display:flex;gap:10px;margin-top:20px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('modalPlano').remove()">Cancelar</button><button class="btn btn-primary" style="flex:1;" id="savePlano">Salvar</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); document.getElementById('savePlano').addEventListener('click', () => { const n = document.getElementById('nomePlano').value.trim(); const v = parseFloat(document.getElementById('valorPlano').value)||0; if (!n||v<=0) { showToast('Inválido', 'error'); return; } if (id) db.planos = db.planos.map(x => x.id===id ? {id,nome:n,valor:v} : x); else db.planos.push({id:'p'+Date.now(),nome:n,valor:v}); if (id) sincronizarTransacoes(); saveDB(); addLog(id ? ('Plano ' + n + ' atualizado') : ('Plano ' + n + ' criado')); document.getElementById('modalPlano').remove(); renderSection('planos'); showToast('Plano salvo!'); }); document.getElementById('modalPlano').addEventListener('click', (e) => { if (e.target.id==='modalPlano') e.target.remove(); }); }

      function renderServidores() { let html = `<button class="back-btn" onclick="window.goBack()"><i data-lucide="chevron-left"></i> Voltar</button><h1 class="section-title">Servidores</h1><p class="section-subtitle">Gerencie seus servidores</p>`; if (db.servidores.length === 0) { html += `<div class="empty-state-card"><div class="empty-state-icon"><i data-lucide="server" width="32" height="32" style="color:var(--accent-dark)"></i></div><div class="empty-state-title">Cadastre seu Servidor</div><div class="empty-state-desc">Adicione seu servidor de origem para gerenciar seus custos operacionais e vincular aos clientes. ${!planoPro?'<br><small style="color:var(--warning);">Plano FREE: 1 servidor</small>':''}</div><button class="btn btn-primary" onclick="window._newServ()">+ Novo Servidor</button></div>`; } else { html += `<div class="card-grid" id="servidoresList"></div>`; } mainContent.innerHTML = html; if (db.servidores.length > 0) { const c = document.getElementById('servidoresList'); c.innerHTML = db.servidores.map(s => `<div class="stat-card"><div style="font-weight:600;font-size:1rem;">${s.nome}</div><div style="font-size:1.1rem;color:var(--text-secondary);margin:6px 0;">Custo: R$ ${s.custo.toFixed(2)}</div><div class="action-icons" style="justify-content:flex-end;"><button class="btn-icon" onclick="window._editServ('${s.id}')"><i data-lucide="pencil" width="18" height="18"></i></button><button class="btn-icon danger" onclick="window._delServ('${s.id}')"><i data-lucide="trash" width="18" height="18"></i></button></div></div>`).join(''); } lucide.createIcons(); updateFab(); }
      window._newServ = function() { if (db.servidores.length >= 1 && !planoPro) { showBannerPRO(); return; } abrirModalServidor(); };
      window._editServ = (id) => abrirModalServidor(id);
      window._delServ = (id) => { const s = db.servidores.find(x => x.id===id); if (!s) return; showConfirmModal('Tem certeza?', 'Esta ação é <strong>irreversível</strong>.', 'delete', 'Sim, excluir', 'btn-danger', () => { db.servidores = db.servidores.filter(x => x.id!==id); sincronizarTransacoes(); addLog('Servidor ' + s.nome + ' excluído'); renderSection('servidores'); showToast('Excluído!'); }); };
      function abrirModalServidor(id = null) { const s = id ? db.servidores.find(x => x.id === id) : null; const h = `<div class="modal-overlay" id="modalServ"><div class="modal-content"><h2 style="margin-bottom:14px;">${id?'Editar':'Novo'} Servidor</h2><div style="display:flex;flex-direction:column;gap:12px;"><div><label class="field-label">Nome</label><input class="search-input" id="nomeServ" value="${s?.nome||''}"></div><div><label class="field-label">Custo (R$)</label><input type="number" class="search-input" id="custoServ" value="${s?.custo||''}"></div></div><div style="display:flex;gap:10px;margin-top:20px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('modalServ').remove()">Cancelar</button><button class="btn btn-primary" style="flex:1;" id="saveServ">Salvar</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); document.getElementById('saveServ').addEventListener('click', () => { const n = document.getElementById('nomeServ').value.trim(); const c = parseFloat(document.getElementById('custoServ').value)||0; if (!n||c<=0) { showToast('Inválido', 'error'); return; } if (id) db.servidores = db.servidores.map(x => x.id===id ? {id,nome:n,custo:c} : x); else db.servidores.push({id:'s'+Date.now(),nome:n,custo:c}); if (id) sincronizarTransacoes(); saveDB(); addLog(id ? ('Servidor ' + n + ' atualizado') : ('Servidor ' + n + ' criado')); document.getElementById('modalServ').remove(); renderSection('servidores'); showToast('Servidor salvo!'); }); document.getElementById('modalServ').addEventListener('click', (e) => { if (e.target.id==='modalServ') e.target.remove(); }); }

      function renderFinancas() { const hoje = new Date(); const m = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`; const ma = hoje.getMonth()===0?`${hoje.getFullYear()-1}-12`:`${hoje.getFullYear()}-${String(hoje.getMonth()).padStart(2,'0')}`; const ent = db.transacoes.filter(t=>t.tipo==='entrada'&&t.data.startsWith(m)).reduce((s,t)=>s+t.valor,0); const sai = db.transacoes.filter(t=>t.tipo==='saida'&&t.data.startsWith(m)).reduce((s,t)=>s+t.valor,0); const luc = ent-sai; const ea = db.transacoes.filter(t=>t.tipo==='entrada'&&t.data.startsWith(ma)).reduce((s,t)=>s+t.valor,0); const sa = db.transacoes.filter(t=>t.tipo==='saida'&&t.data.startsWith(ma)).reduce((s,t)=>s+t.valor,0); const la = ea-sa; const cresc = la!==0?((luc-la)/Math.abs(la))*100:(luc>0?100:0); const crescTxt = cresc>=0?'+'+cresc.toFixed(1)+'%':cresc.toFixed(1)+'%'; const clienteTransacoes = {}; db.clientes.forEach(c => { clienteTransacoes[c.id] = { nome: c.nome, entrada: 0, saida: 0 }; }); db.transacoes.forEach(t => { if (t.clienteId && clienteTransacoes[t.clienteId]) { if (t.tipo === 'entrada') clienteTransacoes[t.clienteId].entrada += t.valor; else clienteTransacoes[t.clienteId].saida += t.valor; } }); const clienteRows = Object.values(clienteTransacoes).slice(0, planoPro ? undefined : 10).map(ct => { const lucroCli = ct.entrada - ct.saida; return `<tr><td><strong>${ct.nome}</strong></td><td class="transaction-amount positive">+ R$ ${ct.entrada.toFixed(2)}</td><td class="transaction-amount negative">- R$ ${ct.saida.toFixed(2)}</td><td class="transaction-amount ${lucroCli>=0?'positive':'negative'}">${lucroCli>=0?'+':'-'} R$ ${Math.abs(lucroCli).toFixed(2)}</td></tr>`; }).join(''); mainContent.innerHTML=`<button class="back-btn" onclick="window.goBack()"><i data-lucide="chevron-left"></i> Voltar</button><h1 class="section-title">Finanças</h1><p class="section-subtitle">Receitas e despesas do mês${!planoPro?' · <small style="color:var(--warning);">Limitado a 10 transações</small>':''}</p><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px;"><div class="stat-card lucro"><div class="stat-label"><i data-lucide="wallet" width="14" height="14" style="color:var(--success)"></i> Lucro</div><div class="stat-value positive">R$ ${luc.toFixed(2)}</div></div><div class="stat-card entrada"><div class="stat-label"><i data-lucide="trending-up" width="14" height="14" style="color:var(--info)"></i> Entradas</div><div class="stat-value info-color">R$ ${ent.toFixed(2)}</div></div><div class="stat-card saida"><div class="stat-label"><i data-lucide="trending-down" width="14" height="14" style="color:var(--danger)"></i> Saídas</div><div class="stat-value negative">R$ ${sai.toFixed(2)}</div></div><div class="stat-card crescimento"><div class="stat-label"><i data-lucide="activity" width="14" height="14" style="color:var(--teal)"></i> Crescimento</div><div class="stat-value teal-color">${crescTxt}</div></div></div><div class="stat-card" style="margin-bottom:20px;"><h3 style="margin-bottom:12px;font-weight:600;">📊 Este Mês</h3><div class="chart-container"><canvas id="finChart"></canvas></div></div><div class="stat-card"><h3 style="margin-bottom:12px;font-weight:600;">Resumo por Cliente</h3><div class="table-wrapper"><table class="transaction-table"><thead><tr><th>Cliente</th><th>Entrada</th><th>Saída</th><th>Lucro</th></tr></thead><tbody>${clienteRows||'<tr><td colspan="4" style="text-align:center;padding:40px;">Nenhuma transação</td></tr>'}</tbody></table></div></div>`;lucide.createIcons();setTimeout(()=>{if(chartInstance)chartInstance.destroy();const ctx=document.getElementById('finChart');if(ctx){chartInstance=new Chart(ctx,{type:'bar',data:{labels:['Este Mês'],datasets:[{label:'Entradas',data:[ent],backgroundColor:'#8BA4C2',borderRadius:8,borderSkipped:false},{label:'Saídas',data:[sai],backgroundColor:'#D9756B',borderRadius:8,borderSkipped:false},{label:'Lucro',data:[luc],backgroundColor:'#8DC98F',borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:18,font:{size:11}}}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.04)'}},x:{grid:{display:false}}}}});}},200);}
      function renderMensagens() { mainContent.innerHTML = `<button class="back-btn" onclick="window.goBack()"><i data-lucide="chevron-left"></i> Voltar</button><h1 class="section-title">Mensagens</h1><p class="section-subtitle">Comunique-se com seus clientes</p><div class="stat-card" style="margin-bottom:16px;"><h3>📋 Cobrança</h3><p style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:8px;">Tags: {nome}, {sobrenome}, {vencimento}, {valor}, {plano}</p><textarea class="textarea-input" id="tplCobranca" style="min-height:140px;">${db.templates.cobranca}</textarea></div><div class="stat-card" style="margin-bottom:20px;"><h3>📋 Renovação</h3><p style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:8px;">Tags: {nome}, {sobrenome}, {vencimento}</p><textarea class="textarea-input" id="tplRenovacao" style="min-height:100px;">${db.templates.renovacao}</textarea></div><div style="display:flex;gap:10px;"><button class="btn btn-ghost" style="flex:1;" id="resetTpl">Restaurar Padrão</button><button class="btn btn-primary" style="flex:1;" id="saveTpl">Salvar Templates</button></div>`; lucide.createIcons(); document.getElementById('saveTpl').onclick = () => { db.templates.cobranca = document.getElementById('tplCobranca').value; db.templates.renovacao = document.getElementById('tplRenovacao').value; saveDB(); addLog('Templates atualizados'); showToast('Templates salvos!'); }; document.getElementById('resetTpl').onclick = () => { db.templates.cobranca = defaultTemplates.cobranca; db.templates.renovacao = defaultTemplates.renovacao; saveDB(); renderMensagens(); showToast('Restaurado!','info'); }; }

      sincronizarTransacoes(); renderSection('dashboard');
      function checkMobile() { if (window.innerWidth >= 1024 && sidebar) closeSidebar(); updateFab(); }
      window.addEventListener('resize', checkMobile); checkMobile();
      atualizarDarkModeText(); atualizarBadgePro(); atualizarIconesPro();
    })();
  </script>
</body>
</html>
