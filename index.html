  <style>
    :root {
      --accent: #0288D1; --accent-light: #E1F5FE; --accent-dark: #01579B;
      --accent-gradient: linear-gradient(135deg, #03A9F4 0%, #0288D1 50%, #0277BD 100%);
      --bg-primary: #F0F8FF; --bg-secondary: #FFFFFF; --bg-tertiary: #F5FAFF;
      --text-primary: #0A1929; --text-secondary: #4A7A9E; --text-tertiary: #8AACC8;
      --success: #43A047; --success-light: #E8F5E9;
      --info: #03A9F4; --info-light: #E1F5FE;
      --teal: #0097A7; --teal-light: #E0F7FA;
      --warning: #FFA000;
      --danger: #EF5350; --danger-light: #FFEBEE;
      --crescimento: #F57C00; --crescimento-light: #FFF3E0;
      --entrada: #0288D1; --entrada-light: #E1F5FE;
      --separator: #D8E8F5; --separator-strong: #B8D0E8;
      --shadow-xs: 0 1px 2px rgba(10, 25, 41, 0.03); --shadow-sm: 0 2px 8px rgba(10, 25, 41, 0.04);
      --shadow-md: 0 8px 24px rgba(10, 25, 41, 0.06); --shadow-lg: 0 16px 48px rgba(10, 25, 41, 0.08);
      --shadow-xl: 0 32px 64px rgba(10, 25, 41, 0.10);
      --glass-bg: rgba(255, 255, 255, 0.72); --glass-border: rgba(255, 255, 255, 0.6);
      --glass-blur: blur(40px) saturate(180%);
      --sidebar-width: 280px; --radius-xs: 6px; --radius-sm: 10px; --radius-md: 14px;
      --radius-lg: 18px; --radius-xl: 22px; --radius-2xl: 28px;
      --transition-fast: 0.15s cubic-bezier(0.2, 0.0, 0, 1.0);
      --transition-smooth: 0.3s cubic-bezier(0.2, 0.0, 0, 1.0);
      --transition-spring: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    [data-theme="dark"] {
      --bg-primary: #0A1929; --bg-secondary: #102A43; --bg-tertiary: #1A3A5C;
      --text-primary: #E3F2FD; --text-secondary: #90CAF9; --text-tertiary: #64B5F6;
      --separator: #1A3A5C; --separator-strong: #243B53;
      --glass-bg: rgba(16, 42, 67, 0.85); --glass-border: rgba(255, 255, 255, 0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      display: flex; min-height: 100vh; line-height: 1.47059; font-weight: 400;
      letter-spacing: -0.022em; -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale; -webkit-tap-highlight-color: transparent;
      overflow-x: hidden; transition: background var(--transition-smooth), color var(--transition-smooth);
      touch-action: pan-y;
    }

    .app-container { display: flex; width: 100%; min-height: 100vh; position: relative; }
    .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(10, 25, 41, 0.3); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 95; opacity: 0; transition: opacity var(--transition-smooth); pointer-events: none; }
    .mobile-overlay.show { opacity: 1; pointer-events: auto; }
    .hamburger-btn { display: none; position: fixed; top: 16px; right: 16px; z-index: 110; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: var(--radius-md); width: 40px; height: 40px; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-md); color: var(--text-primary); transition: all var(--transition-fast); }
    .hamburger-btn:active { transform: scale(0.94); }
    .sidebar { width: var(--sidebar-width); background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-right: 1px solid var(--separator); padding: 24px 16px 40px; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 90; box-shadow: var(--shadow-lg); transition: transform var(--transition-spring); overflow-y: auto; }
    .sidebar-close-btn { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: var(--radius-sm); background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); transition: all var(--transition-fast); z-index: 5; }
    .sidebar-close-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .sidebar-section { margin-bottom: 12px; }
    .sidebar-section-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); font-weight: 700; padding: 6px 10px; margin-bottom: 2px; }
    .sidebar-divider { height: 1px; background: var(--separator); margin: 8px 0; }
    .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; padding: 0 6px; }
    .logo-icon { background: var(--accent-gradient); color: white; width: 36px; height: 36px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; box-shadow: 0 4px 16px rgba(2, 136, 209, 0.35); }
    .logo-text { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.04em; color: var(--text-primary); }
    .nav-item, .sidebar-action { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: var(--radius-sm); font-weight: 500; font-size: 0.83rem; color: var(--text-secondary); transition: all var(--transition-fast); cursor: pointer; background: transparent; border: none; width: 100%; text-align: left; letter-spacing: -0.02em; }
    .nav-item i, .sidebar-action i { width: 17px; height: 17px; stroke-width: 1.6; opacity: 0.7; flex-shrink: 0; }
    .nav-item:hover, .sidebar-action:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-light); color: var(--accent-dark); font-weight: 600; }
    .nav-item.active i { opacity: 1; stroke-width: 2; }
    .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 32px 28px 100px; width: 100%; min-height: 100vh; transition: margin-left var(--transition-spring); touch-action: pan-y; }
    .bottom-nav { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 24px); max-width: 520px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-radius: var(--radius-2xl); padding: 8px 8px; box-shadow: var(--shadow-xl); z-index: 100; border: 1px solid var(--separator); transition: opacity var(--transition-smooth), transform var(--transition-smooth); }
    .bottom-nav.dock-hidden { opacity: 0; transform: translateX(-50%) translateY(20px); pointer-events: none; }
    .bottom-nav-inner { display: flex; justify-content: space-around; align-items: center; }
    .bottom-nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 0.55rem; font-weight: 500; color: var(--text-tertiary); background: none; border: none; padding: 8px 4px; border-radius: var(--radius-xl); transition: all var(--transition-fast); cursor: pointer; min-width: 55px; white-space: nowrap; }
    .bottom-nav-item.active { color: var(--accent-dark); background: var(--accent-light); font-weight: 600; }
    .bottom-nav-item i { width: 22px; height: 22px; stroke-width: 1.5; }
    .fab { display: none; position: fixed; bottom: 120px; right: 20px; width: 48px; height: 48px; background: var(--accent-gradient); color: white; border-radius: 50%; box-shadow: 0 6px 24px rgba(2, 136, 209, 0.3); align-items: center; justify-content: center; border: none; z-index: 105; cursor: pointer; font-size: 1.3rem; opacity: 0.85; transition: all var(--transition-smooth); }
    .fab:active { transform: scale(0.9); }
    .fab.dock-hidden { opacity: 0; transform: scale(0.5); pointer-events: none; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-md); background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); color: var(--accent-dark); font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all var(--transition-fast); margin-bottom: 20px; box-shadow: var(--shadow-sm); }
    .back-btn:hover { background: var(--accent-light); box-shadow: var(--shadow-md); transform: translateX(-2px); }
    .section-title { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 4px; }
    .section-subtitle { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 24px; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .stat-card { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow-xs); border: 1px solid var(--separator); transition: all var(--transition-fast); position: relative; overflow: hidden; border-left: 3px solid var(--accent); }
    .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .stat-card.lucro-dashboard { border-left: none; }
    .stat-card.clickable { cursor: pointer; }
    .stat-card.clickable:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); border-color: var(--accent); }
    .stat-card.clickable:active { transform: scale(0.97); }
    .stat-card .card-arrow { position: absolute; top: 10px; right: 10px; opacity: 0; transition: opacity var(--transition-fast); color: var(--accent-dark); }
    .stat-card.clickable:hover .card-arrow { opacity: 1; }
    .stat-label { font-size: 0.7rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .stat-value { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.04em; transition: all 0.3s ease; }
    .stat-value.positive { color: var(--success); } .stat-value.negative { color: var(--danger); }
    .stat-value.warning-color { color: var(--warning); } .stat-value.neutral { color: var(--text-primary); }
    .stat-value.info-color { color: var(--entrada); } .stat-value.teal-color { color: var(--crescimento); }
    .lucro-destaque { background: var(--accent-gradient); color: white; border: none; border-left: none; box-shadow: 0 8px 32px rgba(2, 136, 209, 0.35); cursor: pointer; }
    .lucro-destaque .stat-label { color: rgba(255, 255, 255, 0.85); }
    .lucro-destaque .stat-value { color: white; font-size: 2rem; }
    .lucro-destaque:hover { box-shadow: 0 12px 40px rgba(2, 136, 209, 0.5); transform: translateY(-3px); }
    .client-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; box-shadow: var(--shadow-xs); border: 1px solid var(--separator); transition: all var(--transition-fast); animation: fadeInCard 0.3s ease both; }
    .client-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .client-card:active { transform: scale(0.98); background: var(--bg-tertiary); }
    @keyframes fadeInCard { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; color: var(--accent-dark); flex-shrink: 0; }
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
    .badge-success { background: var(--success-light); color: #2E7D32; }
    .badge-warning { background: #FFF8E1; color: #E65100; }
    .badge-danger { background: var(--danger-light); color: #C62828; }
    .search-input { width: 100%; padding: 12px 16px; border-radius: var(--radius-lg); border: 1px solid var(--separator-strong); background: var(--bg-secondary); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: all var(--transition-fast); box-shadow: var(--shadow-xs); color: var(--text-primary); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(2, 136, 209, 0.15); }
    [data-theme="dark"] .search-input { background: #0D1F33; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: var(--radius-md); font-weight: 600; font-size: 0.85rem; border: none; cursor: pointer; transition: all var(--transition-fast); }
    .btn-primary { background: var(--accent-gradient); color: white; box-shadow: 0 4px 16px rgba(2, 136, 209, 0.35); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(2, 136, 209, 0.4); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-ghost { background: transparent; color: var(--accent-dark); }
    .btn-success { background: #25D366; color: white; }
    .btn-success:hover { background: #1ebe57; }
    .btn-icon { padding: 8px; border-radius: var(--radius-sm); background: transparent; border: 1px solid rgba(2, 136, 209, 0.25); cursor: pointer; transition: all var(--transition-fast); display: flex; align-items: center; justify-content: center; position: relative; color: #0288D1; }
    .btn-icon:hover { background: #E1F5FE; border-color: #0288D1; }
    .btn-icon.danger:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }
    .btn-icon.whatsapp:hover { background: #E8F5E9; color: #25D366; border-color: #25D366; }
    .btn-icon.notes:hover { background: var(--accent-light); color: var(--accent-dark); }
    .btn-icon.has-note::after { content: ''; position: absolute; top: 3px; right: 3px; width: 7px; height: 7px; border-radius: 50%; background: var(--info); border: 1px solid white; }
    [data-theme="dark"] .btn-icon { color: #4FC3F7; border: 1px solid rgba(79, 195, 247, 0.3); }
    [data-theme="dark"] .btn-icon:hover { background: rgba(79, 195, 247, 0.15); border-color: #4FC3F7; color: #E3F2FD; }
    [data-theme="dark"] .btn-icon.danger:hover { background: rgba(229, 57, 53, 0.15); color: #EF5350; border-color: #EF5350; }
    [data-theme="dark"] .btn-icon.whatsapp:hover { background: rgba(37, 211, 102, 0.15); color: #25D366; border-color: #25D366; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(10, 25, 41, 0.35); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content { background: var(--bg-secondary); border-radius: var(--radius-2xl); padding: 24px; width: 100%; max-width: 400px; box-shadow: var(--shadow-xl); max-height: 90vh; overflow-y: auto; border: 1px solid var(--separator); animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .confirm-modal { text-align: center; }
    .confirm-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .confirm-icon.renew { background: var(--accent-light); }
    .confirm-icon.delete { background: var(--danger-light); }
    .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; pointer-events: none; align-items: center; }
    .toast { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding: 12px 22px; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.85rem; pointer-events: auto; animation: toastIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-16px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
    .empty-state-card { text-align: center; padding: 48px 24px; background: var(--bg-secondary); border-radius: var(--radius-2xl); border: 1px solid var(--separator); box-shadow: var(--shadow-sm); max-width: 440px; margin: 0 auto; }
    .empty-state-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .empty-state-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
    .empty-state-desc { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }
    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .transaction-table td { padding: 12px 14px; border-top: 1px solid var(--separator); font-size: 0.85rem; white-space: nowrap; }
    .transaction-amount { font-weight: 600; }
    .transaction-amount.positive { color: var(--success); } .transaction-amount.negative { color: var(--danger); }
    .transaction-amount.entrada { color: var(--entrada); } .transaction-amount.neutral { color: var(--text-primary); }
    .active-filter-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; background: var(--accent-light); color: var(--accent-dark); font-size: 0.8rem; font-weight: 600; margin-bottom: 16px; }
    .action-icons { display: flex; gap: 6px; align-items: center; }

    .textarea-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(2, 136, 209, 0.15); }

    .chart-container canvas { width: 100% !important; height: 100% !important; }
    .field-label { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 4px; }
    .pro-badge-lock { font-size: 0.6rem; background: var(--accent-light); color: var(--accent-dark); padding: 2px 6px; border-radius: 8px; margin-left: auto; font-weight: 600; }

    .banner-pro-wrapper { background: transparent !important; border: none !important; box-shadow: none !important; }
    .btn-delete-row { background: none; border: 1px solid transparent; cursor: pointer; padding: 6px; border-radius: 8px; color: var(--text-tertiary); transition: all var(--transition-fast); display: flex; align-items: center; }
    .btn-delete-row:hover { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }
    .btn-delete-row i { width: 16px; height: 16px; stroke-width: 1.8; }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }

      .lucro-destaque .stat-value { font-size: 1.7rem; }
      .empty-state-card { padding: 36px 20px; }
    }
    @media (min-width: 768px) and (max-width: 1024px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }

      </div>

      </div>
    </nav>
    <button class="fab" id="fabAdd"><i data-lucide="plus" width="20" height="20"></i></button>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      const swBlob = new Blob([`const CACHE_NAME='owerplay-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE_NAME).then(c=>c.addAll(['/','https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap','https://unpkg.com/lucide@latest','https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js','https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js'])));self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(k=>k!==CACHE_NAME).map(k=>caches.delete(k)))));self.clients.claim()});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(c=>c||fetch(e.request).then(r=>{if(r&&r.status===200){let cl=r.clone();caches.open(CACHE_NAME).then(c=>c.put(e.request,cl))}return r})).catch(()=>caches.match(e.request)))})`], {type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
    }

    (function() {
      const STORAGE_KEY = 'owerplay_v5';
      const KIWIFY_LINK = 'https://pay.kiwify.com.br/a26pAg3';
      const WHATSAPP_LINK = 'https://wa.me/553284911522?text=Ol%C3%A1!%20Quero%20assinar%20o%20Owerplay%20PRO';
      const JSONBIN_BIN_ID = '69ec4032aaba882197361318';
      const JSONBIN_MASTER_KEY = '$2a$10$hPThmNbRFc4LJU8Lb39N0ufogEbkwasTJJJV4m3CCTq0DEzgcP.y2';
      const JSONBIN_API_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

      const defaultTemplates = {
        cobranca: "Olá {nome}, Bom dia!\nSeu plano de tv vence hoje *{vencimento}*\n\n⚠️ *Na data do vencimento, o sistema poderá bloquear automaticamente a qualquer momento, renove assim que possível!*\n\nDADOS PARA PAGAMENTO:\nValor: *R${valor}*\nPix:\nBanco:\n\n✅ *Favor enviar comprovante*",
        renovacao: "📌 Obrigado pela confiança!\n✅ Sua assinatura foi renovada com sucesso!\n🗓️ PRÓXIMO VENCIMENTO: *{vencimento}*"
      };
      let db = { clientes: [], planos: [], servidores: [], transacoes: [], templates: defaultTemplates, log: [], transacoesRemovidas: [] };
      let planoPro = false;
      try { const s = localStorage.getItem(STORAGE_KEY); if (s) { db = JSON.parse(s); if (!db.transacoes) db.transacoes = []; if (!db.templates) db.templates = defaultTemplates; if (!db.log) db.log = []; if (!db.transacoesRemovidas) db.transacoesRemovidas = []; } } catch (e) { localStorage.removeItem(STORAGE_KEY); }
      try { planoPro = JSON.parse(localStorage.getItem('owerplay_pro') || 'false'); } catch (e) {}

      function savePro() { localStorage.setItem('owerplay_pro', JSON.stringify(planoPro)); atualizarBadgePro(); atualizarIconesPro(); }
      function atualizarBadgePro() { const badge = document.getElementById('proBadgeText'); if (!badge) return; if (planoPro) { badge.textContent = 'Plano PRO ⭐'; badge.style.color = 'var(--accent)'; } else { badge.textContent = 'Plano FREE'; badge.style.color = ''; } }
      function atualizarIconesPro() { document.querySelectorAll('.pro-badge-lock').forEach(el => { el.style.display = planoPro ? 'none' : 'inline'; }); }
      function exigePRO() { if (!planoPro) { showBannerPRO(); return false; } return true; }

      function saveDB() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); if (currentSection === 'dashboard') renderDashboard(); else if (currentSection === 'financas') renderFinancas(); atualizarNotificacoes(); atualizarDarkModeText(); }
      function addLog(m) { db.log.unshift({ msg: m, data: new Date().toLocaleString('pt-BR') }); if (db.log.length > 50) db.log.pop(); saveDB(); }
      function showToast(m, t) { t = t || 'success'; const c = document.getElementById('toastContainer'); if (!c) return; const icons = { success: 'check-circle', error: 'alert-circle', warning: 'alert-triangle', info: 'info' }; const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `<i data-lucide="${icons[t]}" width="18" height="18" style="color:var(--${t==='success'?'success':t==='error'?'danger':'warning'})"></i><span>${m}</span>`; c.appendChild(toast); lucide.createIcons(); setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(-8px) scale(0.95)'; toast.style.transition = 'all 0.25s ease'; setTimeout(() => toast.remove(), 250); }, 2000); }

      // ========== SINCRONIZAR TRANSAÇÕES (CORRIGIDO) ==========
      function sincronizarTransacoes() {
        const hoje = new Date(); const m = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;
        const ids = db.clientes.map(c => c.id);
        // Remove transações de clientes que não existem mais
        db.transacoes = db.transacoes.filter(t => { if (!t.clienteId) return true; if (!ids.includes(t.clienteId)) return true; if (!t.data.startsWith(m)) return true; return false; });
        // Para cada cliente, verifica se já tem transação este mês. Se não tiver, cria.
        db.clientes.forEach(c => {
          const p = db.planos.find(x => x.id === c.planoId);
          const s = db.servidores.find(x => x.id === c.servidorId);
          // Verifica se este cliente já tem transação de entrada este mês
          const temEntrada = db.transacoes.some(t => t.clienteId === c.id && t.tipo === 'entrada' && t.data.startsWith(m));
          const temSaida = db.transacoes.some(t => t.clienteId === c.id && t.tipo === 'saida' && t.data.startsWith(m));
          // Verifica se essas transações foram explicitamente removidas pelo usuário
          const removido = db.transacoesRemovidas.some(r => r.clienteId === c.id && r.mes === m);
          if (!removido) {
            if (p && !temEntrada) {
              db.transacoes.push({ id: 'te_' + c.id + '_' + m, descricao: 'Mensalidade ' + c.nome, valor: p.valor - (c.desconto || 0), tipo: 'entrada', data: m + '-01', clienteId: c.id });
            }
            if (s && !temSaida) {
              db.transacoes.push({ id: 'ts_' + c.id + '_' + m, descricao: 'Servidor (' + c.nome + ')', valor: s.custo, tipo: 'saida', data: m + '-01', clienteId: c.id, servidorId: s.id });
            }
          }
        });
        // Limpa transacoesRemovidas de meses antigos
        db.transacoesRemovidas = db.transacoesRemovidas.filter(r => r.mes === m);
        saveDB();
      }

      function sendWhatsApp(cid, tipo, vencimentoOverride) {
        const c = db.clientes.find(x => x.id === cid); if (!c) return;
        const p = db.planos.find(x => x.id === c.planoId); const tpl = db.templates[tipo] || '';
        const venc = vencimentoOverride ? new Date(vencimentoOverride + 'T00:00:00').toLocaleDateString('pt-BR') : new Date(c.vencimento + 'T00:00:00').toLocaleDateString('pt-BR');
        const valor = ((p?.valor || 0) - (c.desconto || 0)).toFixed(2);
        let msg = tpl.replace(/{nome}/g, c.nome.split(' ')[0]).replace(/{sobrenome}/g, c.nome.split(' ').slice(1).join(' ')).replace(/{nome_completo}/g, c.nome).replace(/{vencimento}/g, venc).replace(/{valor}/g, valor).replace(/{plano}/g, p?.nome || '');
        const waWeb = 'https://wa.me/' + c.whatsapp + '?text=' + encodeURIComponent(msg);
        if (navigator.userAgent.includes('wv') || navigator.userAgent.includes('WebView')) { try { window.location.href = 'intent://send?phone=' + c.whatsapp + '&text=' + encodeURIComponent(msg) + '#Intent;scheme=whatsapp;package=com.whatsapp;end'; setTimeout(() => { window.open(waWeb, '_blank'); }, 1500); } catch(e) { window.open(waWeb, '_blank'); } }
        else { window.open(waWeb, '_blank'); }
      }

      let currentSection = 'dashboard', clientesFilter = null, chartInstance = null, lastScrollY = 0;
      const mainContent = document.getElementById('mainContent'), sidebar = document.getElementById('sidebar'), overlay = document.getElementById('mobileOverlay'), fab = document.getElementById('fabAdd'), bottomNav = document.getElementById('bottomNav');

      function navigateTo(s, f) { currentSection = s; clientesFilter = f || null; document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(e => e.classList.remove('active')); document.querySelectorAll('[data-section="' + s + '"]').forEach(e => e.classList.add('active')); updateFab(); renderSection(s); closeSidebar(); }
      window.navigateWithFilter = function(f) { navigateTo('clientes', f); };
      window.navigateToFinancas = function() { navigateTo('financas'); };
      window.goBack = function() { navigateTo('dashboard'); };

      function updateFab() { if (currentSection === 'financas' || currentSection === 'mensagens') { fab.style.display = 'none'; return; } if (currentSection === 'planos' && db.planos.length === 0) { fab.style.display = 'none'; return; } if (currentSection === 'servidores' && db.servidores.length === 0) { fab.style.display = 'none'; return; } if (currentSection === 'clientes' && db.clientes.length === 0 && db.planos.length === 0 && db.servidores.length === 0) { fab.style.display = 'none'; return; } fab.style.display = window.innerWidth < 1024 ? 'flex' : 'none'; }
      window.addEventListener('scroll', () => { const cs = window.pageYOffset || document.documentElement.scrollTop; if (cs > lastScrollY && cs > 100) fab.classList.add('dock-hidden'); else if (cs < lastScrollY) fab.classList.remove('dock-hidden'); lastScrollY = cs <= 0 ? 0 : cs; }, { passive: true });

      function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); document.body.style.overflow = 'hidden'; mainContent.style.overflow = 'hidden'; }
      function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); document.body.style.overflow = ''; mainContent.style.overflow = ''; }
      document.getElementById('hamburgerBtn').addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
      document.getElementById('sidebarCloseBtn').addEventListener('click', closeSidebar);
      document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(b => b.addEventListener('click', (e) => navigateTo(e.currentTarget.dataset.section)));
      document.getElementById('sidebarRelatorio').addEventListener('click', () => { closeSidebar(); if (!exigePRO()) return; showRelatorio(); });
      document.getElementById('sidebarLog').addEventListener('click', () => { closeSidebar(); if (!exigePRO()) return; showLog(); });
      document.getElementById('sidebarNotificacoes').addEventListener('click', () => { closeSidebar(); showNotif(); });
      document.getElementById('sidebarDarkMode').addEventListener('click', () => { closeSidebar(); toggleDarkMode(); });
      document.getElementById('sidebarMensagens').addEventListener('click', () => { closeSidebar(); if (!exigePRO()) return; navigateTo('mensagens'); });
      fab.addEventListener('click', () => { switch (currentSection) { case 'clientes': if (db.clientes.length >= 10 && !planoPro) { showBannerPRO(); return; } abrirModalCliente(); break; case 'planos': abrirModalPlano(); break; case 'servidores': if (db.servidores.length >= 1 && !planoPro) { showBannerPRO(); return; } abrirModalServidor(); break; default: navigateTo('clientes'); setTimeout(() => { if (db.clientes.length >= 10 && !planoPro) { showBannerPRO(); } else { abrirModalCliente(); } }, 100); } });

      function hideDock() { bottomNav.classList.add('dock-hidden'); fab.classList.add('dock-hidden'); }
      function showDock() { bottomNav.classList.remove('dock-hidden'); if (lastScrollY <= 100) fab.classList.remove('dock-hidden'); updateFab(); }
      document.addEventListener('focusin', (e) => { if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') { hideDock(); } });
      document.addEventListener('focusout', () => { setTimeout(() => { if (!document.activeElement || (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA')) { showDock(); } }, 300); });
      let lastHeight = window.innerHeight;
      window.addEventListener('resize', () => { const h = window.innerHeight; if (h < lastHeight - 100) hideDock(); else if (h > lastHeight + 100) showDock(); lastHeight = h; });

      function renderSection(s) { switch (s) { case 'dashboard': renderDashboard(); break; case 'clientes': renderClientes(); break; case 'planos': renderPlanos(); break; case 'servidores': renderServidores(); break; case 'financas': renderFinancas(); break; case 'mensagens': renderMensagens(); break; } lucide.createIcons(); atualizarDarkModeText(); }

      function showConfirmModal(title, msg, iconType, btnText, btnClass, cb) { const icons = { renew: { icon: 'refresh-cw', bg: 'var(--accent-light)', color: 'var(--accent-dark)' }, delete: { icon: 'trash', bg: 'var(--danger-light)', color: 'var(--danger)' } }; const ic = icons[iconType] || icons.delete; const h = `<div class="modal-overlay" id="confirmModalOverlay"><div class="modal-content confirm-modal"><div class="confirm-icon ${iconType}" style="background:${ic.bg};"><i data-lucide="${ic.icon}" width="28" height="28" style="color:${ic.color}"></i></div><h3>${title}</h3><p style="color:var(--text-secondary);margin-bottom:20px;font-size:0.9rem;">${msg}</p><div style="display:flex;gap:10px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('confirmModalOverlay').remove()">Cancelar</button><button class="btn ${btnClass}" style="flex:1;" id="confirmActionBtn">${btnText}</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); lucide.createIcons(); document.getElementById('confirmActionBtn').addEventListener('click', () => { document.getElementById('confirmModalOverlay').remove(); cb(); }); document.getElementById('confirmModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'confirmModalOverlay') e.target.remove(); }); }

      // ========== REMOVER TRANSAÇÕES DO CLIENTE (LIXEIRA CORRIGIDA) ==========
      window._removerTransacoesCliente = function(cid) {
        const c = db.clientes.find(x => x.id === cid);
        if (!c) return;
        const hoje = new Date();
        const m = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
        const transacoesCliente = db.transacoes.filter(t => t.clienteId === cid && t.data.startsWith(m));
        if (transacoesCliente.length === 0) { showToast('Nenhuma transação para remover este mês', 'warning'); return; }
        const totalEnt = transacoesCliente.filter(t => t.tipo === 'entrada').reduce((s, t) => s + t.valor, 0);
        const totalSai = transacoesCliente.filter(t => t.tipo === 'saida').reduce((s, t) => s + t.valor, 0);
        showConfirmModal('Remover transações?', `Isso irá remover <strong>todas as movimentações</strong> de <strong>${c.nome}</strong> no mês atual.<br><br>➕ Entradas: R$ ${totalEnt.toFixed(2)}<br>➖ Saídas: R$ ${totalSai.toFixed(2)}`, 'delete', 'Sim, remover', 'btn-danger', () => {
          db.transacoes = db.transacoes.filter(t => !(t.clienteId === cid && t.data.startsWith(m)));
          // Marca como removido para não recriar
          if (!db.transacoesRemovidas) db.transacoesRemovidas = [];
          db.transacoesRemovidas.push({ clienteId: cid, mes: m });
          saveDB();
          setTimeout(() => { renderDashboard(); }, 100);
          addLog('Transações de ' + c.nome + ' removidas');
          renderSection('financas');
          showToast('Transações removidas!');
        });
      };

      function renderFinancas() {
        const hoje = new Date();
        const m = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
        const ma = hoje.getMonth() === 0 ? `${hoje.getFullYear() - 1}-12` : `${hoje.getFullYear()}-${String(hoje.getMonth()).padStart(2, '0')}`;
        const ent = db.transacoes.filter(t => t.tipo === 'entrada' && t.data.startsWith(m)).reduce((s, t) => s + t.valor, 0);
        const sai = db.transacoes.filter(t => t.tipo === 'saida' && t.data.startsWith(m)).reduce((s, t) => s + t.valor, 0);
        const luc = ent - sai;
        const ea = db.transacoes.filter(t => t.tipo === 'entrada' && t.data.startsWith(ma)).reduce((s, t) => s + t.valor, 0);
        const sa = db.transacoes.filter(t => t.tipo === 'saida' && t.data.startsWith(ma)).reduce((s, t) => s + t.valor, 0);
        const la = ea - sa;
        const cresc = la !== 0 ? ((luc - la) / Math.abs(la)) * 100 : (luc > 0 ? 100 : 0);
        const crescTxt = cresc >= 0 ? '+' + cresc.toFixed(1) + '%' : cresc.toFixed(1) + '%';
        const clienteTransacoes = {};
        db.clientes.forEach(c => { clienteTransacoes[c.id] = { id: c.id, nome: c.nome, entrada: 0, saida: 0 }; });
        db.transacoes.forEach(t => { if (t.clienteId && clienteTransacoes[t.clienteId]) { if (t.tipo === 'entrada') clienteTransacoes[t.clienteId].entrada += t.valor; else clienteTransacoes[t.clienteId].saida += t.valor; } });
        const clienteRows = Object.values(clienteTransacoes).slice(0, planoPro ? undefined : 10).map(ct => { const lucroCli = ct.entrada - ct.saida; return `<tr><td><strong>${ct.nome}</strong></td><td class="transaction-amount entrada">+ R$ ${ct.entrada.toFixed(2)}</td><td class="transaction-amount negative">- R$ ${ct.saida.toFixed(2)}</td><td class="transaction-amount ${lucroCli>=0?'positive':'negative'}">${lucroCli>=0?'+':'-'} R$ ${Math.abs(lucroCli).toFixed(2)}</td><td style="text-align:center;"><button class="btn-delete-row" onclick="window._removerTransacoesCliente('${ct.id}')" title="Remover transações deste cliente"><i data-lucide="trash-2"></i></button></td></tr>`; }).join('');

      // Demais funções mantidas intactas
      function showNotif() { const hoje = new Date().toISOString().split('T')[0]; const venc = db.clientes.filter(c => c.vencimento < hoje); const av = db.clientes.filter(c => c.vencimento >= hoje && c.vencimento <= new Date(Date.now()+3*86400000).toISOString().split('T')[0]); const h = `<div class="modal-overlay" id="notifOverlay"><div class="modal-content" style="max-width:440px;"><h3>🔔 Notificações</h3>${venc.length===0&&av.length===0?'<p style="color:var(--text-tertiary);text-align:center;">Nenhuma notificação</p>':''}${venc.length>0?`<div style="margin-bottom:12px;"><strong style="color:var(--danger);">⚠️ ${venc.length} vencido(s):</strong>${venc.map(c=>`<div style="font-size:0.8rem;">• ${c.nome} - ${new Date(c.vencimento+'T00:00:00').toLocaleDateString('pt-BR')}</div>`).join('')}</div>`:''}${av.length>0?`<div><strong style="color:var(--warning);">📅 ${av.length} vence(m) em até 3 dias:</strong>${av.map(c=>`<div style="font-size:0.8rem;">• ${c.nome} - ${new Date(c.vencimento+'T00:00:00').toLocaleDateString('pt-BR')}</div>`).join('')}</div>`:''}<button class="btn btn-ghost" style="width:100%;margin-top:12px;" onclick="document.getElementById('notifOverlay').remove()">Fechar</button></div></div>`; document.body.insertAdjacentHTML('beforeend', h); document.getElementById('notifOverlay').addEventListener('click', (e) => { if (e.target.id === 'notifOverlay') e.target.remove(); }); }
      function showLog() { const h = `<div class="modal-overlay" id="logOverlay"><div class="modal-content" style="max-width:440px;"><h3>📋 Log de Atividades</h3><div style="max-height:400px;overflow-y:auto;">${db.log.length===0?'<p style="color:var(--text-tertiary);text-align:center;">Nenhuma atividade</p>':db.log.map(l=>`<div style="padding:8px 0;border-bottom:1px solid var(--separator);"><div style="font-size:0.8rem;">${l.msg}</div><div style="font-size:0.65rem;color:var(--text-tertiary);">${l.data}</div></div>`).join('')}</div><button class="btn btn-ghost" style="width:100%;margin-top:12px;" onclick="document.getElementById('logOverlay').remove()">Fechar</button></div></div>`; document.body.insertAdjacentHTML('beforeend', h); document.getElementById('logOverlay').addEventListener('click', (e) => { if (e.target.id === 'logOverlay') e.target.remove(); }); }
      function showRelatorio() { const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']; const hoje = new Date(); const lb=[], ed=[], sd=[], ld=[]; for (let i=5;i>=0;i--) { const mes=new Date(hoje.getFullYear(),hoje.getMonth()-i,1); const ms=`${mes.getFullYear()}-${String(mes.getMonth()+1).padStart(2,'0')}`; lb.push(meses[mes.getMonth()]); ed.push(db.transacoes.filter(t=>t.tipo==='entrada'&&t.data.startsWith(ms)).reduce((s,t)=>s+t.valor,0)); sd.push(db.transacoes.filter(t=>t.tipo==='saida'&&t.data.startsWith(ms)).reduce((s,t)=>s+t.valor,0)); ld.push(ed[ed.length-1]-sd[sd.length-1]); } const h=`<div class="modal-overlay" id="relatorioOverlay"><div class="modal-content" style="max-width:520px;"><h3>📊 Relatório 6 Meses</h3><div class="chart-modal-container"><canvas id="relatorioChart"></canvas></div><button class="btn btn-ghost" style="width:100%;margin-top:16px;" onclick="document.getElementById('relatorioOverlay').remove()">Fechar</button></div></div>`; document.body.insertAdjacentHTML('beforeend',h); setTimeout(()=>{const ctx=document.getElementById('relatorioChart');if(ctx){new Chart(ctx,{type:'bar',data:{labels:lb,datasets:[{label:'Entradas',data:ed,backgroundColor:'#0288D1',borderRadius:8,borderSkipped:false},{label:'Saídas',data:sd,backgroundColor:'#EF5350',borderRadius:8,borderSkipped:false},{label:'Lucro',data:ld,backgroundColor:'#43A047',borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:18,font:{size:11}}}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.04)'}},x:{grid:{display:false}}}}});}},200);document.getElementById('relatorioOverlay').addEventListener('click',(e)=>{if(e.target.id==='relatorioOverlay')e.target.remove();}); }

      function renderDashboard() { const hoje = new Date().toISOString().split('T')[0]; const ent = db.transacoes.filter(t => t.tipo === 'entrada').reduce((s, t) => s + t.valor, 0); const sai = db.transacoes.filter(t => t.tipo === 'saida').reduce((s, t) => s + t.valor, 0); const luc = ent - sai; mainContent.innerHTML = `<h1 class="section-title">Owerplay Gestor</h1><p class="section-subtitle">Conectando você ao lucro</p><div style="max-width:400px;margin:0 auto 24px;"><div class="stat-card lucro-dashboard lucro-destaque clickable" onclick="window.navigateToFinancas()"><i data-lucide="arrow-up-right" class="card-arrow" width="18" height="18"></i><div class="stat-label">💰 Lucro do Mês</div><div class="stat-value">R$ ${luc.toFixed(2)}</div></div></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px;"><div class="stat-card clickable" onclick="window.navigateWithFilter('active')"><i data-lucide="arrow-up-right" class="card-arrow" width="16" height="16"></i><div class="stat-label">✅ Ativos</div><div class="stat-value">${db.clientes.filter(c=>c.vencimento>=hoje).length}</div></div><div class="stat-card clickable" onclick="window.navigateWithFilter('expired')"><i data-lucide="arrow-up-right" class="card-arrow" width="16" height="16"></i><div class="stat-label">⚠️ Vencidos</div><div class="stat-value" style="color:var(--danger)">${db.clientes.filter(c=>c.vencimento<hoje).length}</div></div><div class="stat-card clickable" onclick="window.navigateWithFilter('today')"><i data-lucide="arrow-up-right" class="card-arrow" width="16" height="16"></i><div class="stat-label">📅 Hoje</div><div class="stat-value warning-color">${db.clientes.filter(c=>c.vencimento===hoje).length}</div></div><div class="stat-card clickable" onclick="window.navigateWithFilter('all')"><i data-lucide="arrow-up-right" class="card-arrow" width="16" height="16"></i><div class="stat-label">👥 Total</div><div class="stat-value neutral">${db.clientes.length}</div></div></div><input type="text" class="search-input" placeholder="🔍 Buscar cliente..." id="searchDash" style="margin-bottom:16px;"><div class="card-grid" id="dashboardClients"></div>`; renderCards('dashboardClients', db.clientes, hoje); }
      function renderCards(contId, clientes, hoje) { const cont = document.getElementById(contId); if (!cont) return; if (clientes.length === 0) { cont.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><i data-lucide="user-round" width="48" height="48"></i><p style="font-size:1.1rem;font-weight:500;">Nenhum cliente encontrado</p></div>`; lucide.createIcons(); return; } cont.innerHTML = clientes.sort((a, b) => a.vencimento.localeCompare(b.vencimento)).map((c, i) => { const p = db.planos.find(x => x.id === c.planoId) || {}; const s = db.servidores.find(x => x.id === c.servidorId) || {}; const ini = c.nome.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase(); let sc = 'badge-success', st = 'Ativo'; if (c.vencimento < hoje) { sc = 'badge-danger'; st = 'Vencido'; } else if (c.vencimento === hoje) { sc = 'badge-warning'; st = 'Hoje'; } return `<div class="client-card" style="animation-delay:${i*0.04}s"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div class="avatar">${ini}</div><div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:0.9rem;">${c.nome}</div><div style="font-size:0.7rem;color:var(--text-secondary);">${p.nome||'Sem plano'} · ${s.nome||'Sem servidor'}</div></div><span class="badge ${sc}">${st}</span></div><div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--separator);font-size:0.75rem;color:var(--text-secondary);margin-bottom:6px;"><span>📅 ${new Date(c.vencimento+'T00:00:00').toLocaleDateString('pt-BR')}</span><span>R$ ${((p.valor||0)-(c.desconto||0)).toFixed(2)}</span></div><div class="action-icons"><button class="btn-icon whatsapp" onclick="window._wp('${c.id}')"><i data-lucide="messages-square" width="18" height="18"></i></button><button class="btn-icon notes ${c.anotacoes?'has-note':''}" onclick="window._note('${c.id}')"><i data-lucide="file-text" width="18" height="18"></i></button><button class="btn-icon" onclick="window._renovar('${c.id}')"><i data-lucide="rotate-cw" width="18" height="18"></i></button><button class="btn-icon" onclick="window._editar('${c.id}')"><i data-lucide="pencil" width="18" height="18"></i></button><button class="btn-icon danger" onclick="window._excluir('${c.id}')"><i data-lucide="trash" width="18" height="18"></i></button></div></div>`; }).join(''); lucide.createIcons(); }
      function renderClientes() { const hoje = new Date().toISOString().split('T')[0]; let cl = [...db.clientes]; let label = ''; if (clientesFilter === 'active') { cl = cl.filter(c => c.vencimento >= hoje); label = 'Ativos'; } else if (clientesFilter === 'expired') { cl = cl.filter(c => c.vencimento < hoje); label = 'Vencidos'; } else if (clientesFilter === 'today') { cl = cl.filter(c => c.vencimento === hoje); label = 'Hoje'; } else if (clientesFilter === 'all') { label = 'Todos'; } let html = `<button class="back-btn" onclick="window.goBack()"><i data-lucide="chevron-left"></i> Voltar</button><h1 class="section-title">Clientes</h1><p class="section-subtitle">Seus clientes, seu patrimônio</p>`; if (!label && db.clientes.length === 0 && db.planos.length === 0 && db.servidores.length === 0) { html += `<div class="empty-state-card"><div class="empty-state-icon"><i data-lucide="users" width="32" height="32" style="color:var(--accent-dark)"></i></div><div class="empty-state-title">Nenhum cliente</div><div class="empty-state-desc">Cadastre primeiro <strong>Servidor</strong> e <strong>Plano</strong>.</div><button class="btn btn-primary" onclick="window.goBack()">Começar</button></div>`; } else { if (label) html += `<div class="active-filter-badge">🔍 ${label} (${cl.length}) <button onclick="window.clearFilter()"><i data-lucide="x" width="14" height="14"></i></button></div>`; html += `<div class="card-grid" id="clientesList"></div>`; } mainContent.innerHTML = html; if (cl.length > 0 || db.planos.length > 0 || db.servidores.length > 0) { renderCards('clientesList', cl, hoje); } clientesFilter = null; }

      function renderPlanos() { let html = `<button class="back-btn" onclick="window.goBack()"><i data-lucide="chevron-left"></i> Voltar</button><h1 class="section-title">Planos</h1><p class="section-subtitle">Configure seus planos</p>`; if (db.planos.length === 0) { html += `<div class="empty-state-card"><div class="empty-state-icon"><i data-lucide="box" width="32" height="32" style="color:var(--accent-dark)"></i></div><div class="empty-state-title">Crie seus Planos</div><div class="empty-state-desc">Defina categorias de venda com nome e valor para oferecer aos seus clientes de forma organizada.</div><button class="btn btn-primary" onclick="window._newPlano()">+ Criar Plano</button></div>`; } else { html += `<div class="card-grid" id="planosList"></div>`; } mainContent.innerHTML = html; if (db.planos.length > 0) { document.getElementById('planosList').innerHTML = db.planos.map(p => `<div class="stat-card"><div style="font-weight:600;font-size:1rem;">${p.nome}</div><div style="font-size:1.4rem;font-weight:700;margin:6px 0;">R$ ${p.valor.toFixed(2)}</div><div class="action-icons"><button class="btn-icon" onclick="window._editPlano('${p.id}')"><i data-lucide="pencil" width="18" height="18"></i></button><button class="btn-icon danger" onclick="window._delPlano('${p.id}')"><i data-lucide="trash" width="18" height="18"></i></button></div></div>`).join(''); } lucide.createIcons(); updateFab(); }

      function abrirModalPlano(id = null) { const p = id ? db.planos.find(x => x.id === id) : null; const h = `<div class="modal-overlay" id="modalPlano"><div class="modal-content"><h2>${id?'Editar':'Novo'} Plano</h2><div style="display:flex;flex-direction:column;gap:12px;"><div><label class="field-label">Nome</label><input class="search-input" id="nomePlano" value="${p?.nome||''}"></div><div><label class="field-label">Valor (R$)</label><input type="number" class="search-input" id="valorPlano" value="${p?.valor||''}"></div></div><div style="display:flex;gap:10px;margin-top:20px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('modalPlano').remove()">Cancelar</button><button class="btn btn-primary" style="flex:1;" id="savePlano">Salvar</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); document.getElementById('savePlano').addEventListener('click', () => { const n = document.getElementById('nomePlano').value.trim(); const v = parseFloat(document.getElementById('valorPlano').value) || 0; if (!n || v <= 0) { showToast('Inválido', 'error'); return; } if (id) db.planos = db.planos.map(x => x.id === id ? { id, nome: n, valor: v } : x); else db.planos.push({ id: 'p' + Date.now(), nome: n, valor: v }); if (id) sincronizarTransacoes(); saveDB(); addLog(id ? ('Plano ' + n + ' atualizado') : ('Plano ' + n + ' criado')); document.getElementById('modalPlano').remove(); renderSection('planos'); showToast('Plano salvo!'); }); document.getElementById('modalPlano').addEventListener('click', (e) => { if (e.target.id === 'modalPlano') e.target.remove(); }); }
      function renderServidores() { let html = `<button class="back-btn" onclick="window.goBack()"><i data-lucide="chevron-left"></i> Voltar</button><h1 class="section-title">Servidores</h1><p class="section-subtitle">Gerencie seus servidores</p>`; if (db.servidores.length === 0) { html += `<div class="empty-state-card"><div class="empty-state-icon"><i data-lucide="server" width="32" height="32" style="color:var(--accent-dark)"></i></div><div class="empty-state-title">Cadastre seu Servidor</div><div class="empty-state-desc">Adicione seu servidor de origem para gerenciar seus custos operacionais e vincular aos clientes. ${!planoPro?'<br><small style="color:var(--warning);">Plano FREE: 1 servidor</small>':''}</div><button class="btn btn-primary" onclick="window._newServ()">+ Novo Servidor</button></div>`; } else { html += `<div class="card-grid" id="servidoresList"></div>`; } mainContent.innerHTML = html; if (db.servidores.length > 0) { document.getElementById('servidoresList').innerHTML = db.servidores.map(s => `<div class="stat-card"><div style="font-weight:600;font-size:1rem;">${s.nome}</div><div style="font-size:1.1rem;color:var(--text-secondary);margin:6px 0;">Custo: R$ ${s.custo.toFixed(2)}</div><div class="action-icons"><button class="btn-icon" onclick="window._editServ('${s.id}')"><i data-lucide="pencil" width="18" height="18"></i></button><button class="btn-icon danger" onclick="window._delServ('${s.id}')"><i data-lucide="trash" width="18" height="18"></i></button></div></div>`).join(''); } lucide.createIcons(); updateFab(); }
      window._newServ = function() { if (db.servidores.length >= 1 && !planoPro) { showBannerPRO(); return; } abrirModalServidor(); }; window._editServ = (id) => abrirModalServidor(id); window._delServ = (id) => { const s = db.servidores.find(x => x.id === id); if (!s) return; showConfirmModal('Tem certeza?', 'Esta ação é <strong>irreversível</strong>.', 'delete', 'Sim, excluir', 'btn-danger', () => { db.servidores = db.servidores.filter(x => x.id !== id); sincronizarTransacoes(); addLog('Servidor ' + s.nome + ' excluído'); renderSection('servidores'); showToast('Excluído!'); }); };
      function abrirModalServidor(id = null) { const s = id ? db.servidores.find(x => x.id === id) : null; const h = `<div class="modal-overlay" id="modalServ"><div class="modal-content"><h2>${id?'Editar':'Novo'} Servidor</h2><div style="display:flex;flex-direction:column;gap:12px;"><div><label class="field-label">Nome</label><input class="search-input" id="nomeServ" value="${s?.nome||''}"></div><div><label class="field-label">Custo (R$)</label><input type="number" class="search-input" id="custoServ" value="${s?.custo||''}"></div></div><div style="display:flex;gap:10px;margin-top:20px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('modalServ').remove()">Cancelar</button><button class="btn btn-primary" style="flex:1;" id="saveServ">Salvar</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); document.getElementById('saveServ').addEventListener('click', () => { const n = document.getElementById('nomeServ').value.trim(); const c = parseFloat(document.getElementById('custoServ').value) || 0; if (!n || c <= 0) { showToast('Inválido', 'error'); return; } if (id) db.servidores = db.servidores.map(x => x.id === id ? { id, nome: n, custo: c } : x); else db.servidores.push({ id: 's' + Date.now(), nome: n, custo: c }); if (id) sincronizarTransacoes(); saveDB(); addLog(id ? ('Servidor ' + n + ' atualizado') : ('Servidor ' + n + ' criado')); document.getElementById('modalServ').remove(); renderSection('servidores'); showToast('Servidor salvo!'); }); document.getElementById('modalServ').addEventListener('click', (e) => { if (e.target.id === 'modalServ') e.target.remove(); }); }
      function showRenewModal(cid) { const c = db.clientes.find(x => x.id === cid); if (!c) return; const p = db.planos.find(x => x.id === c.planoId); const s = db.servidores.find(x => x.id === c.servidorId); const vp = p ? p.valor - (c.desconto || 0) : 0; const da = new Date(c.vencimento + 'T12:00:00'); if (da < new Date()) da.setTime(Date.now()); da.setDate(da.getDate() + 30); const ds = da.toISOString().split('T')[0]; const h = `<div class="modal-overlay" id="renewModalOverlay"><div class="modal-content"><div style="text-align:center;margin-bottom:16px;"><div class="confirm-icon renew"><i data-lucide="calendar-sync" width="28" height="28" style="color:var(--accent-dark)"></i></div><h3>Renovar Cliente</h3></div><div style="background:var(--bg-tertiary);border-radius:var(--radius-md);padding:14px;margin-bottom:16px;"><div style="display:flex;align-items:center;gap:10px;"><div class="avatar">${c.nome.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase()}</div><div><div style="font-weight:600;">${c.nome}</div><div style="font-size:0.8rem;color:var(--text-secondary);">Vence em: ${new Date(c.vencimento+'T00:00:00').toLocaleDateString('pt-BR')}</div></div></div></div><label style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">🗓️ Nova data:</label><input type="date" class="search-input" id="renewDate" value="${ds}" style="margin-bottom:12px;"><div style="background:var(--accent-light);border-radius:var(--radius-md);padding:10px 14px;text-align:center;margin-bottom:20px;"><span style="font-size:0.8rem;">💰 Valor:</span><span style="font-weight:700;font-size:1.1rem;color:var(--accent-dark);margin-left:6px;">R$ ${vp.toFixed(2)}</span></div><div style="display:flex;gap:10px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('renewModalOverlay').remove()">Cancelar</button><button class="btn btn-primary" style="flex:1;" id="confirmRenewBtn">Renovar</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); lucide.createIcons(); document.getElementById('confirmRenewBtn').addEventListener('click', () => { const nd = document.getElementById('renewDate').value; if (!nd) { showToast('Selecione uma data', 'error'); return; } c.vencimento = nd; const hoje = new Date(); const m = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`; db.transacoes.push({ id: 't_renov_' + c.id + '_' + Date.now(), descricao: 'Renovação ' + c.nome, valor: vp, tipo: 'entrada', data: m + '-01', clienteId: c.id }); if (s) { db.transacoes.push({ id: 'ts_renov_' + c.id + '_' + Date.now(), descricao: 'Servidor (' + c.nome + ')', valor: s.custo, tipo: 'saida', data: m + '-01', clienteId: c.id, servidorId: s.id }); } saveDB(); addLog(c.nome + ' renovado até ' + new Date(nd+'T00:00:00').toLocaleDateString('pt-BR')); document.getElementById('renewModalOverlay').remove(); showPosRenovacaoModal(c, nd, vp); renderSection(currentSection); showToast('Renovado com sucesso!'); try { confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } }); } catch (e) {} }); document.getElementById('renewModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'renewModalOverlay') e.target.remove(); }); }
      function showPosRenovacaoModal(c, novaData, valor) { const vencFormatado = new Date(novaData + 'T00:00:00').toLocaleDateString('pt-BR'); const h = `<div class="modal-overlay" id="posRenovacaoOverlay"><div class="modal-content confirm-modal" style="max-width:420px;"><div class="confirm-icon renew" style="background:var(--success-light);"><i data-lucide="check-circle" width="32" height="32" style="color:var(--success)"></i></div><h3>✅ Renovado com sucesso!</h3><div class="pos-renovacao-info"><div class="info-item"><strong>${c.nome}</strong></div><div class="info-item" style="color:var(--text-secondary);">🗓️ Próximo vencimento: <strong>${vencFormatado}</strong></div><div class="info-item" style="color:var(--text-secondary);">💰 Valor: <strong>R$ ${valor.toFixed(2)}</strong></div></div><p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:16px;">Deseja enviar a mensagem de renovação via WhatsApp?</p><div style="display:flex;gap:10px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('posRenovacaoOverlay').remove()">Fechar</button><button class="btn btn-success" style="flex:1;" id="btnEnviarRenovacao"><i data-lucide="send" width="16" height="16"></i> Enviar</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); lucide.createIcons(); document.getElementById('btnEnviarRenovacao').addEventListener('click', () => { document.getElementById('posRenovacaoOverlay').remove(); sendWhatsApp(c.id, 'renovacao', novaData); }); document.getElementById('posRenovacaoOverlay').addEventListener('click', (e) => { if (e.target.id === 'posRenovacaoOverlay') e.target.remove(); }); }
      function showNotesModal(cid) { const c = db.clientes.find(x => x.id === cid); if (!c) return; const h = `<div class="modal-overlay" id="notesModalOverlay"><div class="modal-content"><h3>📝 Anotações</h3><p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:14px;">${c.nome}</p><textarea class="textarea-input" id="notesText">${c.anotacoes || ''}</textarea><div style="display:flex;gap:10px;margin-top:16px;"><button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('notesModalOverlay').remove()">Cancelar</button><button class="btn btn-primary" style="flex:1;" id="saveNotesBtn">Salvar</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', h); lucide.createIcons(); document.getElementById('saveNotesBtn').addEventListener('click', () => { c.anotacoes = document.getElementById('notesText').value; saveDB(); addLog('Anotações: ' + c.nome); document.getElementById('notesModalOverlay').remove(); renderSection(currentSection); showToast('Anotações salvas!'); }); document.getElementById('notesModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'notesModalOverlay') e.target.remove(); }); }
      function toggleDarkMode() { const h = document.documentElement; const t = h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; h.setAttribute('data-theme', t); localStorage.setItem('theme', t); atualizarDarkModeText(); showToast('Tema ' + (t === 'dark' ? 'escuro' : 'claro') + ' ativado', 'info'); }
      function atualizarDarkModeText() { const span = document.getElementById('darkModeText'); const isDark = document.documentElement.getAttribute('data-theme') === 'dark'; if (span) span.textContent = isDark ? 'Modo Claro' : 'Modo Escuro'; const icon = document.querySelector('#sidebarDarkMode i'); if (icon) { icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon'); lucide.createIcons(); } }
      function atualizarNotificacoes() { const hoje = new Date().toISOString().split('T')[0]; const v = db.clientes.filter(c => c.vencimento < hoje).length; const badge = document.getElementById('notifBadge'); if (badge) { if (v > 0) { badge.style.display = 'inline'; badge.textContent = v; } else { badge.style.display = 'none'; } } }
      function backupArquivo() { if (!exigePRO()) return; const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'owerplay_backup_' + new Date().toISOString().split('T')[0] + '.json'; a.click(); URL.revokeObjectURL(url); addLog('Backup exportado (.json)'); showToast('Backup salvo! 📁'); }
      function restaurarArquivo() { if (!exigePRO()) return; const input = document.createElement('input'); input.type = 'file'; input.accept = '.json'; input.onchange = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const data = JSON.parse(ev.target.result); if (!data.clientes) throw new Error('Inválido'); db = data; if (!db.transacoes) db.transacoes = []; if (!db.templates) db.templates = defaultTemplates; if (!db.log) db.log = []; saveDB(); renderSection(currentSection); showToast('Backup restaurado! ✅'); addLog('Backup restaurado via arquivo'); } catch (err) { showToast('Arquivo inválido', 'error'); } }; reader.readAsText(file); }; input.click(); }
      document.getElementById('sidebarBackup').addEventListener('click', () => { closeSidebar(); backupArquivo(); });
      document.getElementById('sidebarRestore').addEventListener('click', () => { closeSidebar(); restaurarArquivo(); });

      async function ativarCodigoPremium(codigoDigitado) { try { const resp = await fetch(JSONBIN_API_URL + '/latest', { headers: { 'X-Master-Key': JSONBIN_MASTER_KEY } }); const data = await resp.json(); const codigos = data.record.codigos; const encontrado = codigos.find(c => c.codigo === codigoDigitado.trim()); if (!encontrado) { showToast('Código inválido! ❌', 'error'); return false; } if (encontrado.usado) { showToast('Código já utilizado! ❌', 'error'); return false; } if (encontrado.expiracao && new Date(encontrado.expiracao) < new Date()) { showToast('Código expirado! ❌', 'error'); return false; } encontrado.usado = true; encontrado.data_ativacao = new Date().toISOString(); await fetch(JSONBIN_API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY }, body: JSON.stringify({ codigos: codigos }) }); planoPro = true; savePro(); showToast('Código ativado! Bem-vindo ao PRO! 🎉'); try { confetti({ particleCount: 100, spread: 80, origin: { y: 0.5 } }); } catch (e) {} return true; } catch (e) { showToast('Erro ao validar código. Tente novamente.', 'error'); return false; } }
      function showBannerPRO() { const isDark = document.documentElement.getAttribute('data-theme') === 'dark'; const bg = isDark ? 'linear-gradient(135deg, #0A1929 0%, #102A43 100%)' : '#FFFFFF'; const cardBg = isDark ? '#102A43' : '#F5FAFF'; const textColor = isDark ? '#E3F2FD' : '#0A1929'; const textSec = isDark ? '#90CAF9' : '#4A7A9E'; const borderColor = isDark ? '#1A3A5C' : '#D8E8F5'; const dashBorder = isDark ? '#243B53' : '#B8D0E8'; const inputBg = isDark ? '#0A1929' : '#FFFFFF'; const inputBorder = isDark ? '#243B53' : '#D8E8F5'; const listColor = isDark ? '#90CAF9' : '#0A1929'; const sectionTitle = isDark ? '#64B5F6' : '#64B5F6'; const html = `<div class="modal-overlay" id="bannerProOverlay"><div class="modal-content banner-pro-wrapper" style="max-width:90vw;padding:0;background:transparent;border:none;box-shadow:none;animation:none;"><div style="background:${bg};border-radius:18px;padding:20px 18px;max-width:100%;margin:20px auto;border:1px solid ${borderColor};box-shadow:0 4px 24px rgba(10,25,41,0.08);"><div style="text-align:center;margin-bottom:14px;"><div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);font-weight:600;margin-bottom:2px;">Owerplay PRO</div><p style="color:${textSec};font-size:0.85rem;margin:0;">Desbloqueie todo o poder do seu gestor</p></div><div style="background:${cardBg};border-radius:14px;padding:14px;text-align:center;margin-bottom:14px;border:1px solid ${borderColor};"><div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.04em;color:${textSec};font-weight:600;margin-bottom:2px;">Plano PRO</div><div style="font-size:1.7rem;font-weight:800;color:${textColor};">R$ 19,90<span style="font-size:0.8rem;color:${textSec};font-weight:500;"> /mês</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px 10px;margin-bottom:14px;"><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:${listColor};">⭐ Clientes ilimitados</div><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:${listColor};">⭐ Servidores ilimitados</div><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:${listColor};">⭐ Backup e restauração</div><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:${listColor};">⭐ Múltiplas mensagens</div><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:${listColor};">⭐ Gráficos e relatórios</div><div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:${listColor};">⭐ Histórico financeiro</div></div><div style="background:${cardBg};border-radius:12px;padding:10px;margin-bottom:14px;border:1px dashed ${dashBorder};"><div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.04em;color:${sectionTitle};font-weight:600;margin-bottom:6px;">Já tem um código PRO?</div><div style="display:flex;gap:6px;"><input type="text" class="search-input" id="codigoPremiumInput" placeholder="Digite o código" style="flex:1;background:${inputBg};border-color:${inputBorder};color:${textColor};font-size:0.8rem;padding:8px 12px;"><button class="btn btn-primary" id="ativarCodigoBtn" style="white-space:nowrap;font-size:0.8rem;padding:8px 14px;">Ativar</button></div></div><button class="btn btn-primary" id="btnAssinarPRO" style="width:100%;margin-bottom:6px;padding:10px;font-size:0.85rem;">Quero ser PRO</button><button id="btnWhatsApp" style="width:100%;padding:10px;border-radius:12px;border:1px solid #25D366;background:transparent;color:#25D366;font-weight:600;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:8px;">💬 Assinar via WhatsApp</button><button id="btnTalvezDepois" style="width:100%;padding:8px;border-radius:12px;border:none;background:transparent;color:${textSec};font-weight:500;font-size:0.8rem;cursor:pointer;">Talvez depois</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); document.getElementById('btnAssinarPRO').addEventListener('click', () => window.open(KIWIFY_LINK, '_blank')); document.getElementById('btnWhatsApp').addEventListener('click', () => window.open(WHATSAPP_LINK, '_blank')); document.getElementById('btnTalvezDepois').addEventListener('click', () => document.getElementById('bannerProOverlay').remove()); document.getElementById('ativarCodigoBtn').addEventListener('click', async () => { const codigo = document.getElementById('codigoPremiumInput').value.trim(); if (!codigo) { showToast('Digite um código!', 'warning'); return; } document.getElementById('ativarCodigoBtn').disabled = true; document.getElementById('ativarCodigoBtn').textContent = 'Verificando...'; const ok = await ativarCodigoPremium(codigo); if (ok) { document.getElementById('bannerProOverlay').remove(); renderSection(currentSection); } else { document.getElementById('ativarCodigoBtn').disabled = false; document.getElementById('ativarCodigoBtn').textContent = 'Ativar'; } }); document.getElementById('bannerProOverlay').addEventListener('click', (e) => { if (e.target.id === 'bannerProOverlay') e.target.remove(); }); }
      document.getElementById('sidebarPlanoPRO').addEventListener('click', () => { if (planoPro) { showToast('Você já é PRO! ⭐', 'info'); } else { showBannerPRO(); } });

      document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
      function renderMensagens() { mainContent.innerHTML = `<button class="back-btn" onclick="window.goBack()"><i data-lucide="chevron-left"></i> Voltar</button><h1 class="section-title">Mensagens</h1><p class="section-subtitle">Comunique-se com seus clientes</p><div class="stat-card" style="margin-bottom:16px;"><h3>📋 Cobrança</h3><p style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:8px;">Tags: {nome}, {sobrenome}, {vencimento}, {valor}, {plano}</p><textarea class="textarea-input" id="tplCobranca" style="min-height:140px;">${db.templates.cobranca}</textarea></div><div class="stat-card" style="margin-bottom:20px;"><h3>📋 Renovação</h3><p style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:8px;">Tags: {nome}, {sobrenome}, {vencimento}</p><textarea class="textarea-input" id="tplRenovacao" style="min-height:100px;">${db.templates.renovacao}</textarea></div><div style="display:flex;gap:10px;"><button class="btn btn-ghost" style="flex:1;" id="resetTpl">Restaurar Padrão</button><button class="btn btn-primary" style="flex:1;" id="saveTpl">Salvar Templates</button></div>`; lucide.createIcons(); document.getElementById('saveTpl').onclick = () => { db.templates.cobranca = document.getElementById('tplCobranca').value; db.templates.renovacao = document.getElementById('tplRenovacao').value; saveDB(); addLog('Templates atualizados'); showToast('Templates salvos!'); }; document.getElementById('resetTpl').onclick = () => { db.templates.cobranca = defaultTemplates.cobranca; db.templates.renovacao = defaultTemplates.renovacao; saveDB(); renderMensagens(); showToast('Restaurado!', 'info'); }; }

      sincronizarTransacoes(); renderSection('dashboard');
      function checkMobile() { if (window.innerWidth >= 1024 && sidebar) closeSidebar(); updateFab(); }
      window.addEventListener('resize', checkMobile); checkMobile();
      atualizarDarkModeText(); atualizarBadgePro(); atualizarIconesPro();
    })();
  </script>
